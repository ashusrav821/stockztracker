                    parts.push({ name: 'O', color: '#888', val: fmt2(c.o) });
                    parts.push({ name: 'H', color: '#00d395', val: fmt2(c.h) });
                    parts.push({ name: 'L', color: '#ff5c5c', val: fmt2(c.l) });
                    parts.push({ name: 'C', color: c.c >= c.o ? '#00d395' : '#ff5c5c', val: fmt2(c.c) });
                    if (inds.volume && c.v) parts.push({ name: 'Vol', color: '#888', val: (c.v/1e6).toFixed(2)+'M' });
                } else {
                    parts.push({ name: 'Price', color: '#00d395', val: fmt2(prices[idx]) });
                }
                const getAt = (arr, i) => (arr && arr[i] !== undefined) ? arr[i] : null;
                if (inds.sma && computed.sma) parts.push({ name:'SMA50', color:'#f5a623', val:fmt2(getAt(computed.sma.slice(-sl), idx)) });
                if (inds.sma20 && computed.sma20) parts.push({ name:'SMA20', color:'#5ac8fa', val:fmt2(getAt(computed.sma20.slice(-sl), idx)) });
                if (inds.sma200 && computed.sma200) parts.push({ name:'SMA200', color:'#ff9f7f', val:fmt2(getAt(computed.sma200.slice(-sl), idx)) });
                if (inds.ema20 && computed.ema20) parts.push({ name:'EMA20', color:'#a78bfa', val:fmt2(getAt(computed.ema20.slice(-sl), idx)) });
                if (inds.bb && computed.bb) {
                    parts.push({ name:'BB↑', color:'rgba(140,140,220,1)', val:fmt2(getAt(computed.bb.upper.slice(-sl), idx)) });
                    parts.push({ name:'BB↓', color:'rgba(140,140,220,1)', val:fmt2(getAt(computed.bb.lower.slice(-sl), idx)) });
                }
                if (inds.rsi && computed.rsi) parts.push({ name:'RSI', color:'#b58900', val:fmt2(getAt(computed.rsi.slice(-sl), idx), 1) });
                if (inds.macd && computed.macd) {
                    parts.push({ name:'MACD', color:'#d33682', val:fmt2(getAt(computed.macd.macd.slice(-sl), idx)) });
                    parts.push({ name:'Sig', color:'#859900', val:fmt2(getAt(computed.macd.signal.slice(-sl), idx)) });
                }

                tooltipEl.style.display = 'flex';
                tooltipEl.innerHTML = `<span style="font-size:0.7rem;color:var(--text-sub);font-weight:700;margin-right:4px;">${dateLabel}</span>` +
                    parts.map(p =>
                        `<span class="xhair-item"><span class="xhair-dot" style="background:${p.color}"></span><span class="xhair-name">${p.name}</span><span class="xhair-val">${p.val}</span></span>`
                    ).join('');
            };

            const clearCrosshair = () => {
                const ctx2 = newCross.getContext('2d');
                ctx2.clearRect(0, 0, layoutW, layoutH);
                const tooltipEl = document.getElementById('xhair-' + ticker);
                if (tooltipEl) tooltipEl.style.display = 'none';
            };

            // Mouse events
            newCross.addEventListener('mousemove', (e) => drawCrosshair(e.clientX));
            newCross.addEventListener('mouseleave', clearCrosshair);

            // Touch events — scrub on touchmove, stay visible until next touch
            newCross.addEventListener('touchstart', (e) => { e.preventDefault(); drawCrosshair(e.touches[0].clientX); }, { passive: false });
            newCross.addEventListener('touchmove', (e) => { e.preventDefault(); drawCrosshair(e.touches[0].clientX); }, { passive: false });
            newCross.addEventListener('touchend', (e) => { e.preventDefault(); /* keep visible — user lifts finger to read */ });
        }

        // --- App Interactions ---
        async function toggleUI(ticker, type, key) {
            if(type === 'panel') {
                let state = appState.ui[key][ticker];
                appState.ui.charts[ticker] = appState.ui.news[ticker] = appState.ui.alerts[ticker] = false;
                appState.ui[key][ticker] = !state; 
                
                if(key === 'news' && !appState.newsCache[ticker]) {
                    renderUI(); 
                    appState.newsCache[ticker] = await fetchNews(ticker);
                }
            }
            if(type === 'ind') appState.indicators[ticker][key] = !appState.indicators[ticker][key];
            
            localStorage.setItem('indicators', JSON.stringify(appState.indicators));
            renderUI();
        }

        function addStock() {
            const val = document.getElementById('tickerInput').value.toUpperCase().trim();
            if(val && !appState.watchlist.includes(val)) {
                appState.watchlist.unshift(val);
                persistWatchlist();
                document.getElementById('tickerInput').value = '';
                document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
                updateData();
            }
        }

        function deleteStock(ticker) {
            appState.watchlist = appState.watchlist.filter(t => t !== ticker);
            delete appState.dataCache[ticker];
            delete appState.errors[ticker];
            persistWatchlist();
            renderUI();
        }

        function retryStock(ticker) {
            ensureTickerState(ticker);
            delete appState.errors[ticker];
            renderUI();
            (async () => {
                try {
                    const data = await fetchStockData(ticker);
                    if (!Array.isArray(data.prices) || !data.prices.length) {
                        throw new Error('No price data returned');
                    }
                    data.computed = computeIndicatorSet(data.prices, data.ohlc);
                    appState.dataCache[ticker] = data;
                    delete appState.errors[ticker];
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                    delete appState.dataCache[ticker];
                }
                renderUI();
            })();
        }

        // Guardrail: if anything unforeseen crashes outside our try/catch blocks,
        // show it instead of leaving a silent "Initializing Data..." or blank page.
        window.addEventListener('error', (event) => {
            console.error('Unhandled error:', event.error);
            const container = document.getElementById('watchlist');
            if (container && container.innerHTML.includes('Initializing Data')) {
                container.innerHTML = `<div class="info-card error-card">
                    <div>Something went wrong loading the app: ${event.message || 'unknown error'}</div>
                    <button class="retry-btn" onclick="location.reload()">Reload</button>
                </div>`;
            }
        });
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled promise rejection:', event.reason);
        });

        // Initialize App
        updateData();
        setInterval(updateData, CONFIG.REFRESH_MS);
    </script>
</body>
</html>
