        // --- Alert System Logic ---
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted") Notification.requestPermission();
        }

        function evaluateAlerts(ticker) {
            const data = appState.dataCache[ticker];
            if(!data || !appState.alerts[ticker] || !appState.alerts[ticker].length) return;
            if (!Array.isArray(data.prices) || !data.prices.length || !data.computed) return;

            const prices = data.prices;
            const currentPrice = prices[prices.length-1];
            const rsiArr = data.computed.rsi || [];
            const smaArr = data.computed.sma || [];
            const rsi = rsiArr.length ? rsiArr[rsiArr.length-1] : null;
            const sma = smaArr.length ? smaArr[smaArr.length-1] : null;

            let stateChanged = false;

            appState.alerts[ticker].forEach(al => {
                if(al.triggered) return;
                let valToCheck = al.ind === 'Price' ? currentPrice : (al.ind === 'RSI' ? rsi : sma);
                let hit = (al.cond === '>' && valToCheck > al.val) || (al.cond === '<' && valToCheck < al.val);
                
                if (hit) {
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification(`📈 Alert Triggered: ${ticker}`, { body: `${al.ind} is ${al.cond} ${al.val} (Currently: ${valToCheck.toFixed(2)})` });
                    }
                    al.triggered = true; 
                    stateChanged = true;
                }
            });

            if(stateChanged) localStorage.setItem('alerts', JSON.stringify(appState.alerts));
        }

        function addCustomAlert(ticker) {
            requestNotificationPermission();
            const ind = document.getElementById(`alt-ind-${ticker}`).value;
            const cond = document.getElementById(`alt-cond-${ticker}`).value;
            const val = parseFloat(document.getElementById(`alt-val-${ticker}`).value);
            
            if(isNaN(val)) return alert("Please enter a valid number");

            appState.alerts[ticker].push({ id: Date.now(), ind, cond, val, triggered: false });
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        function deleteAlert(ticker, id) {
            appState.alerts[ticker] = appState.alerts[ticker].filter(a => a.id !== id);
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        // --- Debounced renderUI ---
        // Batches rapid successive calls (e.g. N tickers arriving concurrently)
        // into a single DOM update on the next animation frame.
        let _renderPending = false;
        function renderUI() {
            if (_renderPending) return;
            _renderPending = true;
            requestAnimationFrame(() => {
                _renderPending = false;
                _doRenderUI();
            });
        }
        function _doRenderUI() {
            const container = document.getElementById('watchlist');
            if (!container) return;
            if(appState.watchlist.length === 0) { container.innerHTML = '<div class="info-card">No stocks tracked. Add one above.</div>'; return; }
            
            let html = '';
            for (let ticker of appState.watchlist) {
                try {
                    html += renderStockCard(ticker);
                } catch (e) {
                    // Guardrail: one ticker's bad data must never break the whole list.
                    console.error(`renderUI failed for ${ticker}:`, e);
                    html += `
                        <div class="info-card error-card">
                            <div><strong>${ticker}</strong>: Display error (${e.message || 'unknown'})</div>
                            <div style="display:flex;gap:8px;margin-top:8px;">
                                <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                                <button class="retry-btn" style="color:var(--sell-color)" onclick="deleteStock('${ticker}')">Remove</button>
                            </div>
                        </div>`;
                }
            }

            container.innerHTML = html;
            appState.watchlist.forEach(ticker => {
                if (appState.ui.charts[ticker] && appState.dataCache[ticker]) {
                    try { drawChart(ticker); } catch (e) { console.error(`drawChart failed for ${ticker}:`, e); }
                }
            });
        } // end _doRenderUI

        // Targeted update: toggle one indicator button + redraw only that ticker's chart.
        // Much cheaper than a full renderUI() when only one thing changed.
        function updateIndicatorButton(ticker, key, active) {
            const btn = document.querySelector(`button[onclick*="'${ticker}', 'ind', '${key}'"]`);
            if (btn) btn.classList.toggle('active', active);
        }

        // Ensures per-ticker state objects exist, regardless of how the ticker entered the watchlist
        // (typed in, loaded from PIN sync, etc.) — guards against undefined access anywhere downstream.
        function ensureTickerState(ticker) {
            if (!appState.indicators[ticker]) appState.indicators[ticker] = {sma:false, sma20:false, sma200:false, ema20:false, bb:false, rsi:false, macd:false, volume:true, pivot:false, swing:false};
            if (!appState.alerts[ticker]) appState.alerts[ticker] = [];
        }

        function renderStockCard(ticker) {
            ensureTickerState(ticker);
            const data = appState.dataCache[ticker];

            if(!data) {
                if(appState.errors[ticker]) {
                    return `
                        <div class="info-card error-card">
                            <div><strong>${ticker}</strong>: ${appState.errors[ticker]}</div>
                            <div style="display:flex;gap:8px;margin-top:8px;">
                                <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                                <button class="retry-btn" style="color:var(--sell-color)" onclick="deleteStock('${ticker}')">Remove</button>
                            </div>
                        </div>`;
                }
                return `<div class="info-card">${ticker}: Loading...</div>`;
            }

            // Guardrail: malformed/empty data shouldn't crash — show an error card instead.
            if (!Array.isArray(data.prices) || data.prices.length === 0 || !data.computed) {
                return `
                    <div class="info-card error-card">
                        <div><strong>${ticker}</strong>: No usable price data</div>
                        <div style="display:flex;gap:8px;margin-top:8px;">
                            <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                            <button class="retry-btn" style="color:var(--sell-color)" onclick="deleteStock('${ticker}')">Remove</button>
                        </div>
                    </div>`;
            }

            const prices = data.prices;
            const currentPrice = prices[prices.length-1];
            const prevPrice = prices.length > 1 ? prices[prices.length-2] : currentPrice;
            const isBullish = currentPrice >= prevPrice;

            const computed = data.computed;
            const rsiArr = computed.rsi || [];
            const smaArr = computed.sma || [];
            const rsiVal = rsiArr.length ? rsiArr[rsiArr.length-1] : null;
            const smaVal = smaArr.length ? smaArr[smaArr.length-1] : null;
            const rsi = (rsiVal !== null && rsiVal !== undefined) ? rsiVal.toFixed(1) : '—';
            const sma = (smaVal !== null && smaVal !== undefined) ? smaVal.toFixed(2) : '—';

            const comp = computed.composite || { signal: 'HOLD', reasons: [] };
            const sigClass = comp.signal === 'BUY' ? 'buy' : comp.signal === 'SELL' ? 'sell' : 'hold';

            const ui = appState.ui;
            const inds = appState.indicators[ticker];

            let alertsHtml = (appState.alerts[ticker] || []).map(a => `
                <div class="active-alert">
                    <span>${a.triggered ? '⚠️' : '🔔'} ${a.ind} ${a.cond} ${a.val}</span>
                    <button class="del-alert" onclick="deleteAlert('${ticker}', ${a.id})">✕</button>
                </div>
            `).join('');

            let newsHtml = '<div style="text-align:center;color:var(--text-sub);font-size:0.85rem;">Loading news...</div>';
            if (appState.newsCache[ticker]) {
                const newsItems = appState.newsCache[ticker] || [];
                newsHtml = newsItems.length === 0 ? '<div style="color:var(--text-sub);font-size:0.8rem;">No recent news found.</div>' :
                    newsItems.map(n => `
                    <div class="news-item">
                        <a href="${n.link || '#'}" target="_blank">${n.title || 'Untitled'}</a>
                        <div class="news-date">${n.publisher || ''} • ${n.providerPublishTime ? new Date(n.providerPublishTime*1000).toLocaleDateString() : ''}</div>
                    </div>`).join('');
            }

            let signalHtml = `
                <div class="signal-panel" id="signal-panel-${ticker}">
                    ${buildSignalInnerHTML(comp)}
                </div>`;

            return `
                <div class="stock-card sig-${sigClass}">
                    <div class="card-inner">
                        <div class="card-top">
                            <div class="card-left">
                                <h2 class="ticker">${ticker}</h2>
                                <span class="company-meta">RSI ${rsi} · SMA $${sma}</span>
                            </div>
                            <div class="card-right">
                                <h2 class="price" style="color:${isBullish ? 'var(--buy-color)' : 'var(--sell-color)'}">$${currentPrice.toFixed(2)}</h2>
                                <span class="badge ${sigClass}">${comp.signal}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Signal (tap to expand reasons) -->
                    <div class="signal-panel" id="signal-panel-${ticker}" onclick="this.classList.toggle('expanded')">
                        ${buildSignalInnerHTML(comp)}
                    </div>

                    <!-- Panel: CHART -->
                    <div class="panel chart-container ${ui.charts[ticker] ? 'active' : ''}">
                        <div class="indicator-toggles">
                            <button class="ind-btn ${inds.volume?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'volume')">Vol</button>
                            <button class="ind-btn ${inds.sma?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma')">SMA50</button>
                            <button class="ind-btn ${inds.sma20?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma20')">SMA20</button>
                            <button class="ind-btn ${inds.sma200?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma200')">SMA200</button>
                            <button class="ind-btn ${inds.ema20?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'ema20')">EMA20</button>
                            <button class="ind-btn ${inds.bb?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'bb')">BB</button>
                            <button class="ind-btn ${inds.pivot?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'pivot')">Pivots</button>
                            <button class="ind-btn ${inds.swing?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'swing')">Swings</button>
                            <span class="ind-sep"></span>
                            <button class="ind-btn ${inds.rsi?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'rsi')">RSI</button>
                            <button class="ind-btn ${inds.macd?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'macd')">MACD</button>
                        </div>
                        <div class="zoom-row">
                            <button class="zoom-btn" onclick="zoomIn('${ticker}', appState.dataCache['${ticker}']?.prices?.length||252);drawChart('${ticker}')">＋</button>
                            <button class="zoom-btn" onclick="zoomOut('${ticker}', appState.dataCache['${ticker}']?.prices?.length||252);drawChart('${ticker}')">－</button>
                            <button class="zoom-btn" onclick="zoomReset('${ticker}');drawChart('${ticker}')">1Y</button>
                        </div>
                        <div class="chart-legend-values" id="legend-${ticker}"></div>
                        <div class="canvas-wrapper" style="position:relative;">
                            <canvas id="canvas-${ticker}" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
                            <canvas id="canvas-cross-${ticker}" style="position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;"></canvas>
                        </div>
                        <div class="crosshair-tooltip" id="xhair-${ticker}" style="display:none;"></div>
                    </div>

                    <!-- Panel: NEWS -->
                    <div class="panel ${ui.news[ticker] ? 'active' : ''}">${newsHtml}</div>

                    <!-- Panel: ALERTS -->
                    <div class="panel ${ui.alerts[ticker] ? 'active' : ''}">
                        <div style="margin-bottom:8px;">${alertsHtml}</div>
                        <div style="font-size:0.72rem;color:var(--text-sub);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">New Alert</div>
                        <div class="alert-form">
                            <select id="alt-ind-${ticker}"><option value="Price">Price</option><option value="RSI">RSI</option><option value="SMA">SMA 50</option></select>
                            <select id="alt-cond-${ticker}"><option value=">">Above</option><option value="<">Below</option></select>
                            <input type="number" id="alt-val-${ticker}" placeholder="Value">
                            <button onclick="addCustomAlert('${ticker}')">Set</button>
                        </div>
                    </div>

                    <!-- Icon-only action bar -->
                    <div class="actions">
                        <button class="icon-btn ${ui.charts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'charts')" title="Chart">📈</button>
                        <button class="icon-btn ${ui.news[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'news')" title="News">📰</button>
                        <button class="icon-btn ${ui.alerts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'alerts')" title="Alerts">🔔</button>
                        <button class="icon-btn" onclick="deleteStock('${ticker}')" title="Remove">✕</button>
                    </div>
                </div>
            `;
        }

        // --- Candlestick Chart Plugin (native, no external dependency) ---
        // Registers a custom 'candlestick' chart type with Chart.js once.
        // roundRect polyfill for older browsers/WebViews
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                r = Math.min(r, w/2, h/2);
                this.beginPath();
                this.moveTo(x+r, y); this.lineTo(x+w-r, y); this.arcTo(x+w,y, x+w,y+r, r);
                this.lineTo(x+w, y+h-r); this.arcTo(x+w,y+h, x+w-r,y+h, r);
                this.lineTo(x+r, y+h); this.arcTo(x,y+h, x,y+h-r, r);
                this.lineTo(x, y+r); this.arcTo(x,y, x+r,y, r);
                this.closePath(); return this;
            };
        }

        // --- Price Action Indicators ---
        function getPivotPoints(ohlc) {
            if (!ohlc || ohlc.length < 2) return null;
            const prev = ohlc[ohlc.length - 2];
            if (!prev || prev.h === null) return null;
            const pp = (prev.h + prev.l + prev.c) / 3;
            return { pp, r1:2*pp-prev.l, r2:pp+(prev.h-prev.l), s1:2*pp-prev.h, s2:pp-(prev.h-prev.l) };
        }

        function getSwingPoints(ohlc, lookback = 5) {
            const highs = [], lows = [];
            if (!ohlc || ohlc.length < lookback*2+1) return { highs, lows };
            for (let i = lookback; i < ohlc.length-lookback; i++) {
                const c = ohlc[i];
                if (!c || c.h === null) continue;
                const win = ohlc.slice(i-lookback, i+lookback+1);
                if (win.some(w => !w || w.h === null)) continue;
                if (c.h >= Math.max(...win.map(w => w.h))) highs.push({ x:i, y:c.h });
                if (c.l <= Math.min(...win.map(w => w.l))) lows.push({ x:i, y:c.l });
            }
            return { highs, lows };
        }

        // --- Chart State (zoom/pan per ticker) ---
        // zoomState[ticker] = { start: 0.0, end: 1.0 } — fraction of total data visible
        const zoomState = {};
        function getZoom(ticker, totalLen) {
            if (!zoomState[ticker]) zoomState[ticker] = { start: 0, end: 1 };
            const z = zoomState[ticker];
            const s = Math.max(0, Math.min(1, z.start));
            const e = Math.max(0, Math.min(1, z.end));
            const minWindow = Math.max(10, Math.floor(totalLen * 0.05));
            const startIdx = Math.floor(s * totalLen);
            const endIdx = Math.min(totalLen, Math.max(startIdx + minWindow, Math.ceil(e * totalLen)));
            return { startIdx, endIdx };
        }
        function zoomIn(ticker, totalLen) {
            if (!zoomState[ticker]) zoomState[ticker] = { start:0, end:1 };
            const z = zoomState[ticker];
            const mid = (z.start + z.end) / 2;
            const half = (z.end - z.start) * 0.3;
            zoomState[ticker] = { start: Math.max(0, mid-half), end: Math.min(1, mid+half) };
        }
        function zoomOut(ticker, totalLen) {
            if (!zoomState[ticker]) zoomState[ticker] = { start:0, end:1 };
            const z = zoomState[ticker];
            const mid = (z.start + z.end) / 2;
            const half = (z.end - z.start) * 0.85;
            zoomState[ticker] = { start: Math.max(0, mid-half), end: Math.min(1, mid+half) };
        }
        function zoomReset(ticker) { zoomState[ticker] = { start:0, end:1 }; }

        // --- Master Chart Draw ---
        // Single pure-canvas renderer. No Chart.js for the chart itself.
        // Layout: [price+overlays pane] + [oscillator pane if RSI/MACD active]
        function drawChart(ticker) {
            const data = appState.dataCache[ticker];
            if (!data || !Array.isArray(data.prices) || !data.prices.length || !data.computed) return;

            const canvas = document.getElementById('canvas-' + ticker);
            if (!canvas) return;
            ensureTickerState(ticker);
            const inds = appState.indicators[ticker];
            const computed = data.computed;
            const isLight = document.body.classList.contains('light-mode');

            // Full dataset
            const allPrices = data.prices;
            const allDates  = data.dates || [];
            const allOhlc   = data.ohlc  || [];
            const hasOhlc   = allOhlc.length === allPrices.length && allOhlc.some(c => c && c.h !== null);

            // Apply zoom window
            const { startIdx, endIdx } = getZoom(ticker, allPrices.length);
            const prices = allPrices.slice(startIdx, endIdx);
            const dates  = allDates.slice(startIdx, endIdx);
            const ohlc   = allOhlc.slice(startIdx, endIdx);
            const sl     = prices.length;
            if (!sl) return;

            // Sliced computed arrays
            const sliceArr = (arr) => arr ? arr.slice(startIdx, endIdx) : [];

            // Canvas sizing
            const wrapper = canvas.parentElement;
            const W = wrapper.clientWidth  || 360;
            const hasOsc = inds.rsi || inds.macd;
            const OSC_H  = hasOsc ? 100 : 0;
            const VOL_H  = (inds.volume && hasOhlc) ? Math.floor((W < 400 ? 220 : 260) * 0.18) : 0;
            const PRICE_H = (W < 400 ? 220 : 260) - VOL_H;
            const TOTAL_H = PRICE_H + VOL_H + (hasOsc ? OSC_H + 4 : 0) + 20; // +20 for date axis
            const DATE_H  = 20;
            const PAD_L   = 4;
            const PAD_R   = 54;
            const CW      = W - PAD_L - PAD_R;

            canvas.width  = W;
            canvas.height = TOTAL_H;
            canvas.style.height = TOTAL_H + 'px';
            wrapper.style.height = TOTAL_H + 'px';

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, W, TOTAL_H);

            // Colors
            const C = {
                grid:    isLight ? '#e5e5ea' : '#1e1e2a',
                tick:    isLight ? '#8e8e93' : '#666680',
                bull:    '#00d395',
                bear:    '#ff5c5c',
                sma50:   '#f5a623',
                sma20:   '#5ac8fa',
                sma200:  '#ff9f7f',
                ema20:   '#a78bfa',
                bb:      isLight ? 'rgba(100,100,200,0.4)' : 'rgba(160,160,255,0.4)',
                rsi:     '#b58900',
                macd:    '#d33682',
                sig:     '#859900',
                divider: isLight ? '#d0d0da' : '#2a2a3a',
            };

            // ── HELPERS ──
            const slotW = CW / sl;
            const bodyW = Math.max(1, Math.min(10, slotW * 0.6));
            const toX   = (i) => PAD_L + (i + 0.5) * slotW;

            function makeYScale(values, top, height, pad=0.06) {
                const valids = values.filter(v => v !== null && v !== undefined && !isNaN(v));
                if (!valids.length) return null;
                let vMax = Math.max(...valids);
                let vMin = Math.min(...valids);
                const p = (vMax - vMin) * pad || 1;
                vMax += p; vMin -= p;
                const range = vMax - vMin;
                return {
                    vMax, vMin, range,
                    toY: (v) => top + height * (1 - (v - vMin) / range),
                    drawGrid: (steps=4, prefix='$', decimals=2) => {
                        ctx.font = '10px -apple-system,sans-serif';
                        ctx.textAlign = 'right';
                        for (let i=0; i<=steps; i++) {
                            const v = vMin + (range * i / steps);
                            const y = top + height * (1 - i/steps);
                            ctx.strokeStyle = C.grid; ctx.lineWidth = 0.5;
                            ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W-PAD_R+2, y); ctx.stroke();
                            ctx.fillStyle = C.tick;
                            ctx.fillText(prefix + v.toFixed(decimals), W-2, y+3);
                        }
                    }
                };
            }

            // ── PRICE PANE ──
            const priceTop  = 0;
            const priceH    = PRICE_H;
            const volTop    = priceTop + priceH;

            // Price scale from OHLC highs/lows (or prices if no OHLC)
            const priceValues = hasOhlc
                ? [...ohlc.filter(c=>c&&c.h!==null).flatMap(c=>[c.h,c.l])]
                : prices;
            const priceScale = makeYScale(priceValues, priceTop, priceH);
            if (!priceScale) return;

            priceScale.drawGrid(4, '$', 2);

            // Pivot lines
            if (inds.pivot && hasOhlc) {
                const pv = getPivotPoints(ohlc);
                if (pv) {
                    [{v:pv.r2,l:'R2',c:'#ff5c5c'},{v:pv.r1,l:'R1',c:'#ff9f7f'},
                     {v:pv.pp,l:'PP',c:isLight?'#6060c8':'#a0a0ff'},
                     {v:pv.s1,l:'S1',c:'#5ac8fa'},{v:pv.s2,l:'S2',c:'#00d395'}].forEach(({v,l,c}) => {
                        if (v < priceScale.vMin || v > priceScale.vMax) return;
                        const y = priceScale.toY(v);
                        ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=1; ctx.setLineDash([4,4]);
                        ctx.beginPath(); ctx.moveTo(PAD_L,y); ctx.lineTo(W-PAD_R,y); ctx.stroke();
                        ctx.setLineDash([]); ctx.fillStyle=c; ctx.font='bold 9px -apple-system,sans-serif'; ctx.textAlign='left';
                        ctx.fillText(l, PAD_L+3, y-2); ctx.restore();
                    });
                }
            }

            // MA overlays on price pane
            const drawLine = (arr, color, dash=[]) => {
                if (!arr || !arr.length) return;
                ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash(dash);
                ctx.beginPath(); let started=false;
                arr.forEach((v,i) => {
                    if (v===null||v===undefined||isNaN(v)) { started=false; return; }
                    const x=toX(i), y=priceScale.toY(v);
                    if (!started) { ctx.moveTo(x,y); started=true; } else { ctx.lineTo(x,y); }
                });
                ctx.stroke(); ctx.setLineDash([]); ctx.restore();
            };
            if (inds.sma   && computed.sma)   drawLine(sliceArr(computed.sma),   C.sma50,  [5,5]);
            if (inds.sma20 && computed.sma20)  drawLine(sliceArr(computed.sma20), C.sma20,  [5,5]);
            if (inds.sma200&& computed.sma200) drawLine(sliceArr(computed.sma200),C.sma200, [8,4]);
            if (inds.ema20 && computed.ema20)  drawLine(sliceArr(computed.ema20), C.ema20);
            if (inds.bb && computed.bb) {
                drawLine(sliceArr(computed.bb.upper), C.bb);
                drawLine(sliceArr(computed.bb.lower), C.bb);
                // BB fill
                const upper=sliceArr(computed.bb.upper), lower=sliceArr(computed.bb.lower);
                ctx.save(); ctx.fillStyle=isLight?'rgba(100,100,200,0.05)':'rgba(160,160,255,0.07)';
                ctx.beginPath(); let s2=false;
                upper.forEach((v,i)=>{ if(v===null||isNaN(v)){s2=false;return;} const x=toX(i),y=priceScale.toY(v); if(!s2){ctx.moveTo(x,y);s2=true;}else ctx.lineTo(x,y); });
                for(let i=lower.length-1;i>=0;i--){ const v=lower[i]; if(v===null||isNaN(v))continue; ctx.lineTo(toX(i),priceScale.toY(v)); }
                ctx.closePath(); ctx.fill(); ctx.restore();
            }

            // Candlesticks
            if (hasOhlc) {
                ohlc.forEach((c,i) => {
                    if (!c||c.h===null) return;
                    const isBull=c.c>=c.o, color=isBull?C.bull:C.bear, x=toX(i);
                    ctx.strokeStyle=color; ctx.lineWidth=1;
                    ctx.beginPath(); ctx.moveTo(x,priceScale.toY(c.h)); ctx.lineTo(x,priceScale.toY(c.l)); ctx.stroke();
                    const bTop=Math.min(priceScale.toY(c.o),priceScale.toY(c.c));
                    const bH=Math.max(1,Math.abs(priceScale.toY(c.c)-priceScale.toY(c.o)));
                    ctx.fillStyle=isBull?'rgba(0,211,149,0.35)':color;
                    ctx.fillRect(x-bodyW/2,bTop,bodyW,bH); ctx.strokeRect(x-bodyW/2,bTop,bodyW,bH);
                });
            } else {
                drawLine(prices, prices[prices.length-1]>=prices[0]?C.bull:C.bear);
            }

            // Swing markers
            if (inds.swing && hasOhlc) {
                const {highs,lows}=getSwingPoints(ohlc);
                const tri=(x,y,up,color)=>{
                    ctx.save(); ctx.fillStyle=color; ctx.beginPath();
                    const s=5,off=6;
                    if(up){ctx.moveTo(x,y-off-s*1.5);ctx.lineTo(x-s,y-off);ctx.lineTo(x+s,y-off);}
                    else  {ctx.moveTo(x,y+off+s*1.5);ctx.lineTo(x-s,y+off);ctx.lineTo(x+s,y+off);}
                    ctx.closePath(); ctx.fill(); ctx.restore();
                };
                highs.forEach(p=>{if(p.x<sl)tri(toX(p.x),priceScale.toY(p.y),false,C.bear);});
                lows.forEach(p=>{if(p.x<sl)tri(toX(p.x),priceScale.toY(p.y),true,C.bull);});
            }

            // Volume bars
            if (inds.volume && hasOhlc && VOL_H > 0) {
                const maxVol=Math.max(...ohlc.map(c=>c?.v||0))||1;
                ohlc.forEach((c,i)=>{
                    if(!c||!c.v)return;
                    const bh=(c.v/maxVol)*(VOL_H-4);
                    ctx.fillStyle=c.c>=c.o?'rgba(0,211,149,0.28)':'rgba(255,92,92,0.28)';
                    ctx.fillRect(toX(i)-bodyW/2, volTop+VOL_H-4-bh, bodyW, bh);
                });
                ctx.fillStyle=C.tick; ctx.font='9px -apple-system,sans-serif'; ctx.textAlign='right';
                ctx.fillText('Vol', W-2, volTop+12);
            }

            // ── OSCILLATOR PANE ──
            if (hasOsc) {
                const oscTop = PRICE_H + VOL_H + 4;
                const oscH   = OSC_H;

                // Divider line
                ctx.strokeStyle=C.divider; ctx.lineWidth=1;
                ctx.beginPath(); ctx.moveTo(PAD_L,oscTop); ctx.lineTo(W-PAD_R,oscTop); ctx.stroke();

                if (inds.rsi && computed.rsi) {
                    const rsiArr = sliceArr(computed.rsi);
                    const oscScale = makeYScale([0,100], oscTop, oscH, 0);
                    if (oscScale) {
                        // Grid lines at 30/50/70
                        [30,50,70].forEach(level => {
                            const y = oscScale.toY(level);
                            ctx.strokeStyle=level===50?C.grid:'rgba(180,120,0,0.3)'; ctx.lineWidth=0.5;
                            ctx.setLineDash(level===50?[]:[3,3]);
                            ctx.beginPath(); ctx.moveTo(PAD_L,y); ctx.lineTo(W-PAD_R,y); ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.fillStyle=C.tick; ctx.font='9px -apple-system,sans-serif'; ctx.textAlign='right';
                            ctx.fillText(level, W-2, y+3);
                        });
                        // RSI fill zones
                        ctx.save();
                        ctx.fillStyle='rgba(255,92,92,0.1)';
                        ctx.fillRect(PAD_L, oscTop, CW, oscScale.toY(70)-oscTop);
                        ctx.fillStyle='rgba(0,211,149,0.1)';
                        ctx.fillRect(PAD_L, oscScale.toY(30), CW, oscTop+oscH-oscScale.toY(30));
                        ctx.restore();
                        // RSI line
                        ctx.save(); ctx.strokeStyle=C.rsi; ctx.lineWidth=1.5;
                        ctx.beginPath(); let s3=false;
                        rsiArr.forEach((v,i)=>{ if(v===null||isNaN(v)){s3=false;return;} const x=toX(i),y=oscScale.toY(Math.max(0,Math.min(100,v))); if(!s3){ctx.moveTo(x,y);s3=true;}else ctx.lineTo(x,y); });
                        ctx.stroke(); ctx.restore();
                        // RSI label
                        ctx.fillStyle=C.rsi; ctx.font='bold 9px -apple-system,sans-serif'; ctx.textAlign='left';
                        ctx.fillText('RSI', PAD_L+3, oscTop+12);
                    }
                }

                if (inds.macd && computed.macd) {
                    const macdArr  = sliceArr(computed.macd.macd);
                    const sigArr   = sliceArr(computed.macd.signal);
                    const combined = [...macdArr, ...sigArr].filter(v=>v!==null&&!isNaN(v));
                    const oscScale = makeYScale(combined, oscTop, oscH);
                    if (oscScale) {
                        // Zero line
                        if (oscScale.vMin < 0 && oscScale.vMax > 0) {
                            const zeroY = oscScale.toY(0);
                            ctx.strokeStyle=C.divider; ctx.lineWidth=0.5;
                            ctx.beginPath(); ctx.moveTo(PAD_L,zeroY); ctx.lineTo(W-PAD_R,zeroY); ctx.stroke();
                        }
                        // MACD histogram (difference bars)
                        macdArr.forEach((v,i)=>{
                            if(v===null||isNaN(v)||!sigArr[i]||isNaN(sigArr[i]))return;
                            const diff=v-sigArr[i];
                            const zeroY=oscScale.vMin<0&&oscScale.vMax>0?oscScale.toY(0):oscScale.toY(oscScale.vMin);
                            const topY=oscScale.toY(diff);
                            const bh=Math.abs(topY-zeroY)||1;
                            ctx.fillStyle=diff>=0?'rgba(0,211,149,0.4)':'rgba(255,92,92,0.4)';
                            ctx.fillRect(toX(i)-bodyW/2, Math.min(topY,zeroY), bodyW, bh);
                        });
                        // MACD + Signal lines
                        const drawOscLine=(arr,color,dash=[])=>{
                            ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.setLineDash(dash);
                            ctx.beginPath(); let st=false;
                            arr.forEach((v,i)=>{ if(v===null||isNaN(v)){st=false;return;} const x=toX(i),y=oscScale.toY(v); if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y); });
                            ctx.stroke(); ctx.setLineDash([]); ctx.restore();
                        };
                        drawOscLine(macdArr, C.macd);
                        drawOscLine(sigArr,  C.sig, [3,3]);
                        ctx.fillStyle=C.macd; ctx.font='bold 9px -apple-system,sans-serif'; ctx.textAlign='left';
                        ctx.fillText('MACD', PAD_L+3, oscTop+12);
                    }
                }
            }

            // ── DATE AXIS ──
            const dateY = PRICE_H + VOL_H + (hasOsc ? OSC_H+4 : 0) + DATE_H - 4;
            ctx.fillStyle=C.tick; ctx.font='9px -apple-system,sans-serif'; ctx.textAlign='center';
            const every=Math.max(1,Math.floor(sl/8));
            dates.forEach((d,i)=>{ if(i%every===0) ctx.fillText(d, toX(i), dateY); });

            // ── CROSSHAIR CANVAS ──
            const crossCanvas = document.getElementById('canvas-cross-' + ticker);
            if (!crossCanvas) return;
            crossCanvas.width  = W;
            crossCanvas.height = TOTAL_H;
            crossCanvas.style.height = TOTAL_H + 'px';

            // Store layout for crosshair reuse
            crossCanvas._layout = { W, PRICE_H, VOL_H, OSC_H, DATE_H, hasOsc, PAD_L, PAD_R, CW, sl, slotW, priceScale, isLight, C, hasOhlc, ohlc, prices, dates, inds, computed, startIdx, endIdx };

            const newCross = crossCanvas.cloneNode(true);
            newCross._layout = crossCanvas._layout;
            crossCanvas.parentNode.replaceChild(newCross, crossCanvas);

            const drawCrosshair = (clientX, clientY) => {
                const L = newCross._layout;
                if (!L) return;
                const rect  = newCross.getBoundingClientRect();
                const px    = (clientX - rect.left) * (L.W / rect.width);
                const idx   = Math.max(0, Math.min(L.sl-1, Math.round((px-L.PAD_L)/L.slotW-0.5)));
                const x     = L.PAD_L + (idx+0.5)*L.slotW;
                const ctx2  = newCross.getContext('2d');
                ctx2.clearRect(0, 0, L.W, newCross.height);

                // Vertical line
                ctx2.strokeStyle=L.isLight?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.25)';
                ctx2.lineWidth=1; ctx2.setLineDash([4,3]);
                ctx2.beginPath(); ctx2.moveTo(x,0); ctx2.lineTo(x, newCross.height-L.DATE_H); ctx2.stroke(); ctx2.setLineDash([]);

                // Date pill
                const dateLabel=L.dates[idx]||'';;
                ctx2.font='bold 10px -apple-system,sans-serif'; ctx2.textAlign='center';
                const dw=ctx2.measureText(dateLabel).width+12;
                const dx=Math.max(dw/2+L.PAD_L, Math.min(L.W-L.PAD_R-dw/2, x));
                ctx2.fillStyle=L.isLight?'#444':'#bbb';
                ctx2.roundRect(dx-dw/2, newCross.height-L.DATE_H+2, dw, L.DATE_H-6, 4); ctx2.fill();
                ctx2.fillStyle=L.isLight?'#fff':'#111'; ctx2.fillText(dateLabel, dx, newCross.height-L.DATE_H+L.DATE_H-8);

                // Price label on right axis
                const c=L.hasOhlc?L.ohlc[idx]:null;
                const closePrice=c?c.c:L.prices[idx];
                if (closePrice!==null && L.priceScale) {
                    const py=L.priceScale.toY(closePrice);
                    if (py>0 && py<L.PRICE_H) {
                        // Horizontal dotted line
                        ctx2.strokeStyle=L.isLight?'rgba(0,0,0,0.15)':'rgba(255,255,255,0.15)';
                        ctx2.lineWidth=1; ctx2.setLineDash([3,3]);
                        ctx2.beginPath(); ctx2.moveTo(x,py); ctx2.lineTo(L.W-L.PAD_R+2,py); ctx2.stroke(); ctx2.setLineDash([]);
                        // Price pill
                        const priceLabel='$'+closePrice.toFixed(2);
                        ctx2.font='bold 10px -apple-system,sans-serif'; ctx2.textAlign='left';
                        const pw=ctx2.measureText(priceLabel).width+8;
                        const priceColor=c?(c.c>=c.o?'#00d395':'#ff5c5c'):'#00d395';
                        ctx2.fillStyle=priceColor;
                        ctx2.roundRect(L.W-L.PAD_R+3, py-8, pw, 16, 3); ctx2.fill();
                        ctx2.fillStyle='#fff'; ctx2.fillText(priceLabel, L.W-L.PAD_R+7, py+4);
                    }
                }

                // Tooltip below chart
                const fmt=(v,d=2)=>(v===null||v===undefined||isNaN(v))?'—':Number(v).toFixed(d);
                const getAt=(arr,i)=>(arr&&arr[i]!==undefined)?arr[i]:null;
                const parts=[];
                if(c&&c.o!==null){
                    parts.push({n:'O',c:'#888',v:fmt(c.o)});
                    parts.push({n:'H',c:'#00d395',v:fmt(c.h)});
                    parts.push({n:'L',c:'#ff5c5c',v:fmt(c.l)});
                    parts.push({n:'C',c:c.c>=c.o?'#00d395':'#ff5c5c',v:fmt(c.c)});
                    if(L.inds.volume&&c.v)parts.push({n:'Vol',c:'#888',v:(c.v/1e6).toFixed(2)+'M'});
                } else { parts.push({n:'Price',c:'#00d395',v:fmt(L.prices[idx])}); }
                const comp2=L.computed;
                if(L.inds.sma&&comp2.sma)parts.push({n:'SMA50',c:'#f5a623',v:fmt(getAt(comp2.sma.slice(L.startIdx,L.endIdx),idx))});
                if(L.inds.sma20&&comp2.sma20)parts.push({n:'SMA20',c:'#5ac8fa',v:fmt(getAt(comp2.sma20.slice(L.startIdx,L.endIdx),idx))});
                if(L.inds.sma200&&comp2.sma200)parts.push({n:'SMA200',c:'#ff9f7f',v:fmt(getAt(comp2.sma200.slice(L.startIdx,L.endIdx),idx))});
                if(L.inds.ema20&&comp2.ema20)parts.push({n:'EMA20',c:'#a78bfa',v:fmt(getAt(comp2.ema20.slice(L.startIdx,L.endIdx),idx))});
                if(L.inds.rsi&&comp2.rsi)parts.push({n:'RSI',c:'#b58900',v:fmt(getAt(comp2.rsi.slice(L.startIdx,L.endIdx),idx),1)});
                if(L.inds.macd&&comp2.macd){
                    parts.push({n:'MACD',c:'#d33682',v:fmt(getAt(comp2.macd.macd.slice(L.startIdx,L.endIdx),idx))});
                    parts.push({n:'Sig',c:'#859900',v:fmt(getAt(comp2.macd.signal.slice(L.startIdx,L.endIdx),idx))});
                }
                const tip=document.getElementById('xhair-'+ticker);
                if(tip){
                    tip.style.display='flex';
                    tip.innerHTML=`<span style="font-size:0.7rem;color:var(--text-sub);font-weight:700;margin-right:6px;">${dateLabel}</span>`
                        +parts.map(p=>`<span class="xhair-item"><span class="xhair-dot" style="background:${p.c}"></span><span class="xhair-name">${p.n}</span><span class="xhair-val">${p.v}</span></span>`).join('');
                }
            };

            const clearCrosshair=()=>{
                const ctx2=newCross.getContext('2d'); ctx2.clearRect(0,0,newCross.width,newCross.height);
                const tip=document.getElementById('xhair-'+ticker); if(tip)tip.style.display='none';
            };

            newCross.addEventListener('mousemove',(e)=>drawCrosshair(e.clientX,e.clientY));
            newCross.addEventListener('mouseleave',clearCrosshair);
            newCross.addEventListener('touchstart',(e)=>{e.preventDefault();drawCrosshair(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
            newCross.addEventListener('touchmove',(e)=>{e.preventDefault();drawCrosshair(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
            newCross.addEventListener('touchend',(e)=>{e.preventDefault();},{passive:false});

            // Scroll wheel zoom
            newCross.addEventListener('wheel',(e)=>{
                e.preventDefault();
                if(e.deltaY<0)zoomIn(ticker, allPrices.length);
                else zoomOut(ticker, allPrices.length);
                drawChart(ticker);
            },{passive:false});

            // Pinch-to-zoom (touch)
            let lastPinchDist=null;
            newCross.addEventListener('touchstart',(e)=>{
                if(e.touches.length===2){
                    lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
                }
            },{passive:true});
            newCross.addEventListener('touchmove',(e)=>{
                if(e.touches.length===2&&lastPinchDist!==null){
                    e.preventDefault();
                    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
                    if(dist>lastPinchDist*1.06)zoomIn(ticker,allPrices.length);
                    else if(dist<lastPinchDist*0.94)zoomOut(ticker,allPrices.length);
                    lastPinchDist=dist;
                    drawChart(ticker);
                }
            },{passive:false});
            newCross.addEventListener('touchend',()=>{lastPinchDist=null;},{passive:true});

            // ── LEGEND ──
            const lastValid=(arr)=>{
                if(!arr?.length)return null;
                for(let i=arr.length-1;i>=0;i--){if(arr[i]!==null&&arr[i]!==undefined&&!isNaN(arr[i]))return arr[i];}
                return null;
            };
            const fmt2=(v,d=2)=>v===null?'—':Number(v).toFixed(d);
            const lastC=hasOhlc?ohlc[ohlc.length-1]:null;
            const items=[];
            if(lastC?.o!==null&&lastC?.o!==undefined){
                items.push({n:'O',c:'#888',v:fmt2(lastC.o)});
                items.push({n:'H',c:C.bull,v:fmt2(lastC.h)});
                items.push({n:'L',c:C.bear,v:fmt2(lastC.l)});
                items.push({n:'C',c:lastC.c>=lastC.o?C.bull:C.bear,v:fmt2(lastC.c)});
                if(inds.volume&&lastC.v)items.push({n:'Vol',c:'#888',v:(lastC.v/1e6).toFixed(2)+'M'});
            } else { items.push({n:'Price',c:C.bull,v:fmt2(prices[prices.length-1])}); }
            if(inds.sma&&computed.sma)items.push({n:'SMA50',c:C.sma50,v:fmt2(lastValid(sliceArr(computed.sma)))});
            if(inds.sma20&&computed.sma20)items.push({n:'SMA20',c:C.sma20,v:fmt2(lastValid(sliceArr(computed.sma20)))});
            if(inds.sma200&&computed.sma200)items.push({n:'SMA200',c:C.sma200,v:fmt2(lastValid(sliceArr(computed.sma200)))});
            if(inds.ema20&&computed.ema20)items.push({n:'EMA20',c:C.ema20,v:fmt2(lastValid(sliceArr(computed.ema20)))});
            if(inds.bb&&computed.bb){items.push({n:'BB↑',c:C.bb,v:fmt2(lastValid(sliceArr(computed.bb.upper)))});items.push({n:'BB↓',c:C.bb,v:fmt2(lastValid(sliceArr(computed.bb.lower)))});}
            if(inds.rsi&&computed.rsi)items.push({n:'RSI',c:C.rsi,v:fmt2(lastValid(sliceArr(computed.rsi)),1)});
            if(inds.macd&&computed.macd){items.push({n:'MACD',c:C.macd,v:fmt2(lastValid(sliceArr(computed.macd.macd)))});items.push({n:'Sig',c:C.sig,v:fmt2(lastValid(sliceArr(computed.macd.signal)))});}
            if(computed.adx){const av=lastValid(sliceArr(computed.adx));items.push({n:'ADX',c:av!==null&&av>25?C.bull:C.bear,v:av===null?'—':av.toFixed(1)});}
            const leg=document.getElementById('legend-'+ticker);
            if(leg)leg.innerHTML=items.map(it=>`<span class="legend-item"><span class="legend-dot" style="background:${it.c}"></span><span class="legend-name">${it.n}</span><span class="legend-value">${it.v}</span></span>`).join('');
        }
        // --- App Interactions ---
        async function toggleUI(ticker, type, key) {
            if (type === 'panel') {
                let state = appState.ui[key][ticker];
                appState.ui.charts[ticker] = appState.ui.news[ticker] = appState.ui.alerts[ticker] = false;
                appState.ui[key][ticker] = !state;

                if (key === 'news' && !appState.newsCache[ticker]) {
                    renderUI();
                    appState.newsCache[ticker] = await fetchNews(ticker);
                }
                // Panel toggle always needs full render (panel visibility changes DOM structure)
                renderUI();
                return;
            }

            if (type === 'ind') {
                const newVal = !appState.indicators[ticker][key];
                appState.indicators[ticker][key] = newVal;
                // Targeted: just toggle the button class and redraw this ticker's chart
                updateIndicatorButton(ticker, key, newVal);
                // Debounced localStorage write
                clearTimeout(_indSaveTimer);
                _indSaveTimer = setTimeout(() => {
                    localStorage.setItem('indicators', JSON.stringify(appState.indicators));
                }, 500);
                // Redraw only this ticker's chart (not all cards)
                if (appState.ui.charts[ticker] && appState.dataCache[ticker]) {
                    try { drawChart(ticker); } catch(e) { console.error('drawChart failed:', e); }
                }
                return;
            }
        }
        let _indSaveTimer = null;

        function addStock() {
            const val = document.getElementById('tickerInput').value.toUpperCase().trim();
            const input = document.getElementById('tickerInput');

            if (!val) return;

            // Validate ticker format: 1–6 uppercase letters/numbers, optionally with . or -
            // Rejects full names like "Netflix", "Apple Inc", etc.
            if (!/^[A-Z0-9]{1,6}([.\-][A-Z0-9]{1,4})?$/.test(val)) {
                input.style.borderColor = 'var(--sell-color)';
                input.placeholder = 'Use symbol e.g. NFLX, AAPL';
                setTimeout(() => {
                    input.style.borderColor = '';
                    input.placeholder = 'Ticker…';
                }, 2500);
                return;
            }

            if (appState.watchlist.includes(val)) {
                input.style.borderColor = 'var(--hold-color)';
                input.placeholder = `${val} already added`;
                setTimeout(() => {
                    input.style.borderColor = '';
                    input.placeholder = 'Ticker…';
                }, 2000);
                return;
            }

            appState.watchlist.unshift(val);
            persistWatchlist();
            input.value = '';
            document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
            updateData();
        }

        function deleteStock(ticker) {
            appState.watchlist = appState.watchlist.filter(t => t !== ticker);
            delete appState.dataCache[ticker];
            delete appState.errors[ticker];
            persistWatchlist();
            renderUI();
        }

        function retryStock(ticker) {
            ensureTickerState(ticker);
            delete appState.errors[ticker];
            renderUI();
            (async () => {
                try {
                    const data = await fetchStockData(ticker);
                    if (!Array.isArray(data.prices) || !data.prices.length) {
                        throw new Error('No price data returned');
                    }
                    data.computed = computeIndicatorSet(data.prices, data.ohlc);
                    appState.dataCache[ticker] = data;
                    delete appState.errors[ticker];
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                    delete appState.dataCache[ticker];
                }
                renderUI();
            })();
        }

        // Guardrail: if anything unforeseen crashes outside our try/catch blocks,
        // show it instead of leaving a silent "Initializing Data..." or blank page.
        window.addEventListener('error', (event) => {
            console.error('Unhandled error:', event.error);
            const container = document.getElementById('watchlist');
            if (container && container.innerHTML.includes('Initializing Data')) {
                container.innerHTML = `<div class="info-card error-card">
                    <div>Something went wrong loading the app: ${event.message || 'unknown error'}</div>
                    <button class="retry-btn" onclick="location.reload()">Reload</button>
                </div>`;
            }
        });
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled promise rejection:', event.reason);
        });

        // Initialize App
        document.getElementById('tickerInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addStock();
        });
        updateData();
        setInterval(updateData, CONFIG.REFRESH_MS);
    </script>
</body>
</html>
