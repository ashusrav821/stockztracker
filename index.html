<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Pro Tracker</title>
    <meta name="theme-color" id="theme-meta" content="#000000">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Dark Theme --- */
        :root {
            --bg-base: #0a0a0f;
            --header-bg: #0a0a0f;
            --card-bg: #111118;
            --card-border: #1e1e2a;
            --text-main: #f0f0f8;
            --text-sub: #6b6b80;
            --text-mid: #9898b0;
            --accent: #6c63ff;
            --accent-dim: rgba(108, 99, 255, 0.12);
            --buy-color: #00d395;
            --buy-dim: rgba(0, 211, 149, 0.12);
            --sell-color: #ff5c5c;
            --sell-dim: rgba(255, 92, 92, 0.12);
            --hold-color: #f5a623;
            --hold-dim: rgba(245, 166, 35, 0.12);
            --input-bg: #16161f;
            --input-border: #2a2a3a;
            --hover-bg: #1a1a26;
            --divider: #1e1e2a;
            --stripe-buy: var(--buy-color);
            --stripe-sell: var(--sell-color);
            --stripe-hold: var(--hold-color);
        }

        /* --- Light Theme --- */
        body.light-mode {
            --bg-base: #f4f4f8;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --card-border: #e8e8f0;
            --text-main: #0f0f1a;
            --text-sub: #9090a8;
            --text-mid: #6060788;
            --accent: #5b54e8;
            --accent-dim: rgba(91, 84, 232, 0.08);
            --buy-color: #00b87c;
            --buy-dim: rgba(0, 184, 124, 0.08);
            --sell-color: #e84040;
            --sell-dim: rgba(232, 64, 64, 0.08);
            --hold-color: #d4880a;
            --hold-dim: rgba(212, 136, 10, 0.08);
            --input-bg: #f4f4f8;
            --input-border: #dcdce8;
            --hover-bg: #ebebf4;
            --divider: #e8e8f0;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-variant-numeric: tabular-nums;
        }

        /* ---- HEADER ---- */
        header {
            padding: 48px 14px 0;
            background: var(--header-bg);
            border-bottom: 1px solid var(--divider);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.4px;
            color: var(--text-main);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .header-actions { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: flex-end; }

        /* Inline search (compact, right side of header) */
        .search-inline { display: flex; gap: 0; flex: 1; max-width: 200px; }
        .search-inline input {
            flex: 1;
            padding: 8px 10px;
            font-size: 0.88rem;
            font-weight: 600;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-right: none;
            color: var(--text-main);
            border-radius: 10px 0 0 10px;
            text-transform: uppercase;
            min-width: 0;
        }
        .search-inline input::placeholder { font-weight: 400; text-transform: none; color: var(--text-sub); font-size: 0.8rem; }
        .search-inline input:focus { border-color: var(--accent); background: var(--hover-bg); }
        .search-inline button {
            padding: 0 12px;
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
        }

        /* Icon pill buttons */
        .icon-pill {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            padding: 6px 9px;
            line-height: 1;
            flex-shrink: 0;
        }

        /* Sync drawer */
        .sync-drawer { padding-bottom: 8px; }
        .sync-row { display: flex; gap: 6px; align-items: center; }
        .sync-row input {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.85rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 10px;
            letter-spacing: 3px;
        }
        .sync-row input::placeholder { letter-spacing: 0; font-size: 0.78rem; color: var(--text-sub); }
        .sync-row button {
            padding: 8px 12px;
            font-size: 0.78rem;
            font-weight: 700;
            background: var(--input-bg);
            color: var(--text-mid);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            cursor: pointer;
        }
        .sync-row button.primary { background: var(--accent); color: white; border-color: transparent; }
        .sync-status { font-size: 0.7rem; color: var(--text-sub); min-height: 12px; margin-top: 3px; }
        .sync-status.error { color: var(--sell-color); }
        .sync-status.ok { color: var(--buy-color); }

        /* Tabs */
        .tab-row { display: flex; gap: 0; margin-top: 2px; }
        .tab-btn {
            flex: 1;
            padding: 10px 0 8px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-sub);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ---- MAIN ---- */
        main { flex: 1; overflow-y: auto; padding: 10px 12px; }

        /* ---- CARD ---- */
        .stock-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
        }

        .stock-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 16px 0 0 16px;
        }
        .stock-card.sig-buy::before { background: var(--buy-color); }
        .stock-card.sig-sell::before { background: var(--sell-color); }
        .stock-card.sig-hold::before { background: var(--hold-color); }

        .card-inner { padding: 10px 10px 0 14px; }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-left { display: flex; align-items: center; gap: 10px; }
        .card-right { display: flex; align-items: center; gap: 8px; }

        .ticker {
            font-size: 1.1rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.2px;
            line-height: 1;
        }
        .company-meta { font-size: 0.68rem; color: var(--text-sub); }

        .price {
            font-size: 1.15rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.4px;
            line-height: 1;
        }

        /* Badge */
        .badge {
            padding: 2px 7px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.buy { background: var(--buy-dim); color: var(--buy-color); }
        .badge.sell { background: var(--sell-dim); color: var(--sell-color); }
        .badge.hold { background: var(--hold-dim); color: var(--hold-color); }

        /* Signal panel — compact, collapsible reasons */
        .signal-panel {
            background: var(--input-bg);
            border-radius: 10px;
            padding: 8px 10px;
            margin: 8px 10px 0 14px;
            cursor: pointer;
        }
        .signal-header { display: flex; align-items: center; gap: 8px; }
        .confidence-bar-wrap { flex: 1; height: 3px; background: var(--divider); border-radius: 4px; overflow: hidden; }
        .confidence-bar { display: block; height: 100%; border-radius: 4px; }
        .confidence-label { font-size: 0.65rem; color: var(--text-sub); white-space: nowrap; font-weight: 600; }
        .signal-reasons {
            margin: 6px 0 0;
            padding-left: 14px;
            font-size: 0.73rem;
            color: var(--text-sub);
            line-height: 1.6;
            display: none; /* collapsed by default */
        }
        .signal-panel.expanded .signal-reasons { display: block; }
        .signal-expand-hint { font-size: 0.62rem; color: var(--text-sub); margin-left: auto; flex-shrink: 0; }
        .signal-levels {
            display: flex; gap: 10px; flex-wrap: wrap;
            margin-top: 6px; padding-top: 6px;
            border-top: 1px solid var(--divider);
            font-size: 0.7rem; color: var(--text-sub);
            display: none;
        }
        .signal-panel.expanded .signal-levels { display: flex; }
        .signal-levels strong { color: var(--text-main); font-weight: 700; }

        /* Action bar — icon only, compact */
        .actions {
            display: flex;
            border-top: 1px solid var(--divider);
            margin: 8px 0 0;
        }
        .icon-btn {
            flex: 1;
            background: transparent;
            border: none;
            border-right: 1px solid var(--divider);
            color: var(--text-sub);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 8px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        .icon-btn:last-child { border-right: none; }
        .icon-btn.active { color: var(--accent); background: var(--accent-dim); }
        .icon-btn:active { background: var(--hover-bg); }

        /* Panels */
        .panel { display: none; padding: 12px 14px 14px 18px; border-top: 1px solid var(--divider); }
        .panel.active { display: block; }

        /* Chart */
        .canvas-wrapper { height: 280px; width: 100%; }
        .indicator-toggles {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            overflow-x: auto;
            padding-bottom: 2px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .indicator-toggles::-webkit-scrollbar { display: none; }
        .ind-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-sub);
            padding: 5px 11px;
            border-radius: 20px;
            font-size: 0.73rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: 0.2px;
            transition: all 0.15s;
        }
        .ind-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* Crosshair tooltip */
        .crosshair-tooltip {
            font-size: 0.74rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            line-height: 1.4;
        }
        .xhair-item { display: flex; align-items: center; gap: 4px; }
        .xhair-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .xhair-name { color: var(--text-sub); font-weight: 600; }
        .xhair-val { color: var(--text-main); font-weight: 700; }
        .chart-legend-values {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--divider);
        }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.74rem; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .legend-name { color: var(--text-sub); font-weight: 600; }
        .legend-value { color: var(--text-main); font-weight: 700; }

        /* News */
        .news-item { padding: 10px 0; border-bottom: 1px solid var(--divider); }
        .news-item:last-child { border-bottom: none; }
        .news-item a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .news-date { font-size: 0.7rem; color: var(--text-sub); }

        /* Alerts */
        .alert-form { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .alert-form select, .alert-form input {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--input-border);
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.82rem;
        }
        .alert-form input { flex: 1; min-width: 80px; }
        .alert-form button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.82rem;
        }
        .active-alert {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--input-bg);
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 0.82rem;
            border-left: 3px solid var(--accent);
        }
        .del-alert { background: transparent; color: var(--sell-color); border: none; cursor: pointer; font-weight: 700; }

        /* Signal panel */
        .signal-panel {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 12px 14px;
            margin: 10px 14px 10px 18px;
        }
        .signal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .confidence-bar-wrap {
            flex: 1;
            height: 4px;
            background: var(--divider);
            border-radius: 4px;
            overflow: hidden;
        }
        .confidence-bar { display: block; height: 100%; border-radius: 4px; transition: width 0.4s ease; }
        .confidence-label { font-size: 0.7rem; color: var(--text-sub); white-space: nowrap; font-weight: 600; }
        .signal-reasons { margin: 0; padding-left: 16px; font-size: 0.77rem; color: var(--text-sub); line-height: 1.7; }
        .signal-levels {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--divider);
            font-size: 0.75rem;
            color: var(--text-sub);
        }
        .signal-levels strong { color: var(--text-main); font-weight: 700; }

        /* Info / error cards */
        .info-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 20px;
            text-align: center;
            color: var(--text-sub);
            font-size: 0.88rem;
        }
        .info-card.error-card { border-color: rgba(255, 92, 92, 0.25); color: var(--sell-color); }
        .retry-btn {
            margin-top: 10px;
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--input-border);
            padding: 7px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Guide */
        .guide-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 10px;
            padding: 16px;
        }
        .guide-section h3 { margin: 0 0 6px; font-size: 0.95rem; font-weight: 700; letter-spacing: -0.2px; }
        .guide-section p { margin: 0 0 8px; font-size: 0.82rem; color: var(--text-sub); line-height: 1.55; }
        .guide-section p:last-child { margin-bottom: 0; }
        .guide-formula {
            font-family: "SF Mono", "Fira Code", Menlo, monospace;
            font-size: 0.72rem;
            background: var(--input-bg);
            padding: 10px 12px;
            border-radius: 10px;
            display: block;
            margin: 8px 0;
            color: var(--accent);
            overflow-x: auto;
            white-space: pre;
            border-left: 2px solid var(--accent);
        }
        .guide-section ul { margin: 6px 0; padding-left: 18px; font-size: 0.82rem; color: var(--text-sub); line-height: 1.65; }
        .guide-section li strong { color: var(--text-main); }
    </style>
</head>
<body>

    <header>
        <!-- Row 1: Title + search + controls -->
        <div class="header-top">
            <h1>Stockz Tracker</h1>
            <div class="header-actions">
                <div class="search-inline">
                    <input type="text" id="tickerInput" placeholder="Ticker…" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
                    <button onclick="addStock()">+</button>
                </div>
                <button class="icon-pill" onclick="toggleSyncDrawer()" id="syncIcon" title="Cloud Sync">☁</button>
                <button class="icon-pill" onclick="toggleTheme()" id="themeIcon">🌙</button>
            </div>
        </div>

        <!-- Sync drawer: hidden by default, slides in when ☁ tapped -->
        <div class="sync-drawer" id="syncDrawer" style="display:none;">
            <div class="sync-row">
                <input type="text" id="pinInput" placeholder="PIN (4–12 digits)" inputmode="numeric" maxlength="12">
                <button onclick="loadFromPin()">Load</button>
                <button class="primary" onclick="saveToPin()">Save</button>
            </div>
            <div class="sync-status" id="syncStatus"></div>
        </div>

        <!-- Tabs -->
        <div class="tab-row">
            <button class="tab-btn active" id="tab-portfolio" onclick="switchTab('portfolio')">Portfolio</button>
            <button class="tab-btn" id="tab-guide" onclick="switchTab('guide')">Guide</button>
        </div>
    </header>

    <main id="watchlist">
        <div class="info-card">Initializing Data...</div>
    </main>

    <main id="guideView" style="display:none;"></main>

    <script>
        // --- Theme Management ---
        function applyTheme(mode) {
            if (mode === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').innerText = '☀️';
                document.getElementById('theme-meta').setAttribute('content', '#f2f2f7');
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('themeIcon').innerText = '🌙';
                document.getElementById('theme-meta').setAttribute('content', '#000000');
            }
        }

        function toggleTheme() {
            const isLight = document.body.classList.contains('light-mode');
            const newMode = isLight ? 'dark' : 'light';
            localStorage.setItem('theme', newMode);
            applyTheme(newMode);
            renderUI();
        }

        function toggleSyncDrawer() {
            const drawer = document.getElementById('syncDrawer');
            const icon = document.getElementById('syncIcon');
            const isOpen = drawer.style.display !== 'none';
            drawer.style.display = isOpen ? 'none' : 'block';
            icon.style.background = isOpen ? '' : 'var(--accent)';
            icon.style.color = isOpen ? '' : 'white';
            icon.style.borderColor = isOpen ? '' : 'transparent';
            if (!isOpen) {
                // Pre-fill PIN if we have one saved
                document.getElementById('pinInput').value = appState.pin;
            }
        }

        // --- Tab Switching ---
        function switchTab(tab) {
            const portfolio = document.getElementById('watchlist');
            const guide = document.getElementById('guideView');
            const tabPortfolio = document.getElementById('tab-portfolio');
            const tabGuide = document.getElementById('tab-guide');

            if (tab === 'guide') {
                portfolio.style.display = 'none';
                guide.style.display = 'block';
                tabPortfolio.classList.remove('active');
                tabGuide.classList.add('active');
                if (!guide.dataset.rendered) {
                    guide.innerHTML = getGuideHTML();
                    guide.dataset.rendered = '1';
                }
            } else {
                portfolio.style.display = '';
                guide.style.display = 'none';
                tabGuide.classList.remove('active');
                tabPortfolio.classList.add('active');
            }
        }

        // --- Indicator Guide Content ---
        function getGuideHTML() {
            return `
                <div class="guide-section">
                    <h3>SMA — Simple Moving Average</h3>
                    <p>The average closing price over the last N days. SMA(50) and SMA(20) smooth out daily noise to show the underlying trend. Price above the SMA generally signals an uptrend; below signals a downtrend.</p>
                    <span class="guide-formula">SMA = (sum of last N closes) / N</span>
                </div>

                <div class="guide-section">
                    <h3>EMA — Exponential Moving Average</h3>
                    <p>Like SMA, but weights recent prices more heavily, so it reacts faster to new price action. EMA(20) is more responsive than SMA(20) and is often used to catch trend changes earlier.</p>
                    <span class="guide-formula">EMA(today) = (Price × k) + (EMA(yesterday) × (1 − k))
where k = 2 / (N + 1)</span>
                </div>

                <div class="guide-section">
                    <h3>Bollinger Bands</h3>
                    <p>A band around a moving average, set N standard deviations above and below. Price hugging the upper band suggests overbought conditions; hugging the lower band suggests oversold. Bands widen when volatility increases and narrow when it decreases.</p>
                    <span class="guide-formula">Middle = SMA(20)
Upper/Lower = SMA(20) ± (2 × std. deviation of last 20 closes)</span>
                </div>

                <div class="guide-section">
                    <h3>RSI — Relative Strength Index</h3>
                    <p>Measures the speed and size of recent price changes on a 0–100 scale. Traditionally, RSI above 70 suggests overbought (potential pullback), and below 30 suggests oversold (potential bounce). RSI works best in ranging markets — during strong trends it can stay overbought/oversold for a long time.</p>
                    <span class="guide-formula">RS = avg gain (14d) / avg loss (14d)
RSI = 100 − (100 / (1 + RS))</span>
                </div>

                <div class="guide-section">
                    <h3>MACD — Moving Average Convergence Divergence</h3>
                    <p>Shows the relationship between two EMAs (12 and 26 period) as a momentum oscillator. When the MACD line crosses above its signal line, momentum is shifting bullish; crossing below suggests bearish momentum.</p>
                    <span class="guide-formula">MACD line = EMA(12) − EMA(26)
Signal line = EMA(9) of MACD line</span>
                </div>

                <div class="guide-section">
                    <h3>SMA 200 — Long-term Trend Filter</h3>
                    <p>The 200-day simple moving average is the most widely used long-term trend indicator. Price above SMA200 = long-term uptrend; price below = long-term downtrend. The <strong>Golden Cross</strong> (SMA50 crossing above SMA200) and <strong>Death Cross</strong> (SMA50 crossing below SMA200) are the most cited trend-change signals in all of technical analysis.</p>
                    <p>SMA200 appears as a warning in the signal reasons if your BUY/SELL signal is going against the long-term trend — it won't block the signal, but flags the higher risk.</p>
                </div>

                <div class="guide-section">
                    <h3>ADX — Average Directional Index (Trend Strength)</h3>
                    <p>ADX measures <em>how strong</em> a trend is on a 0–100 scale — it does not indicate direction (that comes from SMA/price). Displayed in green when strong, red when weak.</p>
                    <ul>
                        <li><strong>ADX &gt; 25</strong> — real trend confirmed, signals are more reliable</li>
                        <li><strong>ADX &lt; 20</strong> — choppy/ranging market, breakout/crossover signals are frequently false</li>
                    </ul>
                    <p>ADX is always shown in the chart legend regardless of which indicators are toggled — it's context for trusting everything else.</p>
                </div>

                <div class="guide-section">
                    <h3>How the Signal Is Calculated</h3>
                    <p>The BUY/SELL/HOLD badge uses a two-factor rule based on RSI and SMA(50):</p>
                    <ul>
                        <li><strong>BUY</strong> — RSI oversold (&lt;30) <em>and</em> price above SMA(50)</li>
                        <li><strong>SELL</strong> — RSI overbought (&gt;70) <em>and</em> price below SMA(50)</li>
                        <li><strong>HOLD</strong> — anything else (mixed signals)</li>
                    </ul>
                    <p>The <strong>reasons list</strong> below the badge shows additional context — SMA200 long-term trend alignment, and ADX trend strength — which do not change the signal but tell you how much to trust it. An ⚠ caution appears when the signal conflicts with the SMA200 direction.</p>
                    <p style="margin-top:10px;"><em>This is decision support based on technical indicators only — not financial advice. Past patterns don't guarantee future price action, and signals are less reliable in low-ADX choppy markets.</em></p>
                </div>
            `;
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        // --- Config ---
        const CONFIG = {
            WORKER_BASE: 'https://stock-tracker-api.oletyashrith.workers.dev',
            REFRESH_MS: 60000,
            CHART_WINDOW_DAYS: 252, // ~1 trading year
            SMA_PERIOD: 50,
            RSI_PERIOD: 14,
            BB_PERIOD: 20,
            BB_MULT: 2,
            MACD_FAST: 12,
            MACD_SLOW: 26,
            MACD_SIGNAL: 9,
        };

        // --- State Management Engine ---
        let appState = {
            watchlist: JSON.parse(localStorage.getItem('stocks')) || ['AAPL', 'TSLA', 'MSFT'],
            alerts: JSON.parse(localStorage.getItem('alerts')) || {}, 
            indicators: JSON.parse(localStorage.getItem('indicators')) || {},
            ui: { charts: {}, news: {}, alerts: {} },
            dataCache: {},
            newsCache: {},
            errors: {},
            pin: localStorage.getItem('syncPin') || ''
        };

        window.myCharts = {};

        // Crosshair Chart Plugin (Dynamically colored)
        Chart.register({
            id: 'crosshair',
            afterDraw: chart => {
                if (chart.tooltip?._active?.length) {
                    let x = chart.tooltip._active[0].element.x, yAxis = chart.scales.y, ctx = chart.ctx;
                    const isLight = document.body.classList.contains('light-mode');
                    ctx.save(); ctx.beginPath(); ctx.moveTo(x, yAxis.top); ctx.lineTo(x, yAxis.bottom);
                    ctx.lineWidth = 1.5; 
                    ctx.strokeStyle = isLight ? 'rgba(0, 0, 0, 0.2)' : 'rgba(255, 255, 255, 0.2)'; 
                    ctx.setLineDash([4, 4]);
                    ctx.stroke(); ctx.restore();
                }
            }
        });

        // --- Math & Indicator Logic ---
        function getSMAArray(prices, period = CONFIG.SMA_PERIOD) { return prices.map((v, i, arr) => i < period - 1 ? null : arr.slice(i - period + 1, i + 1).reduce((a,b)=>a+b)/period); }
        function getEMAArray(prices, period) { let k = 2/(period+1), ema = [], prev = null; for(let i=0; i<prices.length; i++) { if(i===0){prev=prices[i];ema.push(prev);} else {prev=(prices[i]-prev)*k+prev;ema.push(prev);} } return ema; }
        function getBBArray(prices, period = CONFIG.BB_PERIOD, mult = CONFIG.BB_MULT) { let upper=[], lower=[]; prices.forEach((v, i, arr)=>{ if(i<period-1){upper.push(null);lower.push(null);return;} let slice=arr.slice(i-period+1, i+1), mean=slice.reduce((a,b)=>a+b)/period, variance=slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/period, std=Math.sqrt(variance); upper.push(mean+mult*std); lower.push(mean-mult*std); }); return {upper, lower}; }
        function getRSIArray(prices, period = CONFIG.RSI_PERIOD) { let rsi=[], gains=0, losses=0; for(let i=0; i<prices.length; i++) { if(i<period){rsi.push(null);continue;} if(i===period){for(let j=1;j<=period;j++){let d=prices[j]-prices[j-1]; if(d>0)gains+=d; else losses-=d;} }else{let d=prices[i]-prices[i-1]; gains=((gains*(period-1))+(d>0?d:0))/period; losses=((losses*(period-1))+(d<0?-d:0))/period; } let rs=losses===0?100:gains/losses; rsi.push(100-(100/(1+rs))); } return rsi; }
        function getMACDArray(prices, fast = CONFIG.MACD_FAST, slow = CONFIG.MACD_SLOW, signalPeriod = CONFIG.MACD_SIGNAL) { let emaFast=getEMAArray(prices, fast), emaSlow=getEMAArray(prices, slow), macd=prices.map((_,i)=>i>=slow-1 ? emaFast[i]-emaSlow[i] : null); let validMacd = macd.filter(x=>x!==null); let signalValid = getEMAArray(validMacd, signalPeriod); let signal = Array(macd.length - signalValid.length).fill(null).concat(signalValid); return {macd, signal}; }

        // ADX (Average Directional Index) — Wilder's smoothing. Measures trend STRENGTH (0-100),
        // not direction. >25 = real trend worth trusting, <20 = choppy/range-bound, signals less reliable.
        // Requires OHLC (high/low); returns all-null array if unavailable so callers can degrade gracefully.
        function getADXArray(ohlc, period = 14) {
            const len = ohlc.length;
            const nullArr = () => new Array(len).fill(null);
            if (!ohlc.length || ohlc[0].h === null || ohlc[0].h === undefined) return nullArr();

            const tr = nullArr(), plusDM = nullArr(), minusDM = nullArr();
            for (let i = 1; i < len; i++) {
                if (ohlc[i].h === null || ohlc[i-1].h === null) continue;
                const upMove = ohlc[i].h - ohlc[i-1].h;
                const downMove = ohlc[i-1].l - ohlc[i].l;
                plusDM[i] = (upMove > downMove && upMove > 0) ? upMove : 0;
                minusDM[i] = (downMove > upMove && downMove > 0) ? downMove : 0;
                const prevClose = ohlc[i-1].c;
                tr[i] = Math.max(ohlc[i].h - ohlc[i].l, Math.abs(ohlc[i].h - prevClose), Math.abs(ohlc[i].l - prevClose));
            }

            const smooth = (arr) => {
                const out = nullArr();
                let prev = null;
                for (let i = 0; i < len; i++) {
                    if (arr[i] === null) continue;
                    if (prev === null) {
                        const slice = arr.slice(Math.max(0, i - period + 1), i + 1).filter(x => x !== null);
                        if (slice.length < period) continue;
                        prev = slice.reduce((a,b)=>a+b, 0);
                        out[i] = prev;
                    } else {
                        prev = prev - (prev / period) + arr[i];
                        out[i] = prev;
                    }
                }
                return out;
            };

            const sTR = smooth(tr), sPlusDM = smooth(plusDM), sMinusDM = smooth(minusDM);
            const dx = nullArr();
            for (let i = 0; i < len; i++) {
                if (sTR[i] === null || sTR[i] === 0) continue;
                const plusDI = 100 * sPlusDM[i] / sTR[i];
                const minusDI = 100 * sMinusDM[i] / sTR[i];
                const sum = plusDI + minusDI;
                dx[i] = sum === 0 ? 0 : 100 * Math.abs(plusDI - minusDI) / sum;
            }

            const adx = nullArr();
            let prevAdx = null;
            const dxStart = dx.findIndex(x => x !== null);
            if (dxStart === -1) return adx;
            for (let i = dxStart; i < len; i++) {
                if (dx[i] === null) continue;
                if (prevAdx === null) {
                    if (i < dxStart + period - 1) continue;
                    const slice = dx.slice(dxStart, dxStart + period).filter(x => x !== null);
                    if (!slice.length) continue;
                    prevAdx = slice.reduce((a,b)=>a+b, 0) / slice.length;
                    adx[i] = prevAdx;
                } else {
                    prevAdx = (prevAdx * (period - 1) + dx[i]) / period;
                    adx[i] = prevAdx;
                }
            }
            return adx;
        }

        // Simple signal: RSI + price-vs-SMA50 crossover, confirmed by SMA200 long-term trend
        // and ADX trend strength. No external data dependencies (news/sentiment).
        function getSimpleSignal(prices, computed) {
            const i = prices.length - 1;
            const currentPrice = prices[i];
            const rsi = computed.rsi[i];
            const sma = computed.sma[i];
            const sma200 = computed.sma200 ? computed.sma200[i] : null;
            const adx = computed.adx ? computed.adx[i] : null;
            const reasons = [];
            let signal = 'HOLD';

            if (rsi !== null) {
                if (rsi < 30) reasons.push(`RSI oversold (${rsi.toFixed(1)})`);
                else if (rsi > 70) reasons.push(`RSI overbought (${rsi.toFixed(1)})`);
            }
            if (sma !== null) {
                reasons.push(currentPrice > sma ? `Price above SMA${CONFIG.SMA_PERIOD}` : `Price below SMA${CONFIG.SMA_PERIOD}`);
            }
            if (sma200 !== null) {
                reasons.push(currentPrice > sma200 ? 'Long-term trend (SMA200) bullish' : 'Long-term trend (SMA200) bearish');
            }
            if (adx !== null) {
                reasons.push(adx > 25 ? `Trend confirmed strong (ADX ${adx.toFixed(1)})` : `Trend weak/choppy (ADX ${adx.toFixed(1)}) — signal less reliable`);
            }

            if (rsi !== null && sma !== null) {
                if (rsi < 30 && currentPrice > sma) signal = 'BUY';
                else if (rsi > 70 && currentPrice < sma) signal = 'SELL';
            }

            // Long-term trend confirmation: if SMA200 disagrees with the signal direction, flag it
            // rather than overriding — this keeps the core rule unchanged but adds a visible caveat.
            if (signal === 'BUY' && sma200 !== null && currentPrice < sma200) {
                reasons.push('⚠ Caution: against the long-term (SMA200) downtrend');
            }
            if (signal === 'SELL' && sma200 !== null && currentPrice > sma200) {
                reasons.push('⚠ Caution: against the long-term (SMA200) uptrend');
            }

            return { signal, reasons };
        }

        // Compute and cache all indicator arrays for a ticker's full price history.
        // Avoids recomputing on every render / chart redraw.
        function computeIndicatorSet(prices, ohlc) {
            const set = {
                sma: getSMAArray(prices),
                sma20: getSMAArray(prices, 20),
                sma200: getSMAArray(prices, 200),
                ema20: getEMAArray(prices, 20),
                bb: getBBArray(prices),
                rsi: getRSIArray(prices),
                macd: getMACDArray(prices),
                adx: getADXArray(ohlc || []),
            };
            set.composite = getSimpleSignal(prices, set);
            return set;
        }

        // --- API Data Fetching (via Cloudflare Worker proxy) ---
        async function fetchStockData(ticker) {
            const res = await fetch(`${CONFIG.WORKER_BASE}/api/chart?ticker=${encodeURIComponent(ticker)}&range=1y&interval=1d`);
            if (!res.ok) {
                let msg = `HTTP ${res.status}`;
                try { const j = await res.json(); if(j.error) msg = j.error; } catch(e) {}
                throw new Error(msg);
            }
            const data = await res.json();
            if (!data.prices || !data.prices.length) throw new Error('No price data returned');
            return { prices: data.prices, dates: data.dates, ohlc: data.ohlc || [] };
        }

        async function fetchNews(ticker) {
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/news?ticker=${encodeURIComponent(ticker)}`);
                if (!res.ok) return [];
                const data = await res.json();
                return data.news || [];
            } catch(e) { return []; }
        }

        // --- Watchlist Sync (PIN-based, Cloudflare KV) ---
        function setSyncStatus(msg, type) {
            const el = document.getElementById('syncStatus');
            el.textContent = msg;
            el.className = 'sync-status' + (type ? ' ' + type : '');
        }

        function getPin() {
            const val = document.getElementById('pinInput').value.trim();
            return val;
        }

        async function loadFromPin() {
            const pin = getPin();
            if (!/^[0-9]{4,12}$/.test(pin)) { setSyncStatus('PIN must be 4-12 digits', 'error'); return; }

            setSyncStatus('Loading...', '');
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/watchlist?pin=${encodeURIComponent(pin)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data.watchlist) { setSyncStatus('No saved watchlist found for this PIN', 'error'); return; }
                if (!Array.isArray(data.watchlist) || !data.watchlist.every(t => typeof t === 'string')) {
                    setSyncStatus('Cloud watchlist data is malformed', 'error');
                    return;
                }

                appState.watchlist = data.watchlist;
                appState.pin = pin;
                localStorage.setItem('stocks', JSON.stringify(appState.watchlist));
                localStorage.setItem('syncPin', pin);

                setSyncStatus('Loaded watchlist from cloud', 'ok');
                document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
                await updateData();
            } catch(e) {
                setSyncStatus('Failed to load: ' + e.message, 'error');
            }
        }

        async function saveToPin() {
            const pin = getPin();
            if (!/^[0-9]{4,12}$/.test(pin)) { setSyncStatus('PIN must be 4-12 digits', 'error'); return; }

            setSyncStatus('Saving...', '');
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin, watchlist: appState.watchlist })
                });
                if (!res.ok) {
                    let msg = `HTTP ${res.status}`;
                    try { const j = await res.json(); if(j.error) msg = j.error; } catch(e) {}
                    throw new Error(msg);
                }
                appState.pin = pin;
                localStorage.setItem('syncPin', pin);
                setSyncStatus('Saved to cloud', 'ok');
            } catch(e) {
                setSyncStatus('Failed to save: ' + e.message, 'error');
            }
        }

        // Saves watchlist locally, and to cloud if a PIN is set
        function persistWatchlist() {
            localStorage.setItem('stocks', JSON.stringify(appState.watchlist));
            if (appState.pin) {
                fetch(`${CONFIG.WORKER_BASE}/api/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: appState.pin, watchlist: appState.watchlist })
                }).then(res => {
                    if (res.ok) setSyncStatus('Synced', 'ok');
                    else setSyncStatus('Cloud sync failed', 'error');
                }).catch(() => setSyncStatus('Cloud sync failed (offline?)', 'error'));
            }
        }

        // --- Core Application Loop ---
        async function updateData() {
            await Promise.all(appState.watchlist.map(async ticker => {
                ensureTickerState(ticker);

                try {
                    const data = await fetchStockData(ticker);
                    if (!Array.isArray(data.prices) || !data.prices.length) {
                        throw new Error('No price data returned');
                    }
                    data.computed = computeIndicatorSet(data.prices, data.ohlc);
                    appState.dataCache[ticker] = data;
                    delete appState.errors[ticker];
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                    delete appState.dataCache[ticker]; // Guardrail: don't render stale/partial data after a failed refresh
                }

                try { evaluateAlerts(ticker); } catch(e) { console.error(`evaluateAlerts failed for ${ticker}:`, e); }
                renderUI(); // Render each card as soon as its data arrives
            }));
            localStorage.setItem('indicators', JSON.stringify(appState.indicators));
        }

        function buildSignalInnerHTML(comp) {
            const sigClass = comp.signal === 'BUY' ? 'buy' : comp.signal === 'SELL' ? 'sell' : 'hold';
            return `
                <div class="signal-header">
                    <span class="badge ${sigClass}">${comp.signal}</span>
                    <span class="signal-expand-hint">Tap for details ›</span>
                </div>
                <ul class="signal-reasons">
                    ${(comp.reasons || []).map(r => `<li>${r}</li>`).join('')}
                </ul>`;
        }

        // --- Alert System Logic ---
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted") Notification.requestPermission();
        }

        function evaluateAlerts(ticker) {
            const data = appState.dataCache[ticker];
            if(!data || !appState.alerts[ticker] || !appState.alerts[ticker].length) return;
            if (!Array.isArray(data.prices) || !data.prices.length || !data.computed) return;

            const prices = data.prices;
            const currentPrice = prices[prices.length-1];
            const rsiArr = data.computed.rsi || [];
            const smaArr = data.computed.sma || [];
            const rsi = rsiArr.length ? rsiArr[rsiArr.length-1] : null;
            const sma = smaArr.length ? smaArr[smaArr.length-1] : null;

            let stateChanged = false;

            appState.alerts[ticker].forEach(al => {
                if(al.triggered) return;
                let valToCheck = al.ind === 'Price' ? currentPrice : (al.ind === 'RSI' ? rsi : sma);
                let hit = (al.cond === '>' && valToCheck > al.val) || (al.cond === '<' && valToCheck < al.val);
                
                if (hit) {
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification(`📈 Alert Triggered: ${ticker}`, { body: `${al.ind} is ${al.cond} ${al.val} (Currently: ${valToCheck.toFixed(2)})` });
                    }
                    al.triggered = true; 
                    stateChanged = true;
                }
            });

            if(stateChanged) localStorage.setItem('alerts', JSON.stringify(appState.alerts));
        }

        function addCustomAlert(ticker) {
            requestNotificationPermission();
            const ind = document.getElementById(`alt-ind-${ticker}`).value;
            const cond = document.getElementById(`alt-cond-${ticker}`).value;
            const val = parseFloat(document.getElementById(`alt-val-${ticker}`).value);
            
            if(isNaN(val)) return alert("Please enter a valid number");

            appState.alerts[ticker].push({ id: Date.now(), ind, cond, val, triggered: false });
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        function deleteAlert(ticker, id) {
            appState.alerts[ticker] = appState.alerts[ticker].filter(a => a.id !== id);
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        // --- UI Rendering ---
        function renderUI() {
            const container = document.getElementById('watchlist');
            if (!container) return;
            if(appState.watchlist.length === 0) { container.innerHTML = '<div class="info-card">No stocks tracked. Add one above.</div>'; return; }
            
            let html = '';
            for (let ticker of appState.watchlist) {
                try {
                    html += renderStockCard(ticker);
                } catch (e) {
                    // Guardrail: one ticker's bad data must never break the whole list.
                    console.error(`renderUI failed for ${ticker}:`, e);
                    html += `
                        <div class="info-card error-card">
                            <div><strong>${ticker}</strong>: Display error (${e.message || 'unknown'})</div>
                            <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                        </div>`;
                }
            }

            container.innerHTML = html;
            appState.watchlist.forEach(ticker => {
                if (appState.ui.charts[ticker] && appState.dataCache[ticker]) {
                    try { drawChart(ticker); } catch (e) { console.error(`drawChart failed for ${ticker}:`, e); }
                }
            });
        }

        // Ensures per-ticker state objects exist, regardless of how the ticker entered the watchlist
        // (typed in, loaded from PIN sync, etc.) — guards against undefined access anywhere downstream.
        function ensureTickerState(ticker) {
            if (!appState.indicators[ticker]) appState.indicators[ticker] = {sma:false, sma20:false, sma200:false, ema20:false, bb:false, rsi:false, macd:false, volume:true, pivot:false, swing:false};
            if (!appState.alerts[ticker]) appState.alerts[ticker] = [];
        }

        function renderStockCard(ticker) {
            ensureTickerState(ticker);
            const data = appState.dataCache[ticker];

            if(!data) {
                if(appState.errors[ticker]) {
                    return `
                        <div class="info-card error-card">
                            <div><strong>${ticker}</strong>: ${appState.errors[ticker]}</div>
                            <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                        </div>`;
                }
                return `<div class="info-card">${ticker}: Loading...</div>`;
            }

            // Guardrail: malformed/empty data shouldn't crash — show an error card instead.
            if (!Array.isArray(data.prices) || data.prices.length === 0 || !data.computed) {
                return `
                    <div class="info-card error-card">
                        <div><strong>${ticker}</strong>: No usable price data</div>
                        <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                    </div>`;
            }

            const prices = data.prices;
            const currentPrice = prices[prices.length-1];
            const prevPrice = prices.length > 1 ? prices[prices.length-2] : currentPrice;
            const isBullish = currentPrice >= prevPrice;

            const computed = data.computed;
            const rsiArr = computed.rsi || [];
            const smaArr = computed.sma || [];
            const rsiVal = rsiArr.length ? rsiArr[rsiArr.length-1] : null;
            const smaVal = smaArr.length ? smaArr[smaArr.length-1] : null;
            const rsi = (rsiVal !== null && rsiVal !== undefined) ? rsiVal.toFixed(1) : '—';
            const sma = (smaVal !== null && smaVal !== undefined) ? smaVal.toFixed(2) : '—';

            const comp = computed.composite || { signal: 'HOLD', reasons: [] };
            const sigClass = comp.signal === 'BUY' ? 'buy' : comp.signal === 'SELL' ? 'sell' : 'hold';

            const ui = appState.ui;
            const inds = appState.indicators[ticker];

            let alertsHtml = (appState.alerts[ticker] || []).map(a => `
                <div class="active-alert">
                    <span>${a.triggered ? '⚠️' : '🔔'} ${a.ind} ${a.cond} ${a.val}</span>
                    <button class="del-alert" onclick="deleteAlert('${ticker}', ${a.id})">✕</button>
                </div>
            `).join('');

            let newsHtml = '<div style="text-align:center;color:var(--text-sub);font-size:0.85rem;">Loading news...</div>';
            if (appState.newsCache[ticker]) {
                const newsItems = appState.newsCache[ticker] || [];
                newsHtml = newsItems.length === 0 ? '<div style="color:var(--text-sub);font-size:0.8rem;">No recent news found.</div>' :
                    newsItems.map(n => `
                    <div class="news-item">
                        <a href="${n.link || '#'}" target="_blank">${n.title || 'Untitled'}</a>
                        <div class="news-date">${n.publisher || ''} • ${n.providerPublishTime ? new Date(n.providerPublishTime*1000).toLocaleDateString() : ''}</div>
                    </div>`).join('');
            }

            let signalHtml = `
                <div class="signal-panel" id="signal-panel-${ticker}">
                    ${buildSignalInnerHTML(comp)}
                </div>`;

            return `
                <div class="stock-card sig-${sigClass}">
                    <div class="card-inner">
                        <div class="card-top">
                            <div class="card-left">
                                <h2 class="ticker">${ticker}</h2>
                                <span class="company-meta">RSI ${rsi} · SMA $${sma}</span>
                            </div>
                            <div class="card-right">
                                <h2 class="price" style="color:${isBullish ? 'var(--buy-color)' : 'var(--sell-color)'}">$${currentPrice.toFixed(2)}</h2>
                                <span class="badge ${sigClass}">${comp.signal}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Signal (tap to expand reasons) -->
                    <div class="signal-panel" id="signal-panel-${ticker}" onclick="this.classList.toggle('expanded')">
                        ${buildSignalInnerHTML(comp)}
                    </div>

                    <!-- Panel: CHART -->
                    <div class="panel chart-container ${ui.charts[ticker] ? 'active' : ''}">
                        <div class="indicator-toggles">
                            <button class="ind-btn ${inds.volume?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'volume')">Vol</button>
                            <button class="ind-btn ${inds.sma?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma')">SMA50</button>
                            <button class="ind-btn ${inds.sma20?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma20')">SMA20</button>
                            <button class="ind-btn ${inds.sma200?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma200')">SMA200</button>
                            <button class="ind-btn ${inds.ema20?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'ema20')">EMA20</button>
                            <button class="ind-btn ${inds.bb?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'bb')">BB</button>
                            <button class="ind-btn ${inds.pivot?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'pivot')">Pivots</button>
                            <button class="ind-btn ${inds.swing?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'swing')">Swings</button>
                            <button class="ind-btn ${inds.rsi?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'rsi')">RSI</button>
                            <button class="ind-btn ${inds.macd?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'macd')">MACD</button>
                        </div>
                        <div class="chart-legend-values" id="legend-${ticker}"></div>
                        <div class="canvas-wrapper" style="position:relative;">
                            <canvas id="canvas-candle-${ticker}" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
                            <canvas id="canvas-${ticker}" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
                            <canvas id="canvas-cross-${ticker}" style="position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;"></canvas>
                        </div>
                        <div class="crosshair-tooltip" id="xhair-${ticker}" style="display:none;"></div>
                    </div>

                    <!-- Panel: NEWS -->
                    <div class="panel ${ui.news[ticker] ? 'active' : ''}">${newsHtml}</div>

                    <!-- Panel: ALERTS -->
                    <div class="panel ${ui.alerts[ticker] ? 'active' : ''}">
                        <div style="margin-bottom:8px;">${alertsHtml}</div>
                        <div style="font-size:0.72rem;color:var(--text-sub);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;">New Alert</div>
                        <div class="alert-form">
                            <select id="alt-ind-${ticker}"><option value="Price">Price</option><option value="RSI">RSI</option><option value="SMA">SMA 50</option></select>
                            <select id="alt-cond-${ticker}"><option value=">">Above</option><option value="<">Below</option></select>
                            <input type="number" id="alt-val-${ticker}" placeholder="Value">
                            <button onclick="addCustomAlert('${ticker}')">Set</button>
                        </div>
                    </div>

                    <!-- Icon-only action bar -->
                    <div class="actions">
                        <button class="icon-btn ${ui.charts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'charts')" title="Chart">📈</button>
                        <button class="icon-btn ${ui.news[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'news')" title="News">📰</button>
                        <button class="icon-btn ${ui.alerts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'alerts')" title="Alerts">🔔</button>
                        <button class="icon-btn" onclick="deleteStock('${ticker}')" title="Remove">✕</button>
                    </div>
                </div>
            `;
        }

        // --- Candlestick Chart Plugin (native, no external dependency) ---
        // Registers a custom 'candlestick' chart type with Chart.js once.
        // roundRect polyfill for older browsers/WebViews that don't support it natively
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                r = Math.min(r, w/2, h/2);
                this.beginPath();
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.arcTo(x + w, y, x + w, y + r, r);
                this.lineTo(x + w, y + h - r);
                this.arcTo(x + w, y + h, x + w - r, y + h, r);
                this.lineTo(x + r, y + h);
                this.arcTo(x, y + h, x, y + h - r, r);
                this.lineTo(x, y + r);
                this.arcTo(x, y, x + r, y, r);
                this.closePath();
                return this;
            };
        }

        // --- Price Action Indicators ---
        function getPivotPoints(ohlc) {
            if (!ohlc || ohlc.length < 2) return null;
            const prev = ohlc[ohlc.length - 2];
            if (!prev || prev.h === null) return null;
            const pp = (prev.h + prev.l + prev.c) / 3;
            return { pp, r1: 2*pp - prev.l, r2: pp + (prev.h - prev.l), s1: 2*pp - prev.h, s2: pp - (prev.h - prev.l) };
        }

        function getSwingPoints(ohlc, lookback = 5) {
            const highs = [], lows = [];
            if (!ohlc || ohlc.length < lookback * 2 + 1) return { highs, lows };
            for (let i = lookback; i < ohlc.length - lookback; i++) {
                const c = ohlc[i];
                if (!c || c.h === null) continue;
                const win = ohlc.slice(i - lookback, i + lookback + 1);
                if (win.some(w => !w || w.h === null)) continue;
                if (c.h >= Math.max(...win.map(w => w.h))) highs.push({ x: i, y: c.h });
                if (c.l <= Math.min(...win.map(w => w.l))) lows.push({ x: i, y: c.l });
            }
            return { highs, lows };
        }

        // --- Chart Drawing Logic ---
        // Candlesticks, volume, pivots, swing markers drawn directly on canvas-candle-{ticker}
        // using raw Canvas 2D — no Chart.js dependency, guaranteed visible.
        // Overlay lines (SMA/BB/RSI/MACD) drawn on canvas-{ticker} via Chart.js (transparent bg).

        function drawCandleCanvas(ticker, ohlc, dates, inds, isLight) {
            const canvas = document.getElementById('canvas-candle-' + ticker);
            if (!canvas || !ohlc || !ohlc.length) return;
            const wrapper = canvas.parentElement;
            const W = wrapper.clientWidth || 360;
            const H = wrapper.clientHeight || 280;
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, W, H);

            const VOLUME_H = inds.volume ? Math.floor(H * 0.18) : 0;
            const DATE_H = 16;
            const CHART_H = H - VOLUME_H - DATE_H;
            const PAD_R = 52;
            const PAD_L = 4;
            const CHART_W = W - PAD_L - PAD_R;
            const n = ohlc.length;
            const slotW = CHART_W / n;
            const bodyW = Math.max(1, Math.min(10, slotW * 0.55));
            const toX = (i) => PAD_L + (i + 0.5) * slotW;

            // Price range from OHLC
            const valid = ohlc.filter(c => c && c.h !== null);
            if (!valid.length) return;
            let pMax = Math.max(...valid.map(c => c.h));
            let pMin = Math.min(...valid.map(c => c.l));
            const pad = (pMax - pMin) * 0.06 || 1;
            pMax += pad; pMin -= pad;
            const pRange = pMax - pMin;
            const toY = (p) => PAD_L + CHART_H * (1 - (p - pMin) / pRange);

            // Grid + price axis
            ctx.font = '10px -apple-system,sans-serif';
            ctx.textAlign = 'right';
            const gridSteps = 4;
            for (let i = 0; i <= gridSteps; i++) {
                const p = pMin + (pRange * i / gridSteps);
                const y = toY(p);
                ctx.strokeStyle = isLight ? '#e5e5ea' : '#1e1e2a';
                ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R + 2, y); ctx.stroke();
                ctx.fillStyle = isLight ? '#8e8e93' : '#666680';
                ctx.fillText('$' + p.toFixed(2), W - 2, y + 3);
            }

            // Pivot lines
            if (inds.pivot) {
                const pv = getPivotPoints(ohlc);
                if (pv) {
                    const pvLevels = [
                        { v: pv.r2, label: 'R2', color: '#ff5c5c' },
                        { v: pv.r1, label: 'R1', color: '#ff9f7f' },
                        { v: pv.pp, label: 'PP', color: isLight ? '#6060c8' : '#a0a0ff' },
                        { v: pv.s1, label: 'S1', color: '#5ac8fa' },
                        { v: pv.s2, label: 'S2', color: '#00d395' },
                    ];
                    pvLevels.forEach(({ v, label, color }) => {
                        if (v < pMin || v > pMax) return;
                        const y = toY(v);
                        ctx.save();
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 1;
                        ctx.setLineDash([4, 4]);
                        ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.fillStyle = color;
                        ctx.font = 'bold 9px -apple-system,sans-serif';
                        ctx.textAlign = 'left';
                        ctx.fillText(label, PAD_L + 3, y - 2);
                        ctx.restore();
                    });
                }
            }

            // Candles
            ohlc.forEach((c, i) => {
                if (!c || c.h === null) return;
                const isBull = c.c >= c.o;
                const color = isBull ? '#00d395' : '#ff5c5c';
                const x = toX(i);
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                // Wick
                ctx.beginPath();
                ctx.moveTo(x, toY(c.h));
                ctx.lineTo(x, toY(c.l));
                ctx.stroke();
                // Body
                const bodyTop = Math.min(toY(c.o), toY(c.c));
                const bodyH = Math.max(1, Math.abs(toY(c.c) - toY(c.o)));
                ctx.fillStyle = isBull ? 'rgba(0,211,149,0.35)' : color;
                ctx.fillRect(x - bodyW/2, bodyTop, bodyW, bodyH);
                ctx.strokeRect(x - bodyW/2, bodyTop, bodyW, bodyH);
            });

            // Swing markers
            if (inds.swing) {
                const { highs, lows } = getSwingPoints(ohlc);
                const tri = (x, y, up, color) => {
                    ctx.save();
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    const s = 5, off = 6;
                    if (up) { ctx.moveTo(x, y-off-s*1.5); ctx.lineTo(x-s, y-off); ctx.lineTo(x+s, y-off); }
                    else    { ctx.moveTo(x, y+off+s*1.5); ctx.lineTo(x-s, y+off); ctx.lineTo(x+s, y+off); }
                    ctx.closePath(); ctx.fill(); ctx.restore();
                };
                highs.forEach(p => { if (p.x < n) tri(toX(p.x), toY(p.y), false, '#ff5c5c'); });
                lows.forEach(p => { if (p.x < n) tri(toX(p.x), toY(p.y), true, '#00d395'); });
            }

            // Volume bars
            if (inds.volume && VOLUME_H > 0) {
                const maxVol = Math.max(...ohlc.map(c => c?.v || 0)) || 1;
                const volY = CHART_H + DATE_H/2;
                ohlc.forEach((c, i) => {
                    if (!c || !c.v) return;
                    const bh = (c.v / maxVol) * (VOLUME_H - 4);
                    const x = toX(i);
                    ctx.fillStyle = c.c >= c.o ? 'rgba(0,211,149,0.28)' : 'rgba(255,92,92,0.28)';
                    ctx.fillRect(x - bodyW/2, volY + VOLUME_H - 4 - bh, bodyW, bh);
                });
                ctx.fillStyle = isLight ? '#8e8e93' : '#666680';
                ctx.font = '9px -apple-system,sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('Vol', W - 2, H - 2);
            }

            // Date labels
            ctx.fillStyle = isLight ? '#8e8e93' : '#666680';
            ctx.font = '9px -apple-system,sans-serif';
            ctx.textAlign = 'center';
            const every = Math.max(1, Math.floor(n / 8));
            dates.forEach((d, i) => { if (i % every === 0) ctx.fillText(d, toX(i), CHART_H + DATE_H - 2); });
        }

        function drawChart(ticker) {
            const data = appState.dataCache[ticker];
            if (!data || !Array.isArray(data.prices) || !data.prices.length || !data.computed) return;
            const canvas = document.getElementById('canvas-' + ticker);
            if (!canvas) return;
            ensureTickerState(ticker);
            const inds = appState.indicators[ticker];
            const computed = data.computed;
            const isLight = document.body.classList.contains('light-mode');

            const sl = Math.min(CONFIG.CHART_WINDOW_DAYS, data.prices.length);
            const prices = data.prices.slice(-sl);
            const dates = (data.dates || []).slice(-sl);
            const ohlc = (data.ohlc || []).slice(-sl);
            if (!prices.length) return;

            const hasOhlc = ohlc.length === prices.length && ohlc.some(c => c && c.h !== null);

            // Draw candlesticks on background canvas
            if (hasOhlc) {
                drawCandleCanvas(ticker, ohlc, dates, inds, isLight);
            }

            // Overlay colors
            const cSma = '#f5a623', cSma20 = '#5ac8fa', cSma200 = '#ff9f7f', cEma20 = '#a78bfa';
            const cBb = isLight ? 'rgba(0,0,0,0.25)' : 'rgba(255,255,255,0.35)';
            const cRsi = '#b58900', cMacd = '#d33682';
            const tickColor = isLight ? '#8e8e93' : '#666680';
            const tooltipBg = isLight ? 'rgba(255,255,255,0.95)' : 'rgba(17,17,24,0.95)';
            const tooltipText = isLight ? '#000' : '#fff';
            const gridColor = isLight ? '#e5e5ea' : '#1e1e2a';

            let datasets = [];
            if (!hasOhlc) {
                datasets.push({ label:'Price', data:prices,
                    borderColor: prices[prices.length-1] >= prices[prices.length-2] ? '#00d395' : '#ff5c5c',
                    borderWidth:2, pointRadius:0, fill:false, tension:0.1, yAxisID:'y' });
            }
            if (inds.sma && computed.sma) datasets.push({ label:'SMA 50', data:computed.sma.slice(-sl), borderColor:cSma, borderWidth:1.5, borderDash:[5,5], pointRadius:0, yAxisID:'y' });
            if (inds.sma20 && computed.sma20) datasets.push({ label:'SMA 20', data:computed.sma20.slice(-sl), borderColor:cSma20, borderWidth:1.5, borderDash:[5,5], pointRadius:0, yAxisID:'y' });
            if (inds.sma200 && computed.sma200) datasets.push({ label:'SMA 200', data:computed.sma200.slice(-sl), borderColor:cSma200, borderWidth:2, borderDash:[8,4], pointRadius:0, yAxisID:'y' });
            if (inds.ema20 && computed.ema20) datasets.push({ label:'EMA 20', data:computed.ema20.slice(-sl), borderColor:cEma20, borderWidth:1.5, pointRadius:0, yAxisID:'y' });
            if (inds.bb && computed.bb) {
                datasets.push({ label:'BB Upper', data:computed.bb.upper.slice(-sl), borderColor:cBb, borderWidth:1, pointRadius:0, yAxisID:'y' });
                datasets.push({ label:'BB Lower', data:computed.bb.lower.slice(-sl), borderColor:cBb, borderWidth:1, pointRadius:0, yAxisID:'y' });
            }
            const hasOscillator = inds.rsi || inds.macd;
            if (inds.rsi && computed.rsi) datasets.push({ label:'RSI', data:computed.rsi.slice(-sl), borderColor:cRsi, borderWidth:1.5, pointRadius:0, yAxisID:'y2', spanGaps:true });
            if (inds.macd && computed.macd) {
                datasets.push({ label:'MACD', data:computed.macd.macd.slice(-sl), borderColor:cMacd, borderWidth:1.5, pointRadius:0, yAxisID:'y2', spanGaps:true });
                datasets.push({ label:'Signal', data:computed.macd.signal.slice(-sl), borderColor:'#859900', borderWidth:1, pointRadius:0, yAxisID:'y2', spanGaps:true });
            }

            // Price scale aligned to OHLC range so overlays align with candles
            let yMin, yMax;
            if (hasOhlc) {
                const valid = ohlc.filter(c => c && c.h !== null);
                yMax = Math.max(...valid.map(c => c.h));
                yMin = Math.min(...valid.map(c => c.l));
                const pad = (yMax - yMin) * 0.06 || 1;
                yMax += pad; yMin -= pad;
            }

            let scales = {
                x: { display: !hasOhlc, ticks:{ color:tickColor, maxRotation:0, autoSkip:true, maxTicksLimit:10 }, grid:{ display:false } },
                y: { type:'linear', position:'right', display:!hasOhlc,
                     min:yMin, max:yMax,
                     ticks:{ color:tickColor }, grid:{ color: hasOhlc ? 'transparent' : gridColor } },
            };
            if (hasOhlc) {
                // Hidden y scale still needed so overlay lines get correct pixel positions
                scales.y = { type:'linear', position:'right', display:false, min:yMin, max:yMax, grid:{ display:false } };
            }
            if (hasOscillator) {
                scales.y2 = { type:'linear', position:'left', ticks:{ color:tickColor }, grid:{ display:false },
                    min:(inds.rsi&&!inds.macd)?0:undefined, max:(inds.rsi&&!inds.macd)?100:undefined };
            }

            canvas.style.background = 'transparent';
            if (window.myCharts[ticker]) window.myCharts[ticker].destroy();

            if (datasets.length > 0) {
                window.myCharts[ticker] = new Chart(canvas.getContext('2d'), {
                    type:'line', data:{ labels:dates, datasets },
                    options:{ responsive:true, maintainAspectRatio:false, animation:false,
                        interaction:{ mode:'index', intersect:false },
                        plugins:{ legend:{ display:false },
                            tooltip:{ padding:10, backgroundColor:tooltipBg, titleColor:tooltipText, bodyColor:tooltipText } },
                        scales },
                });
            }

            // Legend
            const lastValid = (arr) => {
                if (!arr?.length) return null;
                for (let i=arr.length-1; i>=0; i--) { if (arr[i]!==null&&arr[i]!==undefined&&!isNaN(arr[i])) return arr[i]; }
                return null;
            };
            const fmt = (v,d) => v===null?'—':Number(v).toFixed(d);
            const last = ohlc.length ? ohlc[ohlc.length-1] : null;
            let items = [];
            if (last?.o !== null && last?.o !== undefined) {
                items.push({ name:'O', color:tickColor, value:fmt(last.o,2) });
                items.push({ name:'H', color:'#00d395', value:fmt(last.h,2) });
                items.push({ name:'L', color:'#ff5c5c', value:fmt(last.l,2) });
                items.push({ name:'C', color:last.c>=last.o?'#00d395':'#ff5c5c', value:fmt(last.c,2) });
                if (inds.volume&&last.v) items.push({ name:'Vol', color:tickColor, value:(last.v/1e6).toFixed(2)+'M' });
            } else { items.push({ name:'Price', color:'#00d395', value:fmt(prices[prices.length-1],2) }); }
            if (inds.sma&&computed.sma) items.push({ name:'SMA50', color:cSma, value:fmt(lastValid(computed.sma),2) });
            if (inds.sma20&&computed.sma20) items.push({ name:'SMA20', color:cSma20, value:fmt(lastValid(computed.sma20),2) });
            if (inds.sma200&&computed.sma200) items.push({ name:'SMA200', color:cSma200, value:fmt(lastValid(computed.sma200),2) });
            if (inds.ema20&&computed.ema20) items.push({ name:'EMA20', color:cEma20, value:fmt(lastValid(computed.ema20),2) });
            if (inds.bb&&computed.bb) { items.push({ name:'BB↑', color:cBb, value:fmt(lastValid(computed.bb.upper),2) }); items.push({ name:'BB↓', color:cBb, value:fmt(lastValid(computed.bb.lower),2) }); }
            if (inds.rsi&&computed.rsi) items.push({ name:'RSI', color:cRsi, value:fmt(lastValid(computed.rsi),1) });
            if (inds.macd&&computed.macd) { items.push({ name:'MACD', color:cMacd, value:fmt(lastValid(computed.macd.macd),2) }); items.push({ name:'Sig', color:'#859900', value:fmt(lastValid(computed.macd.signal),2) }); }
            if (computed.adx) { const v=lastValid(computed.adx); items.push({ name:'ADX', color:v!==null&&v>25?'#00d395':'#ff5c5c', value:v===null?'—':v.toFixed(1) }); }
            const legendEl = document.getElementById('legend-' + ticker);
            if (legendEl) legendEl.innerHTML = items.map(it=>`<span class="legend-item"><span class="legend-dot" style="background:${it.color}"></span><span class="legend-name">${it.name}</span><span class="legend-value">${it.value}</span></span>`).join('');

            // --- Crosshair / Scrubber ---
            // Top-layer transparent canvas captures pointer/touch events and draws
            // a vertical crosshair line + shows all indicator values at the hovered candle.
            const crossCanvas = document.getElementById('canvas-cross-' + ticker);
            if (!crossCanvas) return;

            // Store layout params so the event handler can convert pointer X → candle index
            const wrapper = crossCanvas.parentElement;
            const layoutW = wrapper.clientWidth || 360;
            const layoutH = wrapper.clientHeight || 280;
            crossCanvas.width = layoutW;
            crossCanvas.height = layoutH;
            const VOLUME_H = inds.volume && hasOhlc ? Math.floor(layoutH * 0.18) : 0;
            const DATE_H = 16;
            const CHART_H = layoutH - VOLUME_H - DATE_H;
            const PAD_R = 52;
            const PAD_L = 4;
            const CHART_W = layoutW - PAD_L - PAD_R;
            const slotW2 = CHART_W / (ohlc.length || prices.length);

            const xToIndex = (clientX) => {
                const rect = crossCanvas.getBoundingClientRect();
                const px = (clientX - rect.left) * (layoutW / rect.width);
                const i = Math.round((px - PAD_L) / slotW2 - 0.5);
                return Math.max(0, Math.min((ohlc.length || prices.length) - 1, i));
            };

            // Remove old listeners by cloning the element (prevents duplicate handlers on re-render)
            const newCross = crossCanvas.cloneNode(true);
            crossCanvas.parentNode.replaceChild(newCross, crossCanvas);

            // Recompute OHLC price range for horizontal price label on the right axis
            const validOhlcForRange = ohlc.filter(c => c && c.h !== null);
            const pMax2 = validOhlcForRange.length ? Math.max(...validOhlcForRange.map(c => c.h)) * 1.06 : null;
            const pMin2 = validOhlcForRange.length ? Math.min(...validOhlcForRange.map(c => c.l)) * 0.94 : null;
            const pRange2 = (pMax2 !== null && pMin2 !== null) ? pMax2 - pMin2 : null;
            const toPriceY = (price) => pRange2 ? PAD_L + CHART_H * (1 - (price - pMin2) / pRange2) : null;

            const drawCrosshair = (clientX) => {
                // IMPORTANT: use newCross (the DOM-attached clone), not crossCanvas (detached original)
                const ctx2 = newCross.getContext('2d');
                ctx2.clearRect(0, 0, layoutW, layoutH);
                const idx = xToIndex(clientX);
                const x = PAD_L + (idx + 0.5) * slotW2;
                const c = hasOhlc ? ohlc[idx] : null;
                const closePrice = c ? c.c : prices[idx];

                // Vertical crosshair line
                ctx2.strokeStyle = isLight ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.3)';
                ctx2.lineWidth = 1;
                ctx2.setLineDash([4, 3]);
                ctx2.beginPath();
                ctx2.moveTo(x, 0);
                ctx2.lineTo(x, CHART_H + VOLUME_H);
                ctx2.stroke();
                ctx2.setLineDash([]);

                // Date pill at bottom of the crosshair line
                const dateLabel = dates[idx] || '';
                ctx2.font = 'bold 10px -apple-system,sans-serif';
                const dateLabelW = ctx2.measureText(dateLabel).width + 12;
                const dateLabelX = Math.max(dateLabelW/2 + PAD_L, Math.min(layoutW - PAD_R - dateLabelW/2, x));
                const datePillColor = isLight ? '#444' : '#bbb';
                ctx2.fillStyle = datePillColor;
                ctx2.beginPath();
                ctx2.roundRect(dateLabelX - dateLabelW/2, CHART_H + 2, dateLabelW, DATE_H - 4, 4);
                ctx2.fill();
                ctx2.fillStyle = isLight ? '#fff' : '#111';
                ctx2.textAlign = 'center';
                ctx2.fillText(dateLabel, dateLabelX, CHART_H + DATE_H - 5);

                // Price label on right axis at close price level
                if (closePrice !== null && toPriceY) {
                    const priceY = toPriceY(closePrice);
                    if (priceY !== null && priceY > 0 && priceY < CHART_H) {
                        // Horizontal dotted line to right axis
                        ctx2.strokeStyle = isLight ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.2)';
                        ctx2.lineWidth = 1;
                        ctx2.setLineDash([3, 3]);
                        ctx2.beginPath();
                        ctx2.moveTo(x, priceY);
                        ctx2.lineTo(layoutW - PAD_R + 2, priceY);
                        ctx2.stroke();
                        ctx2.setLineDash([]);

                        // Price pill on right axis
                        const priceLabel = '$' + closePrice.toFixed(2);
                        ctx2.font = 'bold 10px -apple-system,sans-serif';
                        const priceLabelW = ctx2.measureText(priceLabel).width + 8;
                        const priceColor = c ? (c.c >= c.o ? '#00d395' : '#ff5c5c') : '#00d395';
                        ctx2.fillStyle = priceColor;
                        ctx2.beginPath();
                        ctx2.roundRect(layoutW - PAD_R + 3, priceY - 8, priceLabelW, 16, 3);
                        ctx2.fill();
                        ctx2.fillStyle = '#fff';
                        ctx2.textAlign = 'left';
                        ctx2.fillText(priceLabel, layoutW - PAD_R + 7, priceY + 4);
                    }
                }

                // Update the tooltip div below the chart
                const fmt2 = (v, d=2) => (v===null||v===undefined||isNaN(v)) ? '—' : Number(v).toFixed(d);
                const tooltipEl = document.getElementById('xhair-' + ticker);
                if (!tooltipEl) return;

                const parts = [];
                if (c && c.o !== null) {
