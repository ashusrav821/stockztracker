<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Pro Tracker</title>
    <meta name="theme-color" id="theme-meta" content="#000000">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Dark Theme --- */
        :root {
            --bg-base: #0a0a0f;
            --header-bg: #0a0a0f;
            --card-bg: #111118;
            --card-border: #1e1e2a;
            --text-main: #f0f0f8;
            --text-sub: #6b6b80;
            --text-mid: #9898b0;
            --accent: #6c63ff;
            --accent-dim: rgba(108, 99, 255, 0.12);
            --buy-color: #00d395;
            --buy-dim: rgba(0, 211, 149, 0.12);
            --sell-color: #ff5c5c;
            --sell-dim: rgba(255, 92, 92, 0.12);
            --hold-color: #f5a623;
            --hold-dim: rgba(245, 166, 35, 0.12);
            --input-bg: #16161f;
            --input-border: #2a2a3a;
            --hover-bg: #1a1a26;
            --divider: #1e1e2a;
            --stripe-buy: var(--buy-color);
            --stripe-sell: var(--sell-color);
            --stripe-hold: var(--hold-color);
        }

        /* --- Light Theme --- */
        body.light-mode {
            --bg-base: #f4f4f8;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --card-border: #e8e8f0;
            --text-main: #0f0f1a;
            --text-sub: #9090a8;
            --text-mid: #6060788;
            --accent: #5b54e8;
            --accent-dim: rgba(91, 84, 232, 0.08);
            --buy-color: #00b87c;
            --buy-dim: rgba(0, 184, 124, 0.08);
            --sell-color: #e84040;
            --sell-dim: rgba(232, 64, 64, 0.08);
            --hold-color: #d4880a;
            --hold-dim: rgba(212, 136, 10, 0.08);
            --input-bg: #f4f4f8;
            --input-border: #dcdce8;
            --hover-bg: #ebebf4;
            --divider: #e8e8f0;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-variant-numeric: tabular-nums;
        }

        /* ---- HEADER ---- */
        header {
            padding: 52px 18px 0;
            background: var(--header-bg);
            border-bottom: 1px solid var(--divider);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.6px;
            color: var(--text-main);
        }

        .header-actions { display: flex; align-items: center; gap: 10px; }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            font-size: 1rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 10px;
            line-height: 1;
        }

        /* Search */
        .search-bar { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-bar input {
            flex: 1;
            padding: 12px 14px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 12px;
            text-transform: uppercase;
        }
        .search-bar input::placeholder { font-weight: 400; letter-spacing: 0; text-transform: none; color: var(--text-sub); }
        .search-bar input:focus { border-color: var(--accent); background: var(--hover-bg); }
        .search-bar button {
            padding: 0 18px;
            font-size: 0.9rem;
            font-weight: 700;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            letter-spacing: 0.3px;
        }

        /* Sync / PIN */
        .sync-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
        .sync-row input {
            flex: 1;
            padding: 10px 14px;
            font-size: 0.88rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            border-radius: 10px;
            letter-spacing: 3px;
        }
        .sync-row input::placeholder { letter-spacing: 0; font-size: 0.82rem; color: var(--text-sub); }
        .sync-row button {
            padding: 10px 14px;
            font-size: 0.82rem;
            font-weight: 700;
            background: var(--input-bg);
            color: var(--text-mid);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            cursor: pointer;
        }
        .sync-row button.primary { background: var(--accent); color: white; border-color: transparent; }
        .sync-status { font-size: 0.72rem; color: var(--text-sub); min-height: 14px; padding-bottom: 2px; }
        .sync-status.error { color: var(--sell-color); }
        .sync-status.ok { color: var(--buy-color); }

        /* Tabs */
        .tab-row { display: flex; gap: 0; margin-top: 4px; }
        .tab-btn {
            flex: 1;
            padding: 12px 0 10px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: color 0.2s;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ---- MAIN ---- */
        main { flex: 1; overflow-y: auto; padding: 14px; }

        /* ---- CARD ---- */
        .stock-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            margin-bottom: 12px;
            overflow: hidden;
            position: relative;
        }

        /* Signature: left accent stripe by signal */
        .stock-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 18px 0 0 18px;
        }
        .stock-card.sig-buy::before { background: var(--buy-color); }
        .stock-card.sig-sell::before { background: var(--sell-color); }
        .stock-card.sig-hold::before { background: var(--hold-color); }

        .card-inner { padding: 14px 14px 0 18px; }

        /* Card top row */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2px;
        }

        .card-left { display: flex; flex-direction: column; gap: 2px; }
        .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

        .ticker {
            font-size: 1.25rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.3px;
            line-height: 1;
        }
        .company-meta { font-size: 0.72rem; color: var(--text-sub); }

        .price {
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .price-change {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-sub);
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 14px;
            margin: 8px 0 0;
            padding: 8px 0;
            border-top: 1px solid var(--divider);
        }
        .stat-item { display: flex; flex-direction: column; gap: 1px; }
        .stat-label { font-size: 0.62rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .stat-value { font-size: 0.8rem; font-weight: 700; color: var(--text-main); }

        /* Badge */
        .badge {
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.buy { background: var(--buy-dim); color: var(--buy-color); }
        .badge.sell { background: var(--sell-dim); color: var(--sell-color); }
        .badge.hold { background: var(--hold-dim); color: var(--hold-color); }

        /* Action row */
        .actions {
            display: flex;
            border-top: 1px solid var(--divider);
            margin: 10px 0 0;
        }
        .icon-btn {
            flex: 1;
            background: transparent;
            border: none;
            border-right: 1px solid var(--divider);
            color: var(--text-sub);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: background 0.15s, color 0.15s;
        }
        .icon-btn:last-child { border-right: none; }
        .icon-btn .icon-glyph { font-size: 1rem; line-height: 1; }
        .icon-btn.active { color: var(--accent); background: var(--accent-dim); }
        .icon-btn:active { background: var(--hover-bg); }

        /* Panels */
        .panel { display: none; padding: 12px 14px 14px 18px; border-top: 1px solid var(--divider); }
        .panel.active { display: block; }

        /* Chart */
        .canvas-wrapper { height: 280px; width: 100%; }
        .indicator-toggles {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            overflow-x: auto;
            padding-bottom: 2px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .indicator-toggles::-webkit-scrollbar { display: none; }
        .ind-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-sub);
            padding: 5px 11px;
            border-radius: 20px;
            font-size: 0.73rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: 0.2px;
            transition: all 0.15s;
        }
        .ind-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* Chart legend with live values */
        .chart-legend-values {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--divider);
        }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.74rem; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .legend-name { color: var(--text-sub); font-weight: 600; }
        .legend-value { color: var(--text-main); font-weight: 700; }

        /* News */
        .news-item { padding: 10px 0; border-bottom: 1px solid var(--divider); }
        .news-item:last-child { border-bottom: none; }
        .news-item a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .news-date { font-size: 0.7rem; color: var(--text-sub); }

        /* Alerts */
        .alert-form { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .alert-form select, .alert-form input {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--input-border);
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.82rem;
        }
        .alert-form input { flex: 1; min-width: 80px; }
        .alert-form button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.82rem;
        }
        .active-alert {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--input-bg);
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 0.82rem;
            border-left: 3px solid var(--accent);
        }
        .del-alert { background: transparent; color: var(--sell-color); border: none; cursor: pointer; font-weight: 700; }

        /* Signal panel */
        .signal-panel {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 12px 14px;
            margin: 10px 14px 10px 18px;
        }
        .signal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .confidence-bar-wrap {
            flex: 1;
            height: 4px;
            background: var(--divider);
            border-radius: 4px;
            overflow: hidden;
        }
        .confidence-bar { display: block; height: 100%; border-radius: 4px; transition: width 0.4s ease; }
        .confidence-label { font-size: 0.7rem; color: var(--text-sub); white-space: nowrap; font-weight: 600; }
        .signal-reasons { margin: 0; padding-left: 16px; font-size: 0.77rem; color: var(--text-sub); line-height: 1.7; }
        .signal-levels {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--divider);
            font-size: 0.75rem;
            color: var(--text-sub);
        }
        .signal-levels strong { color: var(--text-main); font-weight: 700; }

        /* Info / error cards */
        .info-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 20px;
            text-align: center;
            color: var(--text-sub);
            font-size: 0.88rem;
        }
        .info-card.error-card { border-color: rgba(255, 92, 92, 0.25); color: var(--sell-color); }
        .retry-btn {
            margin-top: 10px;
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--input-border);
            padding: 7px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Guide */
        .guide-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 10px;
            padding: 16px;
        }
        .guide-section h3 { margin: 0 0 6px; font-size: 0.95rem; font-weight: 700; letter-spacing: -0.2px; }
        .guide-section p { margin: 0 0 8px; font-size: 0.82rem; color: var(--text-sub); line-height: 1.55; }
        .guide-section p:last-child { margin-bottom: 0; }
        .guide-formula {
            font-family: "SF Mono", "Fira Code", Menlo, monospace;
            font-size: 0.72rem;
            background: var(--input-bg);
            padding: 10px 12px;
            border-radius: 10px;
            display: block;
            margin: 8px 0;
            color: var(--accent);
            overflow-x: auto;
            white-space: pre;
            border-left: 2px solid var(--accent);
        }
        .guide-section ul { margin: 6px 0; padding-left: 18px; font-size: 0.82rem; color: var(--text-sub); line-height: 1.65; }
        .guide-section li strong { color: var(--text-main); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>Stock Tracker</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌓</button>
        </div>
        <div class="search-bar">
            <input type="text" id="tickerInput" placeholder="Search Ticker (e.g. AAPL)">
            <button onclick="addStock()">Add</button>
        </div>
        <div class="sync-row">
            <input type="text" id="pinInput" placeholder="PIN (4-12 digits) for cloud sync" inputmode="numeric" maxlength="12">
            <button onclick="loadFromPin()">Load</button>
            <button class="primary" onclick="saveToPin()">Save</button>
        </div>
        <div class="sync-status" id="syncStatus"></div>
        <div class="tab-row">
            <button class="tab-btn active" id="tab-portfolio" onclick="switchTab('portfolio')">Portfolio</button>
            <button class="tab-btn" id="tab-guide" onclick="switchTab('guide')">Indicator Guide</button>
        </div>
    </header>

    <main id="watchlist">
        <div class="info-card">Initializing Data...</div>
    </main>

    <main id="guideView" style="display:none;"></main>

    <script>
        // --- Theme Management ---
        function applyTheme(mode) {
            if (mode === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').innerText = '☀️';
                document.getElementById('theme-meta').setAttribute('content', '#f2f2f7');
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('themeIcon').innerText = '🌙';
                document.getElementById('theme-meta').setAttribute('content', '#000000');
            }
        }

        function toggleTheme() {
            const isLight = document.body.classList.contains('light-mode');
            const newMode = isLight ? 'dark' : 'light';
            localStorage.setItem('theme', newMode);
            applyTheme(newMode);
            renderUI(); // Re-draw charts with correct colors
        }

        // --- Tab Switching ---
        function switchTab(tab) {
            const portfolio = document.getElementById('watchlist');
            const guide = document.getElementById('guideView');
            const tabPortfolio = document.getElementById('tab-portfolio');
            const tabGuide = document.getElementById('tab-guide');

            if (tab === 'guide') {
                portfolio.style.display = 'none';
                guide.style.display = 'block';
                tabPortfolio.classList.remove('active');
                tabGuide.classList.add('active');
                if (!guide.dataset.rendered) {
                    guide.innerHTML = getGuideHTML();
                    guide.dataset.rendered = '1';
                }
            } else {
                portfolio.style.display = '';
                guide.style.display = 'none';
                tabGuide.classList.remove('active');
                tabPortfolio.classList.add('active');
            }
        }

        // --- Indicator Guide Content ---
        function getGuideHTML() {
            return `
                <div class="guide-section">
                    <h3>SMA — Simple Moving Average</h3>
                    <p>The average closing price over the last N days. SMA(50) and SMA(20) smooth out daily noise to show the underlying trend. Price above the SMA generally signals an uptrend; below signals a downtrend.</p>
                    <span class="guide-formula">SMA = (sum of last N closes) / N</span>
                </div>

                <div class="guide-section">
                    <h3>EMA — Exponential Moving Average</h3>
                    <p>Like SMA, but weights recent prices more heavily, so it reacts faster to new price action. EMA(20) is more responsive than SMA(20) and is often used to catch trend changes earlier.</p>
                    <span class="guide-formula">EMA(today) = (Price × k) + (EMA(yesterday) × (1 − k))
where k = 2 / (N + 1)</span>
                </div>

                <div class="guide-section">
                    <h3>Bollinger Bands</h3>
                    <p>A band around a moving average, set N standard deviations above and below. Price hugging the upper band suggests overbought conditions; hugging the lower band suggests oversold. Bands widen when volatility increases and narrow when it decreases.</p>
                    <span class="guide-formula">Middle = SMA(20)
Upper/Lower = SMA(20) ± (2 × std. deviation of last 20 closes)</span>
                </div>

                <div class="guide-section">
                    <h3>RSI — Relative Strength Index</h3>
                    <p>Measures the speed and size of recent price changes on a 0–100 scale. Traditionally, RSI above 70 suggests overbought (potential pullback), and below 30 suggests oversold (potential bounce). RSI works best in ranging markets — during strong trends it can stay overbought/oversold for a long time.</p>
                    <span class="guide-formula">RS = avg gain (14d) / avg loss (14d)
RSI = 100 − (100 / (1 + RS))</span>
                </div>

                <div class="guide-section">
                    <h3>MACD — Moving Average Convergence Divergence</h3>
                    <p>Shows the relationship between two EMAs (12 and 26 period) as a momentum oscillator. When the MACD line crosses above its signal line, momentum is shifting bullish; crossing below suggests bearish momentum.</p>
                    <span class="guide-formula">MACD line = EMA(12) − EMA(26)
Signal line = EMA(9) of MACD line</span>
                </div>

                <div class="guide-section">
                    <h3>SMA 200 — Long-term Trend Filter</h3>
                    <p>The 200-day simple moving average is the most widely used long-term trend indicator. Price above SMA200 = long-term uptrend; price below = long-term downtrend. The <strong>Golden Cross</strong> (SMA50 crossing above SMA200) and <strong>Death Cross</strong> (SMA50 crossing below SMA200) are the most cited trend-change signals in all of technical analysis.</p>
                    <p>SMA200 appears as a warning in the signal reasons if your BUY/SELL signal is going against the long-term trend — it won't block the signal, but flags the higher risk.</p>
                </div>

                <div class="guide-section">
                    <h3>ADX — Average Directional Index (Trend Strength)</h3>
                    <p>ADX measures <em>how strong</em> a trend is on a 0–100 scale — it does not indicate direction (that comes from SMA/price). Displayed in green when strong, red when weak.</p>
                    <ul>
                        <li><strong>ADX &gt; 25</strong> — real trend confirmed, signals are more reliable</li>
                        <li><strong>ADX &lt; 20</strong> — choppy/ranging market, breakout/crossover signals are frequently false</li>
                    </ul>
                    <p>ADX is always shown in the chart legend regardless of which indicators are toggled — it's context for trusting everything else.</p>
                </div>

                <div class="guide-section">
                    <h3>How the Signal Is Calculated</h3>
                    <p>The BUY/SELL/HOLD badge uses a two-factor rule based on RSI and SMA(50):</p>
                    <ul>
                        <li><strong>BUY</strong> — RSI oversold (&lt;30) <em>and</em> price above SMA(50)</li>
                        <li><strong>SELL</strong> — RSI overbought (&gt;70) <em>and</em> price below SMA(50)</li>
                        <li><strong>HOLD</strong> — anything else (mixed signals)</li>
                    </ul>
                    <p>The <strong>reasons list</strong> below the badge shows additional context — SMA200 long-term trend alignment, and ADX trend strength — which do not change the signal but tell you how much to trust it. An ⚠ caution appears when the signal conflicts with the SMA200 direction.</p>
                    <p style="margin-top:10px;"><em>This is decision support based on technical indicators only — not financial advice. Past patterns don't guarantee future price action, and signals are less reliable in low-ADX choppy markets.</em></p>
                </div>
            `;
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        // --- Config ---
        const CONFIG = {
            WORKER_BASE: 'https://stock-tracker-api.oletyashrith.workers.dev',
            REFRESH_MS: 60000,
            CHART_WINDOW_DAYS: 252, // ~1 trading year
            SMA_PERIOD: 50,
            RSI_PERIOD: 14,
            BB_PERIOD: 20,
            BB_MULT: 2,
            MACD_FAST: 12,
            MACD_SLOW: 26,
            MACD_SIGNAL: 9,
        };

        // --- State Management Engine ---
        let appState = {
            watchlist: JSON.parse(localStorage.getItem('stocks')) || ['AAPL', 'TSLA', 'MSFT'],
            alerts: JSON.parse(localStorage.getItem('alerts')) || {}, 
            indicators: JSON.parse(localStorage.getItem('indicators')) || {},
            ui: { charts: {}, news: {}, alerts: {} },
            dataCache: {},
            newsCache: {},
            errors: {},
            pin: localStorage.getItem('syncPin') || ''
        };

        window.myCharts = {};

        // Crosshair Chart Plugin (Dynamically colored)
        Chart.register({
            id: 'crosshair',
            afterDraw: chart => {
                if (chart.tooltip?._active?.length) {
                    let x = chart.tooltip._active[0].element.x, yAxis = chart.scales.y, ctx = chart.ctx;
                    const isLight = document.body.classList.contains('light-mode');
                    ctx.save(); ctx.beginPath(); ctx.moveTo(x, yAxis.top); ctx.lineTo(x, yAxis.bottom);
                    ctx.lineWidth = 1.5; 
                    ctx.strokeStyle = isLight ? 'rgba(0, 0, 0, 0.2)' : 'rgba(255, 255, 255, 0.2)'; 
                    ctx.setLineDash([4, 4]);
                    ctx.stroke(); ctx.restore();
                }
            }
        });

        // --- Math & Indicator Logic ---
        function getSMAArray(prices, period = CONFIG.SMA_PERIOD) { return prices.map((v, i, arr) => i < period - 1 ? null : arr.slice(i - period + 1, i + 1).reduce((a,b)=>a+b)/period); }
        function getEMAArray(prices, period) { let k = 2/(period+1), ema = [], prev = null; for(let i=0; i<prices.length; i++) { if(i===0){prev=prices[i];ema.push(prev);} else {prev=(prices[i]-prev)*k+prev;ema.push(prev);} } return ema; }
        function getBBArray(prices, period = CONFIG.BB_PERIOD, mult = CONFIG.BB_MULT) { let upper=[], lower=[]; prices.forEach((v, i, arr)=>{ if(i<period-1){upper.push(null);lower.push(null);return;} let slice=arr.slice(i-period+1, i+1), mean=slice.reduce((a,b)=>a+b)/period, variance=slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/period, std=Math.sqrt(variance); upper.push(mean+mult*std); lower.push(mean-mult*std); }); return {upper, lower}; }
        function getRSIArray(prices, period = CONFIG.RSI_PERIOD) { let rsi=[], gains=0, losses=0; for(let i=0; i<prices.length; i++) { if(i<period){rsi.push(null);continue;} if(i===period){for(let j=1;j<=period;j++){let d=prices[j]-prices[j-1]; if(d>0)gains+=d; else losses-=d;} }else{let d=prices[i]-prices[i-1]; gains=((gains*(period-1))+(d>0?d:0))/period; losses=((losses*(period-1))+(d<0?-d:0))/period; } let rs=losses===0?100:gains/losses; rsi.push(100-(100/(1+rs))); } return rsi; }
        function getMACDArray(prices, fast = CONFIG.MACD_FAST, slow = CONFIG.MACD_SLOW, signalPeriod = CONFIG.MACD_SIGNAL) { let emaFast=getEMAArray(prices, fast), emaSlow=getEMAArray(prices, slow), macd=prices.map((_,i)=>i>=slow-1 ? emaFast[i]-emaSlow[i] : null); let validMacd = macd.filter(x=>x!==null); let signalValid = getEMAArray(validMacd, signalPeriod); let signal = Array(macd.length - signalValid.length).fill(null).concat(signalValid); return {macd, signal}; }

        // ADX (Average Directional Index) — Wilder's smoothing. Measures trend STRENGTH (0-100),
        // not direction. >25 = real trend worth trusting, <20 = choppy/range-bound, signals less reliable.
        // Requires OHLC (high/low); returns all-null array if unavailable so callers can degrade gracefully.
        function getADXArray(ohlc, period = 14) {
            const len = ohlc.length;
            const nullArr = () => new Array(len).fill(null);
            if (!ohlc.length || ohlc[0].h === null || ohlc[0].h === undefined) return nullArr();

            const tr = nullArr(), plusDM = nullArr(), minusDM = nullArr();
            for (let i = 1; i < len; i++) {
                if (ohlc[i].h === null || ohlc[i-1].h === null) continue;
                const upMove = ohlc[i].h - ohlc[i-1].h;
                const downMove = ohlc[i-1].l - ohlc[i].l;
                plusDM[i] = (upMove > downMove && upMove > 0) ? upMove : 0;
                minusDM[i] = (downMove > upMove && downMove > 0) ? downMove : 0;
                const prevClose = ohlc[i-1].c;
                tr[i] = Math.max(ohlc[i].h - ohlc[i].l, Math.abs(ohlc[i].h - prevClose), Math.abs(ohlc[i].l - prevClose));
            }

            const smooth = (arr) => {
                const out = nullArr();
                let prev = null;
                for (let i = 0; i < len; i++) {
                    if (arr[i] === null) continue;
                    if (prev === null) {
                        const slice = arr.slice(Math.max(0, i - period + 1), i + 1).filter(x => x !== null);
                        if (slice.length < period) continue;
                        prev = slice.reduce((a,b)=>a+b, 0);
                        out[i] = prev;
                    } else {
                        prev = prev - (prev / period) + arr[i];
                        out[i] = prev;
                    }
                }
                return out;
            };

            const sTR = smooth(tr), sPlusDM = smooth(plusDM), sMinusDM = smooth(minusDM);
            const dx = nullArr();
            for (let i = 0; i < len; i++) {
                if (sTR[i] === null || sTR[i] === 0) continue;
                const plusDI = 100 * sPlusDM[i] / sTR[i];
                const minusDI = 100 * sMinusDM[i] / sTR[i];
                const sum = plusDI + minusDI;
                dx[i] = sum === 0 ? 0 : 100 * Math.abs(plusDI - minusDI) / sum;
            }

            const adx = nullArr();
            let prevAdx = null;
            const dxStart = dx.findIndex(x => x !== null);
            if (dxStart === -1) return adx;
            for (let i = dxStart; i < len; i++) {
                if (dx[i] === null) continue;
                if (prevAdx === null) {
                    if (i < dxStart + period - 1) continue;
                    const slice = dx.slice(dxStart, dxStart + period).filter(x => x !== null);
                    if (!slice.length) continue;
                    prevAdx = slice.reduce((a,b)=>a+b, 0) / slice.length;
                    adx[i] = prevAdx;
                } else {
                    prevAdx = (prevAdx * (period - 1) + dx[i]) / period;
                    adx[i] = prevAdx;
                }
            }
            return adx;
        }

        // Simple signal: RSI + price-vs-SMA50 crossover, confirmed by SMA200 long-term trend
        // and ADX trend strength. No external data dependencies (news/sentiment).
        function getSimpleSignal(prices, computed) {
            const i = prices.length - 1;
            const currentPrice = prices[i];
            const rsi = computed.rsi[i];
            const sma = computed.sma[i];
            const sma200 = computed.sma200 ? computed.sma200[i] : null;
            const adx = computed.adx ? computed.adx[i] : null;
            const reasons = [];
            let signal = 'HOLD';

            if (rsi !== null) {
                if (rsi < 30) reasons.push(`RSI oversold (${rsi.toFixed(1)})`);
                else if (rsi > 70) reasons.push(`RSI overbought (${rsi.toFixed(1)})`);
            }
            if (sma !== null) {
                reasons.push(currentPrice > sma ? `Price above SMA${CONFIG.SMA_PERIOD}` : `Price below SMA${CONFIG.SMA_PERIOD}`);
            }
            if (sma200 !== null) {
                reasons.push(currentPrice > sma200 ? 'Long-term trend (SMA200) bullish' : 'Long-term trend (SMA200) bearish');
            }
            if (adx !== null) {
                reasons.push(adx > 25 ? `Trend confirmed strong (ADX ${adx.toFixed(1)})` : `Trend weak/choppy (ADX ${adx.toFixed(1)}) — signal less reliable`);
            }

            if (rsi !== null && sma !== null) {
                if (rsi < 30 && currentPrice > sma) signal = 'BUY';
                else if (rsi > 70 && currentPrice < sma) signal = 'SELL';
            }

            // Long-term trend confirmation: if SMA200 disagrees with the signal direction, flag it
            // rather than overriding — this keeps the core rule unchanged but adds a visible caveat.
            if (signal === 'BUY' && sma200 !== null && currentPrice < sma200) {
                reasons.push('⚠ Caution: against the long-term (SMA200) downtrend');
            }
            if (signal === 'SELL' && sma200 !== null && currentPrice > sma200) {
                reasons.push('⚠ Caution: against the long-term (SMA200) uptrend');
            }

            return { signal, reasons };
        }

        // Compute and cache all indicator arrays for a ticker's full price history.
        // Avoids recomputing on every render / chart redraw.
        function computeIndicatorSet(prices, ohlc) {
            const set = {
                sma: getSMAArray(prices),
                sma20: getSMAArray(prices, 20),
                sma200: getSMAArray(prices, 200),
                ema20: getEMAArray(prices, 20),
                bb: getBBArray(prices),
                rsi: getRSIArray(prices),
                macd: getMACDArray(prices),
                adx: getADXArray(ohlc || []),
            };
            set.composite = getSimpleSignal(prices, set);
            return set;
        }

        // --- API Data Fetching (via Cloudflare Worker proxy) ---
        async function fetchStockData(ticker) {
            const res = await fetch(`${CONFIG.WORKER_BASE}/api/chart?ticker=${encodeURIComponent(ticker)}&range=1y&interval=1d`);
            if (!res.ok) {
                let msg = `HTTP ${res.status}`;
                try { const j = await res.json(); if(j.error) msg = j.error; } catch(e) {}
                throw new Error(msg);
            }
            const data = await res.json();
            if (!data.prices || !data.prices.length) throw new Error('No price data returned');
            return { prices: data.prices, dates: data.dates, ohlc: data.ohlc || [] };
        }

        async function fetchNews(ticker) {
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/news?ticker=${encodeURIComponent(ticker)}`);
                if (!res.ok) return [];
                const data = await res.json();
                return data.news || [];
            } catch(e) { return []; }
        }

        // --- Watchlist Sync (PIN-based, Cloudflare KV) ---
        function setSyncStatus(msg, type) {
            const el = document.getElementById('syncStatus');
            el.textContent = msg;
            el.className = 'sync-status' + (type ? ' ' + type : '');
        }

        function getPin() {
            const val = document.getElementById('pinInput').value.trim();
            return val;
        }

        async function loadFromPin() {
            const pin = getPin();
            if (!/^[0-9]{4,12}$/.test(pin)) { setSyncStatus('PIN must be 4-12 digits', 'error'); return; }

            setSyncStatus('Loading...', '');
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/watchlist?pin=${encodeURIComponent(pin)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data.watchlist) { setSyncStatus('No saved watchlist found for this PIN', 'error'); return; }
                if (!Array.isArray(data.watchlist) || !data.watchlist.every(t => typeof t === 'string')) {
                    setSyncStatus('Cloud watchlist data is malformed', 'error');
                    return;
                }

                appState.watchlist = data.watchlist;
                appState.pin = pin;
                localStorage.setItem('stocks', JSON.stringify(appState.watchlist));
                localStorage.setItem('syncPin', pin);

                setSyncStatus('Loaded watchlist from cloud', 'ok');
                document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
                await updateData();
            } catch(e) {
                setSyncStatus('Failed to load: ' + e.message, 'error');
            }
        }

        async function saveToPin() {
            const pin = getPin();
            if (!/^[0-9]{4,12}$/.test(pin)) { setSyncStatus('PIN must be 4-12 digits', 'error'); return; }

            setSyncStatus('Saving...', '');
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin, watchlist: appState.watchlist })
                });
                if (!res.ok) {
                    let msg = `HTTP ${res.status}`;
                    try { const j = await res.json(); if(j.error) msg = j.error; } catch(e) {}
                    throw new Error(msg);
                }
                appState.pin = pin;
                localStorage.setItem('syncPin', pin);
                setSyncStatus('Saved to cloud', 'ok');
            } catch(e) {
                setSyncStatus('Failed to save: ' + e.message, 'error');
            }
        }

        // Saves watchlist locally, and to cloud if a PIN is set
        function persistWatchlist() {
            localStorage.setItem('stocks', JSON.stringify(appState.watchlist));
            if (appState.pin) {
                fetch(`${CONFIG.WORKER_BASE}/api/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: appState.pin, watchlist: appState.watchlist })
                }).then(res => {
                    if (res.ok) setSyncStatus('Synced', 'ok');
                    else setSyncStatus('Cloud sync failed', 'error');
                }).catch(() => setSyncStatus('Cloud sync failed (offline?)', 'error'));
            }
        }

        // --- Core Application Loop ---
        async function updateData() {
            await Promise.all(appState.watchlist.map(async ticker => {
                ensureTickerState(ticker);

                try {
                    const data = await fetchStockData(ticker);
                    if (!Array.isArray(data.prices) || !data.prices.length) {
                        throw new Error('No price data returned');
                    }
                    data.computed = computeIndicatorSet(data.prices, data.ohlc);
                    appState.dataCache[ticker] = data;
                    delete appState.errors[ticker];
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                    delete appState.dataCache[ticker]; // Guardrail: don't render stale/partial data after a failed refresh
                }

                try { evaluateAlerts(ticker); } catch(e) { console.error(`evaluateAlerts failed for ${ticker}:`, e); }
                renderUI(); // Render each card as soon as its data arrives
            }));
            localStorage.setItem('indicators', JSON.stringify(appState.indicators));
        }

        function buildSignalInnerHTML(comp) {
            const sigClass = comp.signal === 'BUY' ? 'buy' : comp.signal === 'SELL' ? 'sell' : 'hold';
            return `
                <div class="signal-header">
                    <span class="badge ${sigClass}">${comp.signal}</span>
                </div>
                <ul class="signal-reasons">
                    ${comp.reasons.map(r => `<li>${r}</li>`).join('')}
                </ul>`;
        }

        // --- Alert System Logic ---
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted") Notification.requestPermission();
        }

        function evaluateAlerts(ticker) {
            const data = appState.dataCache[ticker];
            if(!data || !appState.alerts[ticker] || !appState.alerts[ticker].length) return;
            if (!Array.isArray(data.prices) || !data.prices.length || !data.computed) return;

            const prices = data.prices;
            const currentPrice = prices[prices.length-1];
            const rsiArr = data.computed.rsi || [];
            const smaArr = data.computed.sma || [];
            const rsi = rsiArr.length ? rsiArr[rsiArr.length-1] : null;
            const sma = smaArr.length ? smaArr[smaArr.length-1] : null;

            let stateChanged = false;

            appState.alerts[ticker].forEach(al => {
                if(al.triggered) return;
                let valToCheck = al.ind === 'Price' ? currentPrice : (al.ind === 'RSI' ? rsi : sma);
                let hit = (al.cond === '>' && valToCheck > al.val) || (al.cond === '<' && valToCheck < al.val);
                
                if (hit) {
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification(`📈 Alert Triggered: ${ticker}`, { body: `${al.ind} is ${al.cond} ${al.val} (Currently: ${valToCheck.toFixed(2)})` });
                    }
                    al.triggered = true; 
                    stateChanged = true;
                }
            });

            if(stateChanged) localStorage.setItem('alerts', JSON.stringify(appState.alerts));
        }

        function addCustomAlert(ticker) {
            requestNotificationPermission();
            const ind = document.getElementById(`alt-ind-${ticker}`).value;
            const cond = document.getElementById(`alt-cond-${ticker}`).value;
            const val = parseFloat(document.getElementById(`alt-val-${ticker}`).value);
            
            if(isNaN(val)) return alert("Please enter a valid number");

            appState.alerts[ticker].push({ id: Date.now(), ind, cond, val, triggered: false });
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        function deleteAlert(ticker, id) {
            appState.alerts[ticker] = appState.alerts[ticker].filter(a => a.id !== id);
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        // --- UI Rendering ---
        function renderUI() {
            const container = document.getElementById('watchlist');
            if (!container) return;
            if(appState.watchlist.length === 0) { container.innerHTML = '<div class="info-card">No stocks tracked. Add one above.</div>'; return; }
            
            let html = '';
            for (let ticker of appState.watchlist) {
                try {
                    html += renderStockCard(ticker);
                } catch (e) {
                    // Guardrail: one ticker's bad data must never break the whole list.
                    console.error(`renderUI failed for ${ticker}:`, e);
                    html += `
                        <div class="info-card error-card">
                            <div><strong>${ticker}</strong>: Display error (${e.message || 'unknown'})</div>
                            <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                        </div>`;
                }
            }

            container.innerHTML = html;
            appState.watchlist.forEach(ticker => {
                if (appState.ui.charts[ticker] && appState.dataCache[ticker]) {
                    try { drawChart(ticker); } catch (e) { console.error(`drawChart failed for ${ticker}:`, e); }
                }
            });
        }

        // Ensures per-ticker state objects exist, regardless of how the ticker entered the watchlist
        // (typed in, loaded from PIN sync, etc.) — guards against undefined access anywhere downstream.
        function ensureTickerState(ticker) {
            if (!appState.indicators[ticker]) appState.indicators[ticker] = {sma:false, sma20:false, sma200:false, ema20:false, bb:false, rsi:false, macd:false, volume:true, pivot:false, swing:false};
            if (!appState.alerts[ticker]) appState.alerts[ticker] = [];
        }

        function renderStockCard(ticker) {
            ensureTickerState(ticker);
            const data = appState.dataCache[ticker];

            if(!data) {
                if(appState.errors[ticker]) {
                    return `
                        <div class="info-card error-card">
                            <div><strong>${ticker}</strong>: ${appState.errors[ticker]}</div>
                            <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                        </div>`;
                }
                return `<div class="info-card">${ticker}: Loading...</div>`;
            }

            // Guardrail: malformed/empty data shouldn't crash — show an error card instead.
            if (!Array.isArray(data.prices) || data.prices.length === 0 || !data.computed) {
                return `
                    <div class="info-card error-card">
                        <div><strong>${ticker}</strong>: No usable price data</div>
                        <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                    </div>`;
            }

            const prices = data.prices;
            const currentPrice = prices[prices.length-1];
            const prevPrice = prices.length > 1 ? prices[prices.length-2] : currentPrice;
            const isBullish = currentPrice >= prevPrice;

            const computed = data.computed;
            const rsiArr = computed.rsi || [];
            const smaArr = computed.sma || [];
            const rsiVal = rsiArr.length ? rsiArr[rsiArr.length-1] : null;
            const smaVal = smaArr.length ? smaArr[smaArr.length-1] : null;
            const rsi = (rsiVal !== null && rsiVal !== undefined) ? rsiVal.toFixed(1) : '—';
            const sma = (smaVal !== null && smaVal !== undefined) ? smaVal.toFixed(2) : '—';

            const comp = computed.composite || { signal: 'HOLD', reasons: [] };
            const sigClass = comp.signal === 'BUY' ? 'buy' : comp.signal === 'SELL' ? 'sell' : 'hold';

            const ui = appState.ui;
            const inds = appState.indicators[ticker];

            let alertsHtml = (appState.alerts[ticker] || []).map(a => `
                <div class="active-alert">
                    <span>${a.triggered ? '⚠️' : '🔔'} ${a.ind} ${a.cond} ${a.val}</span>
                    <button class="del-alert" onclick="deleteAlert('${ticker}', ${a.id})">✕</button>
                </div>
            `).join('');

            let newsHtml = '<div style="text-align:center;color:var(--text-sub);font-size:0.85rem;">Loading news...</div>';
            if (appState.newsCache[ticker]) {
                const newsItems = appState.newsCache[ticker] || [];
                newsHtml = newsItems.length === 0 ? '<div style="color:var(--text-sub);font-size:0.8rem;">No recent news found.</div>' :
                    newsItems.map(n => `
                    <div class="news-item">
                        <a href="${n.link || '#'}" target="_blank">${n.title || 'Untitled'}</a>
                        <div class="news-date">${n.publisher || ''} • ${n.providerPublishTime ? new Date(n.providerPublishTime*1000).toLocaleDateString() : ''}</div>
                    </div>`).join('');
            }

            let signalHtml = `
                <div class="signal-panel" id="signal-panel-${ticker}">
                    ${buildSignalInnerHTML(comp)}
                </div>`;

            return `
                <div class="stock-card sig-${sigClass}">
                    <div class="card-inner">
                        <div class="card-top">
                            <div class="card-left">
                                <h2 class="ticker">${ticker}</h2>
                                <span class="company-meta">RSI ${rsi} &nbsp;·&nbsp; SMA $${sma}</span>
                            </div>
                            <div class="card-right">
                                <h2 class="price" style="color:${isBullish ? 'var(--buy-color)' : 'var(--sell-color)'}">$${currentPrice.toFixed(2)}</h2>
                                <span class="badge ${sigClass}">${comp.signal}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Signal Detail -->
                    ${signalHtml}

                    <!-- Panel: CHART -->
                    <div class="panel chart-container ${ui.charts[ticker] ? 'active' : ''}">
                        <div class="indicator-toggles">
                            <button class="ind-btn ${inds.volume?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'volume')">Volume</button>
                            <button class="ind-btn ${inds.sma?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma')">SMA 50</button>
                            <button class="ind-btn ${inds.sma20?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma20')">SMA 20</button>
                            <button class="ind-btn ${inds.sma200?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma200')">SMA 200</button>
                            <button class="ind-btn ${inds.ema20?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'ema20')">EMA 20</button>
                            <button class="ind-btn ${inds.bb?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'bb')">BB</button>
                            <button class="ind-btn ${inds.pivot?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'pivot')">Pivots</button>
                            <button class="ind-btn ${inds.swing?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'swing')">Swings</button>
                            <button class="ind-btn ${inds.rsi?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'rsi')">RSI</button>
                            <button class="ind-btn ${inds.macd?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'macd')">MACD</button>
                        </div>
                        <div class="chart-legend-values" id="legend-${ticker}"></div>
                        <div class="canvas-wrapper"><canvas id="canvas-${ticker}"></canvas></div>
                    </div>

                    <!-- Panel: NEWS -->
                    <div class="panel ${ui.news[ticker] ? 'active' : ''}">${newsHtml}</div>

                    <!-- Panel: ALERTS -->
                    <div class="panel ${ui.alerts[ticker] ? 'active' : ''}">
                        <div style="margin-bottom:10px;">${alertsHtml}</div>
                        <div style="font-size:0.78rem; color:var(--text-sub); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px;">New Alert</div>
                        <div class="alert-form">
                            <select id="alt-ind-${ticker}"><option value="Price">Price</option><option value="RSI">RSI</option><option value="SMA">SMA 50</option></select>
                            <select id="alt-cond-${ticker}"><option value=">">Above</option><option value="<">Below</option></select>
                            <input type="number" id="alt-val-${ticker}" placeholder="Value">
                            <button onclick="addCustomAlert('${ticker}')">Set</button>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="icon-btn ${ui.charts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'charts')">
                            <span class="icon-glyph">📈</span><span>Chart</span>
                        </button>
                        <button class="icon-btn ${ui.news[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'news')">
                            <span class="icon-glyph">📰</span><span>News</span>
                        </button>
                        <button class="icon-btn ${ui.alerts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'alerts')">
                            <span class="icon-glyph">🔔</span><span>Alerts</span>
                        </button>
                        <button class="icon-btn" onclick="deleteStock('${ticker}')">
                            <span class="icon-glyph">✕</span><span>Remove</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // --- Candlestick Chart Plugin (native, no external dependency) ---
        // Registers a custom 'candlestick' chart type with Chart.js once.
        (function registerCandlestickChart() {
            if (Chart.registry.controllers.get('candlestick')) return; // already registered

            class CandlestickController extends Chart.DatasetController {}
            CandlestickController.id = 'candlestick';
            CandlestickController.defaults = { dataElementType: 'candlestick' };

            class CandlestickElement extends Chart.Element {
                draw(ctx) {
                    const { x, open, high, low, close, width, bullColor, bearColor } = this.getProps(['x','open','high','low','close','width','bullColor','bearColor']);
                    const isBull = close >= open;
                    const color = isBull ? bullColor : bearColor;
                    const top = Math.min(open, close);
                    const bottom = Math.max(open, close);
                    const bodyH = Math.max(1, bottom - top);
                    const w = Math.max(1, width);

                    ctx.save();
                    ctx.strokeStyle = color;
                    ctx.fillStyle = isBull ? color + '33' : color; // bullish = hollow fill, bearish = filled

                    // Wick
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(x, high);
                    ctx.lineTo(x, low);
                    ctx.stroke();

                    // Body
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x - w/2, top, w, bodyH);
                    ctx.fillRect(x - w/2, top, w, bodyH);
                    ctx.restore();
                }
                inRange() { return false; }
                inXRange() { return false; }
                inYRange() { return false; }
                getCenterPoint() { return { x: this.x, y: this.close }; }
                getRange() { return 0; }
            }
            CandlestickElement.id = 'candlestick';
            CandlestickElement.defaults = { bullColor: '#00d395', bearColor: '#ff5c5c', width: 6 };

            CandlestickController.prototype.parseObjectData = function(meta, data, start, count) {
                const parsed = [];
                for (let i = start; i < start + count && i < data.length; i++) {
                    const d = data[i];
                    parsed.push({ x: i, open: d.o, high: d.h, low: d.l, close: d.c });
                }
                return parsed;
            };
            CandlestickController.prototype.getLabelAndValue = function(index) {
                const d = this.getDataset().data[index];
                return {
                    label: this.chart.data.labels[index] || '',
                    value: d ? `O:${d.o?.toFixed(2)} H:${d.h?.toFixed(2)} L:${d.l?.toFixed(2)} C:${d.c?.toFixed(2)}` : ''
                };
            };
            CandlestickController.prototype.updateElement = function(el, index, properties, mode) {
                const meta = this.getMeta();
                const dataset = this.getDataset();
                const parsed = this.getParsed(index);
                const scale = this.chart.scales;
                const yScale = scale[meta.yAxisID || 'y'];
                const xScale = scale[meta.xAxisID || 'x'];

                const x = xScale.getPixelForValue(index);
                const bandWidth = xScale.width / (this.chart.data.labels.length || 1);
                const width = Math.max(2, Math.min(12, bandWidth * 0.6));

                properties.x = x;
                properties.high = yScale.getPixelForValue(parsed.high);
                properties.low = yScale.getPixelForValue(parsed.low);
                properties.open = yScale.getPixelForValue(parsed.open);
                properties.close = yScale.getPixelForValue(parsed.close);
                properties.width = width;
                properties.bullColor = CandlestickElement.defaults.bullColor;
                properties.bearColor = CandlestickElement.defaults.bearColor;

                Chart.DatasetController.prototype.updateElement.call(this, el, index, properties, mode);
            };

            Chart.register(CandlestickController, CandlestickElement);
        })();

        // --- Price Action Indicators ---
        // Pivot Points (Classic) — daily support/resistance levels traders watch.
        // Returns { pp, r1, r2, s1, s2 } based on prior period's high/low/close.
        function getPivotPoints(ohlc) {
            if (!ohlc || ohlc.length < 2) return null;
            const prev = ohlc[ohlc.length - 2];
            if (!prev || prev.h === null) return null;
            const pp = (prev.h + prev.l + prev.c) / 3;
            return {
                pp: pp,
                r1: 2 * pp - prev.l,
                r2: pp + (prev.h - prev.l),
                s1: 2 * pp - prev.h,
                s2: pp - (prev.h - prev.l),
            };
        }

        // Swing High/Low — local maxima/minima over a lookback window.
        // Returns arrays of { index, price } for chart scatter points.
        function getSwingPoints(ohlc, lookback = 5) {
            const highs = [], lows = [];
            if (!ohlc || ohlc.length < lookback * 2 + 1) return { highs, lows };
            for (let i = lookback; i < ohlc.length - lookback; i++) {
                const c = ohlc[i];
                if (!c || c.h === null) continue;
                const window = ohlc.slice(i - lookback, i + lookback + 1);
                if (window.some(w => !w || w.h === null)) continue;
                if (c.h >= Math.max(...window.map(w => w.h))) highs.push({ x: i, y: c.h });
                if (c.l <= Math.min(...window.map(w => w.l))) lows.push({ x: i, y: c.l });
            }
            return { highs, lows };
        }

        // --- Chart Drawing Logic ---
        function drawChart(ticker) {
            const data = appState.dataCache[ticker];
            if (!data || !Array.isArray(data.prices) || !data.prices.length || !data.computed) return;

            const canvas = document.getElementById(`canvas-${ticker}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            ensureTickerState(ticker);
            const inds = appState.indicators[ticker];
            const computed = data.computed;

            const sl = Math.min(CONFIG.CHART_WINDOW_DAYS, data.prices.length);
            const prices = data.prices.slice(-sl);
            const dates = (data.dates || []).slice(-sl);
            const ohlc = (data.ohlc || []).slice(-sl);
            if (!prices.length) return;

            const isLight = document.body.classList.contains('light-mode');
            const cBuy = '#00d395';
            const cSell = '#ff5c5c';
            const cSma = '#f5a623';
            const cSma20 = '#5ac8fa';
            const cSma200 = '#ff9f7f';
            const cEma20 = '#a78bfa';
            const cBb = isLight ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)';
            const cRsi = '#b58900';
            const cMacd = '#d33682';
            const cPivot = isLight ? 'rgba(100,100,200,0.6)' : 'rgba(180,180,255,0.6)';
            const gridColor = isLight ? '#e5e5ea' : '#222222';
            const tickColor = isLight ? '#8e8e93' : '#888888';
            const tooltipBg = isLight ? 'rgba(255,255,255,0.95)' : 'rgba(28,28,30,0.95)';
            const tooltipText = isLight ? '#000000' : '#ffffff';

            // Use candlesticks if OHLC is available, otherwise fall back to line chart
            const hasOhlc = ohlc.length === prices.length && ohlc.some(c => c && c.h !== null);

            let datasets = [];

            if (hasOhlc) {
                datasets.push({
                    type: 'candlestick',
                    label: 'Price',
                    data: ohlc.map(c => ({ o: c.o, h: c.h, l: c.l, c: c.c })),
                    yAxisID: 'y',
                    order: 2,
                });
            } else {
                datasets.push({
                    type: 'line',
                    label: 'Price',
                    data: prices,
                    borderColor: (prices[prices.length-1] >= prices[prices.length-2]) ? cBuy : cSell,
                    borderWidth: 2, pointRadius: 0, fill: false, tension: 0.1, yAxisID: 'y', order: 2,
                });
            }

            // Volume bars (secondary y-axis, bottom 20% of chart via max scaling)
            if (hasOhlc && inds.volume) {
                const volumes = ohlc.map((c, i) => ({
                    x: i,
                    y: c.v || 0,
                    backgroundColor: (c.c >= c.o) ? 'rgba(0,211,149,0.25)' : 'rgba(255,92,92,0.25)',
                }));
                datasets.push({
                    type: 'bar',
                    label: 'Volume',
                    data: ohlc.map(c => c.v || 0),
                    backgroundColor: ohlc.map(c => (c.c >= c.o) ? 'rgba(0,211,149,0.25)' : 'rgba(255,92,92,0.25)'),
                    yAxisID: 'yVol',
                    order: 3,
                });
            }

            // MA overlays
            if (inds.sma && computed.sma) datasets.push({ type:'line', label:'SMA 50', data: computed.sma.slice(-sl), borderColor: cSma, borderWidth: 1.5, borderDash:[5,5], pointRadius:0, yAxisID:'y', order:1 });
            if (inds.sma20 && computed.sma20) datasets.push({ type:'line', label:'SMA 20', data: computed.sma20.slice(-sl), borderColor: cSma20, borderWidth: 1.5, borderDash:[5,5], pointRadius:0, yAxisID:'y', order:1 });
            if (inds.sma200 && computed.sma200) datasets.push({ type:'line', label:'SMA 200', data: computed.sma200.slice(-sl), borderColor: cSma200, borderWidth: 2, borderDash:[8,4], pointRadius:0, yAxisID:'y', order:1 });
            if (inds.ema20 && computed.ema20) datasets.push({ type:'line', label:'EMA 20', data: computed.ema20.slice(-sl), borderColor: cEma20, borderWidth: 1.5, pointRadius:0, yAxisID:'y', order:1 });
            if (inds.bb && computed.bb) {
                datasets.push({ type:'line', label:'BB Upper', data: computed.bb.upper.slice(-sl), borderColor: cBb, borderWidth:1, pointRadius:0, yAxisID:'y', order:1 });
                datasets.push({ type:'line', label:'BB Lower', data: computed.bb.lower.slice(-sl), borderColor: cBb, borderWidth:1, pointRadius:0, yAxisID:'y', order:1 });
            }

            // Pivot points — horizontal lines across the visible window
            if (inds.pivot && hasOhlc) {
                const pivots = getPivotPoints(ohlc);
                if (pivots) {
                    const pLine = (label, value, dash) => ({
                        type: 'line', label, data: new Array(sl).fill(value),
                        borderColor: cPivot, borderWidth: 1, borderDash: dash || [], pointRadius: 0, yAxisID: 'y', order: 1,
                    });
                    datasets.push(pLine(`R2 ${pivots.r2.toFixed(2)}`, pivots.r2, [4,4]));
                    datasets.push(pLine(`R1 ${pivots.r1.toFixed(2)}`, pivots.r1, [4,4]));
                    datasets.push(pLine(`PP ${pivots.pp.toFixed(2)}`, pivots.pp, []));
                    datasets.push(pLine(`S1 ${pivots.s1.toFixed(2)}`, pivots.s1, [4,4]));
                    datasets.push(pLine(`S2 ${pivots.s2.toFixed(2)}`, pivots.s2, [4,4]));
                }
            }

            // Swing high/low scatter markers
            if (inds.swing && hasOhlc) {
                const { highs, lows } = getSwingPoints(ohlc);
                if (highs.length) datasets.push({
                    type: 'scatter', label: 'Swing High',
                    data: highs.map(p => ({ x: p.x, y: p.y })),
                    backgroundColor: cSell, pointRadius: 4, pointStyle: 'triangle', rotation: 0, yAxisID: 'y', order: 0,
                });
                if (lows.length) datasets.push({
                    type: 'scatter', label: 'Swing Low',
                    data: lows.map(p => ({ x: p.x, y: p.y })),
                    backgroundColor: cBuy, pointRadius: 4, pointStyle: 'triangle', rotation: 180, yAxisID: 'y', order: 0,
                });
            }

            // Oscillators
            let hasOscillator = inds.rsi || inds.macd;
            if (inds.rsi && computed.rsi) datasets.push({ type:'line', label:'RSI', data: computed.rsi.slice(-sl), borderColor: cRsi, borderWidth:1.5, pointRadius:0, yAxisID:'y2', spanGaps:true });
            if (inds.macd && computed.macd) {
                datasets.push({ type:'line', label:'MACD', data: computed.macd.macd.slice(-sl), borderColor: cMacd, borderWidth:1.5, pointRadius:0, yAxisID:'y2', spanGaps:true });
                datasets.push({ type:'line', label:'Signal', data: computed.macd.signal.slice(-sl), borderColor:'#859900', borderWidth:1, pointRadius:0, yAxisID:'y2', spanGaps:true });
            }

            // Legend values
            const lastValid = (arr) => {
                if (!arr || !arr.length) return null;
                for (let i = arr.length-1; i >= 0; i--) {
                    if (arr[i] !== null && arr[i] !== undefined && !Number.isNaN(arr[i])) return arr[i];
                }
                return null;
            };
            const fmt = (v, d) => v === null ? '—' : v.toFixed(d);
            const lastCandle = hasOhlc ? ohlc[ohlc.length-1] : null;

            let legendItems = [];
            if (lastCandle) {
                legendItems.push({ name: 'O', color: tickColor, value: fmt(lastCandle.o, 2) });
                legendItems.push({ name: 'H', color: cBuy, value: fmt(lastCandle.h, 2) });
                legendItems.push({ name: 'L', color: cSell, value: fmt(lastCandle.l, 2) });
                legendItems.push({ name: 'C', color: (lastCandle.c >= lastCandle.o) ? cBuy : cSell, value: fmt(lastCandle.c, 2) });
                if (inds.volume && lastCandle.v) legendItems.push({ name: 'Vol', color: tickColor, value: (lastCandle.v / 1e6).toFixed(2) + 'M' });
            } else {
                legendItems.push({ name: 'Price', color: cBuy, value: fmt(prices[prices.length-1], 2) });
            }
            if (inds.sma && computed.sma) legendItems.push({ name: 'SMA 50', color: cSma, value: fmt(lastValid(computed.sma), 2) });
            if (inds.sma20 && computed.sma20) legendItems.push({ name: 'SMA 20', color: cSma20, value: fmt(lastValid(computed.sma20), 2) });
            if (inds.sma200 && computed.sma200) legendItems.push({ name: 'SMA 200', color: cSma200, value: fmt(lastValid(computed.sma200), 2) });
            if (inds.ema20 && computed.ema20) legendItems.push({ name: 'EMA 20', color: cEma20, value: fmt(lastValid(computed.ema20), 2) });
            if (inds.bb && computed.bb) {
                legendItems.push({ name: 'BB↑', color: cBb, value: fmt(lastValid(computed.bb.upper), 2) });
                legendItems.push({ name: 'BB↓', color: cBb, value: fmt(lastValid(computed.bb.lower), 2) });
            }
            if (inds.rsi && computed.rsi) legendItems.push({ name: 'RSI', color: cRsi, value: fmt(lastValid(computed.rsi), 1) });
            if (inds.macd && computed.macd) {
                legendItems.push({ name: 'MACD', color: cMacd, value: fmt(lastValid(computed.macd.macd), 2) });
                legendItems.push({ name: 'Sig', color: '#859900', value: fmt(lastValid(computed.macd.signal), 2) });
            }
            if (computed.adx) {
                const adxVal = lastValid(computed.adx);
                legendItems.push({ name: 'ADX', color: adxVal !== null && adxVal > 25 ? cBuy : cSell, value: adxVal === null ? '—' : adxVal.toFixed(1) });
            }

            const legendEl = document.getElementById(`legend-${ticker}`);
            if (legendEl) {
                legendEl.innerHTML = legendItems.map(item => `
                    <span class="legend-item">
                        <span class="legend-dot" style="background:${item.color}"></span>
                        <span class="legend-name">${item.name}</span>
                        <span class="legend-value">${item.value}</span>
                    </span>
                `).join('');
            }

            // Scales
            let scales = {
                x: { display: true, ticks: { color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { display: false } },
                y: { type: 'linear', position: 'right', ticks: { color: tickColor }, grid: { color: gridColor } },
            };
            if (inds.volume && hasOhlc) {
                // Volume axis: max = 5× actual max so bars only occupy bottom ~20% of chart
                const maxVol = Math.max(...ohlc.map(c => c.v || 0));
                scales.yVol = { type: 'linear', position: 'left', display: false, max: maxVol * 5, min: 0, grid: { display: false } };
            }
            if (hasOscillator) {
                scales.y2 = {
                    type: 'linear', position: 'left',
                    ticks: { color: tickColor },
                    grid: { display: false },
                    min: (inds.rsi && !inds.macd) ? 0 : undefined,
                    max: (inds.rsi && !inds.macd) ? 100 : undefined,
                };
            }

            if (window.myCharts[ticker]) window.myCharts[ticker].destroy();
            window.myCharts[ticker] = new Chart(ctx, {
                type: 'bar', // base type — individual datasets override with their own type
                data: { labels: dates, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    animation: false, // disable animation for snappier indicator toggling
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            padding: 10,
                            backgroundColor: tooltipBg,
                            titleColor: tooltipText,
                            bodyColor: tooltipText,
                            callbacks: {
                                label: (ctx) => {
                                    const d = ctx.dataset;
                                    if (d.type === 'candlestick' && d.data[ctx.dataIndex]) {
                                        const c = d.data[ctx.dataIndex];
                                        return `O:${c.o?.toFixed(2)} H:${c.h?.toFixed(2)} L:${c.l?.toFixed(2)} C:${c.c?.toFixed(2)}`;
                                    }
                                    return `${d.label}: ${typeof ctx.parsed.y === 'number' ? ctx.parsed.y.toFixed(2) : ctx.raw}`;
                                }
                            }
                        },
                    },
                    scales,
                },
            });
        }

        // --- App Interactions ---
        async function toggleUI(ticker, type, key) {
            if(type === 'panel') {
                let state = appState.ui[key][ticker];
                appState.ui.charts[ticker] = appState.ui.news[ticker] = appState.ui.alerts[ticker] = false;
                appState.ui[key][ticker] = !state; 
                
                if(key === 'news' && !appState.newsCache[ticker]) {
                    renderUI(); 
                    appState.newsCache[ticker] = await fetchNews(ticker);
                }
            }
            if(type === 'ind') appState.indicators[ticker][key] = !appState.indicators[ticker][key];
            
            localStorage.setItem('indicators', JSON.stringify(appState.indicators));
            renderUI();
        }

        function addStock() {
            const val = document.getElementById('tickerInput').value.toUpperCase().trim();
            if(val && !appState.watchlist.includes(val)) {
                appState.watchlist.unshift(val);
                persistWatchlist();
                document.getElementById('tickerInput').value = '';
                document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
                updateData();
            }
        }

        function deleteStock(ticker) {
            appState.watchlist = appState.watchlist.filter(t => t !== ticker);
            delete appState.dataCache[ticker];
            delete appState.errors[ticker];
            persistWatchlist();
            renderUI();
        }

        function retryStock(ticker) {
            ensureTickerState(ticker);
            delete appState.errors[ticker];
            renderUI();
            (async () => {
                try {
                    const data = await fetchStockData(ticker);
                    if (!Array.isArray(data.prices) || !data.prices.length) {
                        throw new Error('No price data returned');
                    }
                    data.computed = computeIndicatorSet(data.prices, data.ohlc);
                    appState.dataCache[ticker] = data;
                    delete appState.errors[ticker];
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                    delete appState.dataCache[ticker];
                }
                renderUI();
            })();
        }

        // Guardrail: if anything unforeseen crashes outside our try/catch blocks,
        // show it instead of leaving a silent "Initializing Data..." or blank page.
        window.addEventListener('error', (event) => {
            console.error('Unhandled error:', event.error);
            const container = document.getElementById('watchlist');
            if (container && container.innerHTML.includes('Initializing Data')) {
                container.innerHTML = `<div class="info-card error-card">
                    <div>Something went wrong loading the app: ${event.message || 'unknown error'}</div>
                    <button class="retry-btn" onclick="location.reload()">Reload</button>
                </div>`;
            }
        });
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled promise rejection:', event.reason);
        });

        // Initialize App
        document.getElementById('pinInput').value = appState.pin;

        updateData();
        setInterval(updateData, CONFIG.REFRESH_MS);
    </script>
