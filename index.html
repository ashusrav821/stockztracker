<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Pro Tracker</title>
    <meta name="theme-color" id="theme-meta" content="#000000">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Default Dark Theme Variables --- */
        :root {
            --bg-base: #000000; 
            --header-bg: linear-gradient(180deg, #111 0%, #000 100%);
            --card-bg: #151515; 
            --card-border: #2a2a2a;
            --text-main: #ffffff; 
            --text-sub: #a0a0a0; 
            --accent: #2997ff; 
            --buy-color: #32d74b; 
            --sell-color: #ff453a; 
            --hold-color: #ffd60a;
            --input-bg: #1c1c1e;
            --input-border: #333333;
            --hover-bg: #2a2a2a;
        }

        /* --- Light Theme Variables --- */
        body.light-mode {
            --bg-base: #f2f2f7; 
            --header-bg: linear-gradient(180deg, #ffffff 0%, #f2f2f7 100%);
            --card-bg: #ffffff; 
            --card-border: #e5e5ea;
            --text-main: #000000; 
            --text-sub: #8e8e93; 
            --accent: #007aff;
            --input-bg: #f2f2f7;
            --input-border: #d1d1d6;
            --hover-bg: #e5e5ea;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base); color: var(--text-main); display: flex; flex-direction: column; height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            padding: 40px 20px 20px 20px; background: var(--header-bg);
            border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 100;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
        .theme-toggle { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 0; }

        .search-bar { display: flex; gap: 8px; }
        .search-bar input { flex: 1; padding: 14px 16px; font-size: 1rem; background-color: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-main); border-radius: 12px; text-transform: uppercase; transition: 0.3s; }
        .search-bar button { padding: 0 20px; font-size: 1rem; font-weight: 600; background-color: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; }

        main { flex: 1; overflow-y: auto; padding: 20px; }
        .stock-card { background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; margin-bottom: 16px; padding: 16px; transition: 0.3s; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .ticker { font-size: 1.4rem; font-weight: 700; margin: 0; }
        .price { font-size: 1.4rem; font-weight: 700; margin: 0; text-align: right; }
        .stats-row { margin-top: 8px; font-size: 0.85rem; color: var(--text-sub); }

        .badge { padding: 4px 10px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
        .badge.buy { background: rgba(50, 215, 75, 0.15); color: var(--buy-color); border: 1px solid rgba(50, 215, 75, 0.3); }
        .badge.sell { background: rgba(255, 69, 58, 0.15); color: var(--sell-color); border: 1px solid rgba(255, 69, 58, 0.3); }
        .badge.hold { background: rgba(255, 214, 10, 0.15); color: var(--hold-color); border: 1px solid rgba(255, 214, 10, 0.3); }

        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--card-border); }
        .icon-btn { background: transparent; border: none; color: var(--text-sub); font-size: 0.9rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; transition: background 0.2s; }
        .icon-btn.active, .icon-btn:hover { background: var(--hover-bg); color: var(--text-main); }

        /* Panels (Chart, News, Alerts) */
        .panel { display: none; margin-top: 16px; border-top: 1px solid var(--card-border); padding-top: 12px; }
        .panel.active { display: block; }
        
        /* Chart specific */
        .canvas-wrapper { height: 250px; width: 100%; }
        .indicator-toggles { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
        .indicator-toggles::-webkit-scrollbar { display: none; }
        .ind-btn { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-sub); padding: 6px 12px; border-radius: 12px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; font-weight: 600; transition: 0.3s; }
        .ind-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(41, 151, 255, 0.1); }

        /* News specific */
        .news-item { padding: 10px 0; border-bottom: 1px solid var(--card-border); }
        .news-item:last-child { border-bottom: none; }
        .news-item a { color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 500; display: block; margin-bottom: 4px; }
        .news-date { font-size: 0.75rem; color: var(--text-sub); }

        /* Alerts specific */
        .alert-form { display: flex; gap: 8px; margin-top: 10px; }
        .alert-form select, .alert-form input { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); padding: 8px; border-radius: 8px; font-size: 0.85rem; }
        .alert-form input { flex: 1; min-width: 0; }
        .alert-form button { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .active-alert { display: flex; justify-content: space-between; align-items: center; background: var(--input-bg); padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; border-left: 3px solid var(--accent); }
        .del-alert { background: transparent; color: var(--sell-color); border: none; cursor: pointer; font-weight: bold; }

        /* Sync / PIN */
        .sync-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .sync-row input { flex: 1; padding: 10px 14px; font-size: 0.95rem; background-color: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-main); border-radius: 10px; letter-spacing: 2px; }
        .sync-row button { padding: 0 16px; font-size: 0.85rem; font-weight: 600; background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); border-radius: 10px; cursor: pointer; }
        .sync-row button.primary { background-color: var(--accent); color: white; border: none; }
        .sync-status { font-size: 0.75rem; color: var(--text-sub); margin-top: 6px; min-height: 1em; }
        .sync-status.error { color: var(--sell-color); }
        .sync-status.ok { color: var(--buy-color); }

        /* Error / loading card */
        .info-card { background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; margin-bottom: 16px; padding: 16px; text-align: center; color: var(--text-sub); font-size: 0.9rem; }
        .info-card.error-card { border-color: rgba(255, 69, 58, 0.3); color: var(--sell-color); }
        .retry-btn { margin-top: 8px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>My Portfolio</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌓</button>
        </div>
        <div class="search-bar">
            <input type="text" id="tickerInput" placeholder="Search Ticker (e.g. AAPL)">
            <button onclick="addStock()">Add</button>
        </div>
        <div class="sync-row">
            <input type="text" id="pinInput" placeholder="PIN (4-12 digits) for cloud sync" inputmode="numeric" maxlength="12">
            <button onclick="loadFromPin()">Load</button>
            <button class="primary" onclick="saveToPin()">Save</button>
        </div>
        <div class="sync-status" id="syncStatus"></div>
    </header>

    <main id="watchlist">
        <div class="info-card">Initializing Data...</div>
    </main>

    <script>
        // --- Theme Management ---
        function applyTheme(mode) {
            if (mode === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').innerText = '☀️';
                document.getElementById('theme-meta').setAttribute('content', '#f2f2f7');
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('themeIcon').innerText = '🌙';
                document.getElementById('theme-meta').setAttribute('content', '#000000');
            }
        }

        function toggleTheme() {
            const isLight = document.body.classList.contains('light-mode');
            const newMode = isLight ? 'dark' : 'light';
            localStorage.setItem('theme', newMode);
            applyTheme(newMode);
            renderUI(); // Re-draw charts with correct colors
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        // --- Config ---
        const CONFIG = {
            WORKER_BASE: 'https://stock-tracker-api.YOUR_SUBDOMAIN.workers.dev',
            REFRESH_MS: 60000,
            CHART_WINDOW_DAYS: 90,
            SMA_PERIOD: 50,
            RSI_PERIOD: 14,
            BB_PERIOD: 20,
            BB_MULT: 2,
            MACD_FAST: 12,
            MACD_SLOW: 26,
            MACD_SIGNAL: 9,
        };

        // --- State Management Engine ---
        let appState = {
            watchlist: JSON.parse(localStorage.getItem('stocks')) || ['AAPL', 'TSLA', 'MSFT'],
            alerts: JSON.parse(localStorage.getItem('alerts')) || {}, 
            indicators: JSON.parse(localStorage.getItem('indicators')) || {},
            ui: { charts: {}, news: {}, alerts: {} },
            dataCache: {},
            newsCache: {},
            errors: {},
            pin: localStorage.getItem('syncPin') || ''
        };

        window.myCharts = {};

        // Crosshair Chart Plugin (Dynamically colored)
        Chart.register({
            id: 'crosshair',
            afterDraw: chart => {
                if (chart.tooltip?._active?.length) {
                    let x = chart.tooltip._active[0].element.x, yAxis = chart.scales.y, ctx = chart.ctx;
                    const isLight = document.body.classList.contains('light-mode');
                    ctx.save(); ctx.beginPath(); ctx.moveTo(x, yAxis.top); ctx.lineTo(x, yAxis.bottom);
                    ctx.lineWidth = 1.5; 
                    ctx.strokeStyle = isLight ? 'rgba(0, 0, 0, 0.2)' : 'rgba(255, 255, 255, 0.2)'; 
                    ctx.setLineDash([4, 4]);
                    ctx.stroke(); ctx.restore();
                }
            }
        });

        // --- Math & Indicator Logic ---
        function getSMAArray(prices, period = CONFIG.SMA_PERIOD) { return prices.map((v, i, arr) => i < period - 1 ? null : arr.slice(i - period + 1, i + 1).reduce((a,b)=>a+b)/period); }
        function getEMAArray(prices, period) { let k = 2/(period+1), ema = [], prev = null; for(let i=0; i<prices.length; i++) { if(i===0){prev=prices[i];ema.push(prev);} else {prev=(prices[i]-prev)*k+prev;ema.push(prev);} } return ema; }
        function getBBArray(prices, period = CONFIG.BB_PERIOD, mult = CONFIG.BB_MULT) { let upper=[], lower=[]; prices.forEach((v, i, arr)=>{ if(i<period-1){upper.push(null);lower.push(null);return;} let slice=arr.slice(i-period+1, i+1), mean=slice.reduce((a,b)=>a+b)/period, variance=slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/period, std=Math.sqrt(variance); upper.push(mean+mult*std); lower.push(mean-mult*std); }); return {upper, lower}; }
        function getRSIArray(prices, period = CONFIG.RSI_PERIOD) { let rsi=[], gains=0, losses=0; for(let i=0; i<prices.length; i++) { if(i<period){rsi.push(null);continue;} if(i===period){for(let j=1;j<=period;j++){let d=prices[j]-prices[j-1]; if(d>0)gains+=d; else losses-=d;} }else{let d=prices[i]-prices[i-1]; gains=((gains*(period-1))+(d>0?d:0))/period; losses=((losses*(period-1))+(d<0?-d:0))/period; } let rs=losses===0?100:gains/losses; rsi.push(100-(100/(1+rs))); } return rsi; }
        function getMACDArray(prices, fast = CONFIG.MACD_FAST, slow = CONFIG.MACD_SLOW, signalPeriod = CONFIG.MACD_SIGNAL) { let emaFast=getEMAArray(prices, fast), emaSlow=getEMAArray(prices, slow), macd=prices.map((_,i)=>i>=slow-1 ? emaFast[i]-emaSlow[i] : null); let validMacd = macd.filter(x=>x!==null); let signalValid = getEMAArray(validMacd, signalPeriod); let signal = Array(macd.length - signalValid.length).fill(null).concat(signalValid); return {macd, signal}; }

        // Compute and cache all indicator arrays for a ticker's full price history.
        // Avoids recomputing on every render / chart redraw.
        function computeIndicatorSet(prices) {
            return {
                sma: getSMAArray(prices),
                bb: getBBArray(prices),
                rsi: getRSIArray(prices),
                macd: getMACDArray(prices),
            };
        }

        // --- API Data Fetching (via Cloudflare Worker proxy) ---
        async function fetchStockData(ticker) {
            const res = await fetch(`${CONFIG.WORKER_BASE}/api/chart?ticker=${encodeURIComponent(ticker)}&range=6mo&interval=1d`);
            if (!res.ok) {
                let msg = `HTTP ${res.status}`;
                try { const j = await res.json(); if(j.error) msg = j.error; } catch(e) {}
                throw new Error(msg);
            }
            const data = await res.json();
            if (!data.prices || !data.prices.length) throw new Error('No price data returned');
            return { prices: data.prices, dates: data.dates };
        }

        async function fetchNews(ticker) {
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/news?ticker=${encodeURIComponent(ticker)}`);
                if (!res.ok) return [];
                const data = await res.json();
                return data.news || [];
            } catch(e) { return []; }
        }

        // --- Watchlist Sync (PIN-based, Cloudflare KV) ---
        function setSyncStatus(msg, type) {
            const el = document.getElementById('syncStatus');
            el.textContent = msg;
            el.className = 'sync-status' + (type ? ' ' + type : '');
        }

        function getPin() {
            const val = document.getElementById('pinInput').value.trim();
            return val;
        }

        async function loadFromPin() {
            const pin = getPin();
            if (!/^[0-9]{4,12}$/.test(pin)) { setSyncStatus('PIN must be 4-12 digits', 'error'); return; }

            setSyncStatus('Loading...', '');
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/watchlist?pin=${encodeURIComponent(pin)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data.watchlist) { setSyncStatus('No saved watchlist found for this PIN', 'error'); return; }

                appState.watchlist = data.watchlist;
                appState.pin = pin;
                localStorage.setItem('stocks', JSON.stringify(appState.watchlist));
                localStorage.setItem('syncPin', pin);

                setSyncStatus('Loaded watchlist from cloud', 'ok');
                document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
                await updateData();
            } catch(e) {
                setSyncStatus('Failed to load: ' + e.message, 'error');
            }
        }

        async function saveToPin() {
            const pin = getPin();
            if (!/^[0-9]{4,12}$/.test(pin)) { setSyncStatus('PIN must be 4-12 digits', 'error'); return; }

            setSyncStatus('Saving...', '');
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin, watchlist: appState.watchlist })
                });
                if (!res.ok) {
                    let msg = `HTTP ${res.status}`;
                    try { const j = await res.json(); if(j.error) msg = j.error; } catch(e) {}
                    throw new Error(msg);
                }
                appState.pin = pin;
                localStorage.setItem('syncPin', pin);
                setSyncStatus('Saved to cloud', 'ok');
            } catch(e) {
                setSyncStatus('Failed to save: ' + e.message, 'error');
            }
        }

        // Saves watchlist locally, and to cloud if a PIN is set
        function persistWatchlist() {
            localStorage.setItem('stocks', JSON.stringify(appState.watchlist));
            if (appState.pin) {
                fetch(`${CONFIG.WORKER_BASE}/api/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: appState.pin, watchlist: appState.watchlist })
                }).then(res => {
                    if (res.ok) setSyncStatus('Synced', 'ok');
                    else setSyncStatus('Cloud sync failed', 'error');
                }).catch(() => setSyncStatus('Cloud sync failed (offline?)', 'error'));
            }
        }

        // --- Core Application Loop ---
        async function updateData() {
            await Promise.all(appState.watchlist.map(async ticker => {
                if(!appState.indicators[ticker]) appState.indicators[ticker] = {sma:false, bb:false, rsi:false, macd:false};
                if(!appState.alerts[ticker]) appState.alerts[ticker] = [];

                try {
                    const data = await fetchStockData(ticker);
                    data.computed = computeIndicatorSet(data.prices);
                    appState.dataCache[ticker] = data;
                    delete appState.errors[ticker];
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                }

                if(appState.ui.news[ticker] && !appState.newsCache[ticker]) {
                    appState.newsCache[ticker] = await fetchNews(ticker);
                }
                evaluateAlerts(ticker);
            }));
            localStorage.setItem('indicators', JSON.stringify(appState.indicators));
            renderUI();
        }

        // --- Alert System Logic ---
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted") Notification.requestPermission();
        }

        function evaluateAlerts(ticker) {
            const data = appState.dataCache[ticker];
            if(!data || !appState.alerts[ticker].length) return;

            const prices = data.prices;
            const currentPrice = prices[prices.length-1];
            const rsi = data.computed.rsi[data.computed.rsi.length-1];
            const sma = data.computed.sma[data.computed.sma.length-1];

            let stateChanged = false;

            appState.alerts[ticker].forEach(al => {
                if(al.triggered) return;
                let valToCheck = al.ind === 'Price' ? currentPrice : (al.ind === 'RSI' ? rsi : sma);
                let hit = (al.cond === '>' && valToCheck > al.val) || (al.cond === '<' && valToCheck < al.val);
                
                if (hit) {
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification(`📈 Alert Triggered: ${ticker}`, { body: `${al.ind} is ${al.cond} ${al.val} (Currently: ${valToCheck.toFixed(2)})` });
                    }
                    al.triggered = true; 
                    stateChanged = true;
                }
            });

            if(stateChanged) localStorage.setItem('alerts', JSON.stringify(appState.alerts));
        }

        function addCustomAlert(ticker) {
            requestNotificationPermission();
            const ind = document.getElementById(`alt-ind-${ticker}`).value;
            const cond = document.getElementById(`alt-cond-${ticker}`).value;
            const val = parseFloat(document.getElementById(`alt-val-${ticker}`).value);
            
            if(isNaN(val)) return alert("Please enter a valid number");

            appState.alerts[ticker].push({ id: Date.now(), ind, cond, val, triggered: false });
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        function deleteAlert(ticker, id) {
            appState.alerts[ticker] = appState.alerts[ticker].filter(a => a.id !== id);
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        // --- UI Rendering ---
        function renderUI() {
            const container = document.getElementById('watchlist');
            if(appState.watchlist.length === 0) { container.innerHTML = '<div class="info-card">No stocks tracked. Add one above.</div>'; return; }
            
            let html = '';
            for (let ticker of appState.watchlist) {
                const data = appState.dataCache[ticker];

                if(!data) {
                    if(appState.errors[ticker]) {
                        html += `
                            <div class="info-card error-card">
                                <div><strong>${ticker}</strong>: ${appState.errors[ticker]}</div>
                                <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                            </div>`;
                    } else {
                        html += `<div class="info-card">${ticker}: Loading...</div>`;
                    }
                    continue;
                }

                const prices = data.prices;
                const currentPrice = prices[prices.length-1];
                const isBullish = currentPrice >= prices[prices.length-2];
                const rsi = data.computed.rsi[data.computed.rsi.length-1].toFixed(1);
                const sma = data.computed.sma[data.computed.sma.length-1].toFixed(2);

                let signal = 'HOLD', sigClass = 'hold';
                if (rsi < 30 && currentPrice > sma) { signal = 'BUY'; sigClass = 'buy'; } 
                else if (rsi > 70 && currentPrice < sma) { signal = 'SELL'; sigClass = 'sell'; }

                const ui = appState.ui;
                const inds = appState.indicators[ticker];

                let alertsHtml = appState.alerts[ticker].map(a => `
                    <div class="active-alert">
                        <span>${a.triggered ? '⚠️' : '🔔'} ${a.ind} ${a.cond} ${a.val}</span>
                        <button class="del-alert" onclick="deleteAlert('${ticker}', ${a.id})">✕</button>
                    </div>
                `).join('');

                let newsHtml = '<div style="text-align:center;color:var(--text-sub);font-size:0.85rem;">Loading news...</div>';
                if (appState.newsCache[ticker]) {
                    newsHtml = appState.newsCache[ticker].length === 0 ? '<div style="color:var(--text-sub);font-size:0.8rem;">No recent news found.</div>' :
                        appState.newsCache[ticker].map(n => `
                        <div class="news-item">
                            <a href="${n.link}" target="_blank">${n.title}</a>
                            <div class="news-date">${n.publisher} • ${new Date(n.providerPublishTime*1000).toLocaleDateString()}</div>
                        </div>`).join('');
                }

                html += `
                    <div class="stock-card">
                        <div class="card-top">
                            <div><h2 class="ticker">${ticker}</h2><div class="stats-row"><span>RSI: ${rsi} &nbsp;•&nbsp; SMA: $${sma}</span></div></div>
                            <div style="text-align: right;"><h2 class="price" style="color: ${isBullish ? 'var(--buy-color)' : 'var(--sell-color)'}">$${currentPrice.toFixed(2)}</h2><span class="badge ${sigClass}">${signal}</span></div>
                        </div>

                        <!-- Panel: CHART -->
                        <div class="panel chart-container ${ui.charts[ticker] ? 'active' : ''}">
                            <div class="indicator-toggles">
                                <button class="ind-btn ${inds.sma?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma')">SMA (50)</button>
                                <button class="ind-btn ${inds.bb?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'bb')">Bollinger Bands</button>
                                <button class="ind-btn ${inds.rsi?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'rsi')">RSI</button>
                                <button class="ind-btn ${inds.macd?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'macd')">MACD</button>
                            </div>
                            <div class="canvas-wrapper"><canvas id="canvas-${ticker}"></canvas></div>
                        </div>

                        <!-- Panel: NEWS -->
                        <div class="panel ${ui.news[ticker] ? 'active' : ''}">${newsHtml}</div>

                        <!-- Panel: ALERTS -->
                        <div class="panel ${ui.alerts[ticker] ? 'active' : ''}">
                            <div style="margin-bottom:10px;">${alertsHtml}</div>
                            <div style="font-size:0.85rem; color:var(--text-sub);">Create new alert:</div>
                            <div class="alert-form">
                                <select id="alt-ind-${ticker}"><option value="Price">Price</option><option value="RSI">RSI</option><option value="SMA">SMA 50</option></select>
                                <select id="alt-cond-${ticker}"><option value=">">Above (>)</option><option value="<">Below (<)</option></select>
                                <input type="number" id="alt-val-${ticker}" placeholder="Value">
                                <button onclick="addCustomAlert('${ticker}')">Save</button>
                            </div>
                        </div>

                        <div class="actions">
                            <button class="icon-btn ${ui.charts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'charts')">📈 <span>Chart</span></button>
                            <button class="icon-btn ${ui.news[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'news')">📰 <span>News</span></button>
                            <button class="icon-btn ${ui.alerts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'alerts')">🔔 <span>Alerts</span></button>
                            <button class="icon-btn" onclick="deleteStock('${ticker}')">✕ <span>Del</span></button>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            appState.watchlist.forEach(ticker => { if(appState.ui.charts[ticker] && appState.dataCache[ticker]) drawChart(ticker); });
        }

        // --- Chart Drawing Logic ---
        function drawChart(ticker) {
            const data = appState.dataCache[ticker];
            const inds = appState.indicators[ticker];
            const ctx = document.getElementById(`canvas-${ticker}`).getContext('2d');
            
            const sl = Math.min(CONFIG.CHART_WINDOW_DAYS, data.prices.length); 
            const prices = data.prices.slice(-sl), dates = data.dates.slice(-sl);
            
            // EXPLICIT COLORS: Fixes the "black lines in dark mode" bug in Chart.js
            const isLight = document.body.classList.contains('light-mode');
            const cBuy = '#32d74b';
            const cSell = '#ff453a';
            const cSma = '#f5a623';
            const cBb = isLight ? 'rgba(0, 0, 0, 0.2)' : 'rgba(255, 255, 255, 0.3)';
            const cRsi = '#b58900';
            const cMacd = '#d33682';

            // UI Colors
            const gridColor = isLight ? '#e5e5ea' : '#222222';
            const tickColor = isLight ? '#8e8e93' : '#888888';
            const tooltipBg = isLight ? 'rgba(255, 255, 255, 0.95)' : 'rgba(28, 28, 30, 0.95)';
            const tooltipText = isLight ? '#000000' : '#ffffff';

            let datasets = [{
                label: `Price`, 
                data: prices, 
                borderColor: (prices[prices.length-1] >= prices[prices.length-2]) ? cBuy : cSell,
                borderWidth: 2, pointRadius: 0, fill: false, tension: 0.1, yAxisID: 'y'
            }];

            if(inds.sma) datasets.push({ label: 'SMA', data: data.computed.sma.slice(-sl), borderColor: cSma, borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, yAxisID: 'y' });
            if(inds.bb) { let bb = data.computed.bb; datasets.push({ label: 'BB Upper', data: bb.upper.slice(-sl), borderColor: cBb, borderWidth: 1, pointRadius: 0, yAxisID: 'y' }, { label: 'BB Lower', data: bb.lower.slice(-sl), borderColor: cBb, borderWidth: 1, pointRadius: 0, yAxisID: 'y' }); }
            
            let hasOscillator = inds.rsi || inds.macd;
            if(inds.rsi) datasets.push({ label: 'RSI', data: data.computed.rsi.slice(-sl), borderColor: cRsi, borderWidth: 1.5, pointRadius: 0, yAxisID: 'y2', spanGaps: true });
            if(inds.macd) { let m = data.computed.macd; datasets.push({ label: 'MACD', data: m.macd.slice(-sl), borderColor: cMacd, borderWidth: 1.5, pointRadius: 0, yAxisID: 'y2', spanGaps: true }, { label: 'Signal', data: m.signal.slice(-sl), borderColor: '#859900', borderWidth: 1, pointRadius: 0, yAxisID: 'y2', spanGaps: true }); }

            let scales = {
                x: { display: false },
                y: { type: 'linear', position: 'right', ticks: { color: tickColor }, grid: { color: gridColor } }
            };
            if(hasOscillator) scales.y2 = { type: 'linear', position: 'left', ticks: { color: tickColor }, grid: { display: false }, min: (inds.rsi && !inds.macd) ? 0 : undefined, max: (inds.rsi && !inds.macd) ? 100 : undefined };

            if(window.myCharts[ticker]) window.myCharts[ticker].destroy();
            window.myCharts[ticker] = new Chart(ctx, {
                type: 'line', data: { labels: dates, datasets },
                options: { 
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, 
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { padding: 10, backgroundColor: tooltipBg, titleColor: tooltipText, bodyColor: tooltipText } 
                    }, scales 
                }
            });
        }

        // --- App Interactions ---
        async function toggleUI(ticker, type, key) {
            if(type === 'panel') {
                let state = appState.ui[key][ticker];
                appState.ui.charts[ticker] = appState.ui.news[ticker] = appState.ui.alerts[ticker] = false;
                appState.ui[key][ticker] = !state; 
                
                if(key === 'news' && !appState.newsCache[ticker]) {
                    renderUI(); 
                    appState.newsCache[ticker] = await fetchNews(ticker);
                }
            }
            if(type === 'ind') appState.indicators[ticker][key] = !appState.indicators[ticker][key];
            
            localStorage.setItem('indicators', JSON.stringify(appState.indicators));
            renderUI();
        }

        function addStock() {
            const val = document.getElementById('tickerInput').value.toUpperCase().trim();
            if(val && !appState.watchlist.includes(val)) {
                appState.watchlist.unshift(val);
                persistWatchlist();
                document.getElementById('tickerInput').value = '';
                document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
                updateData();
            }
        }

        function deleteStock(ticker) {
            appState.watchlist = appState.watchlist.filter(t => t !== ticker);
            delete appState.dataCache[ticker];
            delete appState.errors[ticker];
            persistWatchlist();
            renderUI();
        }

        function retryStock(ticker) {
            delete appState.errors[ticker];
            renderUI();
            (async () => {
                try {
                    const data = await fetchStockData(ticker);
                    data.computed = computeIndicatorSet(data.prices);
                    appState.dataCache[ticker] = data;
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                }
                renderUI();
            })();
        }

        // Initialize App
        document.getElementById('pinInput').value = appState.pin;
        updateData();
        setInterval(updateData, CONFIG.REFRESH_MS); // Background refresh
    </script>
</body>
</html>
