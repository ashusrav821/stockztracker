<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Pro Tracker</title>
    <meta name="theme-color" id="theme-meta" content="#000000">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Default Dark Theme Variables --- */
        :root {
            --bg-base: #000000; 
            --header-bg: linear-gradient(180deg, #111 0%, #000 100%);
            --card-bg: #151515; 
            --card-border: #2a2a2a;
            --text-main: #ffffff; 
            --text-sub: #a0a0a0; 
            --accent: #2997ff; 
            --buy-color: #32d74b; 
            --sell-color: #ff453a; 
            --hold-color: #ffd60a;
            --input-bg: #1c1c1e;
            --input-border: #333333;
            --hover-bg: #2a2a2a;
        }

        /* --- Light Theme Variables --- */
        body.light-mode {
            --bg-base: #f2f2f7; 
            --header-bg: linear-gradient(180deg, #ffffff 0%, #f2f2f7 100%);
            --card-bg: #ffffff; 
            --card-border: #e5e5ea;
            --text-main: #000000; 
            --text-sub: #8e8e93; 
            --accent: #007aff;
            --input-bg: #f2f2f7;
            --input-border: #d1d1d6;
            --hover-bg: #e5e5ea;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base); color: var(--text-main); display: flex; flex-direction: column; height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            padding: 40px 20px 20px 20px; background: var(--header-bg);
            border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 100;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
        .theme-toggle { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; padding: 0; }

        .search-bar { display: flex; gap: 8px; }
        .search-bar input { flex: 1; padding: 14px 16px; font-size: 1rem; background-color: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-main); border-radius: 12px; text-transform: uppercase; transition: 0.3s; }
        .search-bar button { padding: 0 20px; font-size: 1rem; font-weight: 600; background-color: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; }

        main { flex: 1; overflow-y: auto; padding: 20px; }
        .stock-card { background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; margin-bottom: 16px; padding: 16px; transition: 0.3s; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .ticker { font-size: 1.4rem; font-weight: 700; margin: 0; }
        .price { font-size: 1.4rem; font-weight: 700; margin: 0; text-align: right; }
        .stats-row { margin-top: 8px; font-size: 0.85rem; color: var(--text-sub); }

        .badge { padding: 4px 10px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
        .badge.buy { background: rgba(50, 215, 75, 0.15); color: var(--buy-color); border: 1px solid rgba(50, 215, 75, 0.3); }
        .badge.sell { background: rgba(255, 69, 58, 0.15); color: var(--sell-color); border: 1px solid rgba(255, 69, 58, 0.3); }
        .badge.hold { background: rgba(255, 214, 10, 0.15); color: var(--hold-color); border: 1px solid rgba(255, 214, 10, 0.3); }

        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--card-border); }
        .icon-btn { background: transparent; border: none; color: var(--text-sub); font-size: 0.9rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; transition: background 0.2s; }
        .icon-btn.active, .icon-btn:hover { background: var(--hover-bg); color: var(--text-main); }

        /* Panels (Chart, News, Alerts) */
        .panel { display: none; margin-top: 16px; border-top: 1px solid var(--card-border); padding-top: 12px; }
        .panel.active { display: block; }
        
        /* Chart specific */
        .canvas-wrapper { height: 250px; width: 100%; }
        .indicator-toggles { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
        .indicator-toggles::-webkit-scrollbar { display: none; }
        .ind-btn { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-sub); padding: 6px 12px; border-radius: 12px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; font-weight: 600; transition: 0.3s; }
        .ind-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(41, 151, 255, 0.1); }

        /* News specific */
        .news-item { padding: 10px 0; border-bottom: 1px solid var(--card-border); }
        .news-item:last-child { border-bottom: none; }
        .news-item a { color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 500; display: block; margin-bottom: 4px; }
        .news-date { font-size: 0.75rem; color: var(--text-sub); }

        /* Alerts specific */
        .alert-form { display: flex; gap: 8px; margin-top: 10px; }
        .alert-form select, .alert-form input { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); padding: 8px; border-radius: 8px; font-size: 0.85rem; }
        .alert-form input { flex: 1; min-width: 0; }
        .alert-form button { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .active-alert { display: flex; justify-content: space-between; align-items: center; background: var(--input-bg); padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; border-left: 3px solid var(--accent); }
        .del-alert { background: transparent; color: var(--sell-color); border: none; cursor: pointer; font-weight: bold; }

        /* Composite Signal Panel */
        .signal-panel { background: var(--input-bg); border-radius: 12px; padding: 12px 14px; margin: 4px 0 12px; }
        .signal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .confidence-bar-wrap { flex: 1; height: 6px; background: var(--card-border); border-radius: 4px; overflow: hidden; }
        .confidence-bar { display: block; height: 100%; border-radius: 4px; transition: width 0.3s ease; }
        .confidence-label { font-size: 0.75rem; color: var(--text-sub); white-space: nowrap; }
        .signal-reasons { margin: 0; padding-left: 18px; font-size: 0.8rem; color: var(--text-sub); }
        .signal-reasons li { margin-bottom: 2px; }
        .signal-levels { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; font-size: 0.8rem; color: var(--text-sub); }
        .signal-levels strong { color: var(--text-main); }

        /* Sentiment row */
        .sentiment-row { display: flex; align-items: flex-start; gap: 10px; margin: -6px 0 12px; flex-wrap: wrap; }
        .sentiment-panel { flex: 1; min-width: 0; font-size: 0.82rem; color: var(--text-sub); padding-top: 2px; }
        .sentiment-btn { white-space: nowrap; font-size: 0.78rem; font-weight: 600; background: var(--input-bg); color: var(--text-sub); border: 1px solid var(--card-border); border-radius: 8px; padding: 6px 12px; cursor: pointer; flex-shrink: 0; }
        .sentiment-btn:disabled { opacity: 0.5; cursor: default; }

        /* Sync / PIN */
        .sync-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
        .sync-row input { flex: 1; padding: 10px 14px; font-size: 0.95rem; background-color: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-main); border-radius: 10px; letter-spacing: 2px; }
        .sync-row button { padding: 0 16px; font-size: 0.85rem; font-weight: 600; background-color: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); border-radius: 10px; cursor: pointer; }
        .sync-row button.primary { background-color: var(--accent); color: white; border: none; }
        .sync-status { font-size: 0.75rem; color: var(--text-sub); margin-top: 6px; min-height: 1em; }
        .sync-status.error { color: var(--sell-color); }
        .sync-status.ok { color: var(--buy-color); }

        /* Tabs */
        .tab-row { display: flex; gap: 8px; margin-top: 12px; border-bottom: 1px solid var(--card-border); }
        .tab-btn { flex: 1; padding: 10px 0; background: none; border: none; color: var(--text-sub); font-size: 0.9rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        /* Guide */
        .guide-section { background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; margin-bottom: 14px; padding: 16px; }
        .guide-section h3 { margin: 0 0 6px 0; font-size: 1rem; }
        .guide-section p { margin: 0 0 8px 0; font-size: 0.85rem; color: var(--text-sub); line-height: 1.5; }
        .guide-section p:last-child { margin-bottom: 0; }
        .guide-section .guide-formula { font-family: monospace; font-size: 0.78rem; background: var(--input-bg); padding: 8px 10px; border-radius: 8px; display: block; margin: 6px 0; color: var(--text-main); overflow-x: auto; }
        .guide-section ul { margin: 6px 0; padding-left: 20px; font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; }
        .guide-section li strong { color: var(--text-main); }

        /* Error / loading card */
        .info-card { background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; margin-bottom: 16px; padding: 16px; text-align: center; color: var(--text-sub); font-size: 0.9rem; }
        .info-card.error-card { border-color: rgba(255, 69, 58, 0.3); color: var(--sell-color); }
        .retry-btn { margin-top: 8px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>My Portfolio</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌓</button>
        </div>
        <div class="search-bar">
            <input type="text" id="tickerInput" placeholder="Search Ticker (e.g. AAPL)">
            <button onclick="addStock()">Add</button>
        </div>
        <div class="sync-row">
            <input type="text" id="pinInput" placeholder="PIN (4-12 digits) for cloud sync" inputmode="numeric" maxlength="12">
            <button onclick="loadFromPin()">Load</button>
            <button class="primary" onclick="saveToPin()">Save</button>
        </div>
        <div class="sync-status" id="syncStatus"></div>
        <div class="tab-row">
            <button class="tab-btn active" id="tab-portfolio" onclick="switchTab('portfolio')">Portfolio</button>
            <button class="tab-btn" id="tab-guide" onclick="switchTab('guide')">Indicator Guide</button>
        </div>
    </header>

    <main id="watchlist">
        <div class="info-card">Initializing Data...</div>
    </main>

    <main id="guideView" style="display:none;"></main>

    <script>
        // --- Theme Management ---
        function applyTheme(mode) {
            if (mode === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeIcon').innerText = '☀️';
                document.getElementById('theme-meta').setAttribute('content', '#f2f2f7');
            } else {
                document.body.classList.remove('light-mode');
                document.getElementById('themeIcon').innerText = '🌙';
                document.getElementById('theme-meta').setAttribute('content', '#000000');
            }
        }

        function toggleTheme() {
            const isLight = document.body.classList.contains('light-mode');
            const newMode = isLight ? 'dark' : 'light';
            localStorage.setItem('theme', newMode);
            applyTheme(newMode);
            renderUI(); // Re-draw charts with correct colors
        }

        // --- Tab Switching ---
        function switchTab(tab) {
            const portfolio = document.getElementById('watchlist');
            const guide = document.getElementById('guideView');
            const tabPortfolio = document.getElementById('tab-portfolio');
            const tabGuide = document.getElementById('tab-guide');

            if (tab === 'guide') {
                portfolio.style.display = 'none';
                guide.style.display = 'block';
                tabPortfolio.classList.remove('active');
                tabGuide.classList.add('active');
                if (!guide.dataset.rendered) {
                    guide.innerHTML = getGuideHTML();
                    guide.dataset.rendered = '1';
                }
            } else {
                portfolio.style.display = '';
                guide.style.display = 'none';
                tabGuide.classList.remove('active');
                tabPortfolio.classList.add('active');
            }
        }

        // --- Indicator Guide Content ---
        function getGuideHTML() {
            return `
                <div class="guide-section">
                    <h3>SMA — Simple Moving Average</h3>
                    <p>The average closing price over the last N days. SMA(50) and SMA(20) smooth out daily noise to show the underlying trend. Price above the SMA generally signals an uptrend; below signals a downtrend.</p>
                    <span class="guide-formula">SMA = (sum of last N closes) / N</span>
                </div>

                <div class="guide-section">
                    <h3>EMA — Exponential Moving Average</h3>
                    <p>Like SMA, but weights recent prices more heavily, so it reacts faster to new price action. EMA(20) is more responsive than SMA(20) and is often used to catch trend changes earlier.</p>
                    <span class="guide-formula">EMA(today) = (Price × k) + (EMA(yesterday) × (1 − k))
where k = 2 / (N + 1)</span>
                </div>

                <div class="guide-section">
                    <h3>Bollinger Bands</h3>
                    <p>A band around a moving average, set N standard deviations above and below. Price hugging the upper band suggests overbought conditions; hugging the lower band suggests oversold. Bands widen when volatility increases and narrow when it decreases.</p>
                    <span class="guide-formula">Middle = SMA(20)
Upper/Lower = SMA(20) ± (2 × std. deviation of last 20 closes)</span>
                </div>

                <div class="guide-section">
                    <h3>RSI — Relative Strength Index</h3>
                    <p>Measures the speed and size of recent price changes on a 0–100 scale. Traditionally, RSI above 70 suggests overbought (potential pullback), and below 30 suggests oversold (potential bounce). RSI works best in ranging markets — during strong trends it can stay overbought/oversold for a long time.</p>
                    <span class="guide-formula">RS = avg gain (14d) / avg loss (14d)
RSI = 100 − (100 / (1 + RS))</span>
                </div>

                <div class="guide-section">
                    <h3>MACD — Moving Average Convergence Divergence</h3>
                    <p>Shows the relationship between two EMAs (12 and 26 period) as a momentum oscillator. When the MACD line crosses above its signal line, momentum is shifting bullish; crossing below suggests bearish momentum.</p>
                    <span class="guide-formula">MACD line = EMA(12) − EMA(26)
Signal line = EMA(9) of MACD line</span>
                </div>

                <div class="guide-section">
                    <h3>ATR — Average True Range</h3>
                    <p>Measures volatility (how much a stock typically moves per day), regardless of direction. Higher ATR = larger typical price swings. Used here to size stop-loss and target levels proportionally to current volatility.</p>
                    <span class="guide-formula">True Range = max(
  high − low,
  |high − previous close|,
  |low − previous close|
)
ATR(14) = Wilder-smoothed average of True Range</span>
                </div>

                <div class="guide-section">
                    <h3>ADX &amp; DI+/DI− — Trend Strength &amp; Direction</h3>
                    <p>ADX measures how strong a trend is (not its direction) on a 0–100 scale — above 25 generally indicates a strong trend, below 25 indicates a weak/ranging market where trend-following signals are less reliable. DI+ above DI− indicates upward pressure; DI− above DI+ indicates downward pressure.</p>
                    <span class="guide-formula">+DI, −DI = smoothed directional movement / smoothed True Range, ×100
DX = 100 × |+DI − −DI| / (+DI + −DI)
ADX = Wilder-smoothed average of DX</span>
                </div>

                <div class="guide-section">
                    <h3>News Sentiment (Finnhub)</h3>
                    <p>Bullish vs bearish percentage derived from recent news coverage of the company. A gap of more than 10 points in either direction is treated as a meaningful signal; smaller gaps are considered mixed/neutral.</p>
                </div>

                <div class="guide-section">
                    <h3>Earnings Proximity</h3>
                    <p>If a company's next earnings report is within 3 days, the signal's confidence is reduced — earnings releases often cause sharp price gaps that can override technical signals.</p>
                </div>

                <div class="guide-section">
                    <h3>How the Composite Signal Is Calculated</h3>
                    <p>Each factor below contributes <strong>+1</strong> (bullish), <strong>−1</strong> (bearish), or <strong>0</strong> (neutral/unavailable) to a total score:</p>
                    <ul>
                        <li><strong>RSI:</strong> +1 if oversold (&lt;30), −1 if overbought (&gt;70), 0 otherwise</li>
                        <li><strong>Price vs SMA(50):</strong> +1 if price is above, −1 if below</li>
                        <li><strong>MACD vs Signal line:</strong> +1 if MACD is above its signal line, −1 if below</li>
                        <li><strong>ADX + DI direction:</strong> if ADX &gt; 25 (strong trend), +1 if DI+ &gt; DI−, −1 if DI− &gt; DI+; if ADX ≤ 25, contributes 0 but flags the trend as weak</li>
                        <li><strong>News sentiment</strong> (if available): +1 if bullish% exceeds bearish% by &gt;10 points, −1 if the reverse, 0 if mixed</li>
                    </ul>
                    <p><strong>Final signal:</strong></p>
                    <ul>
                        <li>Score ≥ <strong>+2</strong> → <strong>BUY</strong></li>
                        <li>Score ≤ <strong>−2</strong> → <strong>SELL</strong></li>
                        <li>Otherwise → <strong>HOLD</strong></li>
                    </ul>
                    <p><strong>Confidence</strong> = |score| ÷ max possible score, scaled to 0–100%. If ADX shows a weak/no trend, confidence is multiplied by 0.6. If earnings are within 3 days, confidence is further multiplied by 0.5.</p>
                    <p><strong>Stop-loss / Target</strong> (only shown for BUY/SELL, not HOLD): set at 1.5× ATR and 3× ATR from the current price, in the direction of the trade.</p>
                    <p style="margin-top:10px;"><em>This is decision support based on technical and sentiment data only — it is not financial advice, doesn't account for fundamentals, broader market conditions, or your personal risk tolerance, and can produce false signals especially in choppy/weak-trend markets.</em></p>
                </div>
            `;
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        // --- Config ---
        const CONFIG = {
            WORKER_BASE: 'https://stock-tracker-api.oletyashrith.workers.dev',
            REFRESH_MS: 60000,
            CHART_WINDOW_DAYS: 252, // ~1 trading year
            SMA_PERIOD: 50,
            RSI_PERIOD: 14,
            BB_PERIOD: 20,
            BB_MULT: 2,
            MACD_FAST: 12,
            MACD_SLOW: 26,
            MACD_SIGNAL: 9,
        };

        // --- State Management Engine ---
        let appState = {
            watchlist: JSON.parse(localStorage.getItem('stocks')) || ['AAPL', 'TSLA', 'MSFT'],
            alerts: JSON.parse(localStorage.getItem('alerts')) || {}, 
            indicators: JSON.parse(localStorage.getItem('indicators')) || {},
            ui: { charts: {}, news: {}, alerts: {} },
            dataCache: {},
            newsCache: {},
            sentimentCache: {},
            earningsCache: {},
            errors: {},
            pin: localStorage.getItem('syncPin') || ''
        };

        window.myCharts = {};

        // Crosshair Chart Plugin (Dynamically colored)
        Chart.register({
            id: 'crosshair',
            afterDraw: chart => {
                if (chart.tooltip?._active?.length) {
                    let x = chart.tooltip._active[0].element.x, yAxis = chart.scales.y, ctx = chart.ctx;
                    const isLight = document.body.classList.contains('light-mode');
                    ctx.save(); ctx.beginPath(); ctx.moveTo(x, yAxis.top); ctx.lineTo(x, yAxis.bottom);
                    ctx.lineWidth = 1.5; 
                    ctx.strokeStyle = isLight ? 'rgba(0, 0, 0, 0.2)' : 'rgba(255, 255, 255, 0.2)'; 
                    ctx.setLineDash([4, 4]);
                    ctx.stroke(); ctx.restore();
                }
            }
        });

        // --- Math & Indicator Logic ---
        function getSMAArray(prices, period = CONFIG.SMA_PERIOD) { return prices.map((v, i, arr) => i < period - 1 ? null : arr.slice(i - period + 1, i + 1).reduce((a,b)=>a+b)/period); }
        function getEMAArray(prices, period) { let k = 2/(period+1), ema = [], prev = null; for(let i=0; i<prices.length; i++) { if(i===0){prev=prices[i];ema.push(prev);} else {prev=(prices[i]-prev)*k+prev;ema.push(prev);} } return ema; }
        function getBBArray(prices, period = CONFIG.BB_PERIOD, mult = CONFIG.BB_MULT) { let upper=[], lower=[]; prices.forEach((v, i, arr)=>{ if(i<period-1){upper.push(null);lower.push(null);return;} let slice=arr.slice(i-period+1, i+1), mean=slice.reduce((a,b)=>a+b)/period, variance=slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/period, std=Math.sqrt(variance); upper.push(mean+mult*std); lower.push(mean-mult*std); }); return {upper, lower}; }
        function getRSIArray(prices, period = CONFIG.RSI_PERIOD) { let rsi=[], gains=0, losses=0; for(let i=0; i<prices.length; i++) { if(i<period){rsi.push(null);continue;} if(i===period){for(let j=1;j<=period;j++){let d=prices[j]-prices[j-1]; if(d>0)gains+=d; else losses-=d;} }else{let d=prices[i]-prices[i-1]; gains=((gains*(period-1))+(d>0?d:0))/period; losses=((losses*(period-1))+(d<0?-d:0))/period; } let rs=losses===0?100:gains/losses; rsi.push(100-(100/(1+rs))); } return rsi; }
        function getMACDArray(prices, fast = CONFIG.MACD_FAST, slow = CONFIG.MACD_SLOW, signalPeriod = CONFIG.MACD_SIGNAL) { let emaFast=getEMAArray(prices, fast), emaSlow=getEMAArray(prices, slow), macd=prices.map((_,i)=>i>=slow-1 ? emaFast[i]-emaSlow[i] : null); let validMacd = macd.filter(x=>x!==null); let signalValid = getEMAArray(validMacd, signalPeriod); let signal = Array(macd.length - signalValid.length).fill(null).concat(signalValid); return {macd, signal}; }

        // True Range / ATR — uses OHLC candles. Falls back gracefully if ohlc missing.
        function getTRArray(ohlc) {
            return ohlc.map((c, i) => {
                if (i === 0 || c.h === null || c.l === null) return null;
                const prevClose = ohlc[i-1].c;
                return Math.max(c.h - c.l, Math.abs(c.h - prevClose), Math.abs(c.l - prevClose));
            });
        }
        function getATRArray(ohlc, period = 14) {
            const tr = getTRArray(ohlc);
            const atr = [];
            let prevAtr = null;
            for (let i = 0; i < tr.length; i++) {
                if (tr[i] === null) { atr.push(null); continue; }
                if (prevAtr === null) {
                    // seed with simple average of first `period` TRs
                    const slice = tr.slice(Math.max(1, i - period + 1), i + 1).filter(x => x !== null);
                    if (slice.length < period) { atr.push(null); continue; }
                    prevAtr = slice.reduce((a,b)=>a+b, 0) / period;
                    atr.push(prevAtr);
                } else {
                    prevAtr = (prevAtr * (period - 1) + tr[i]) / period;
                    atr.push(prevAtr);
                }
            }
            return atr;
        }

        // ADX (Average Directional Index) — Wilder's smoothing. Returns {adx, plusDI, minusDI}.
        function getADXArray(ohlc, period = 14) {
            const len = ohlc.length;
            const plusDM = new Array(len).fill(null);
            const minusDM = new Array(len).fill(null);
            const tr = getTRArray(ohlc);

            for (let i = 1; i < len; i++) {
                if (ohlc[i].h === null || ohlc[i-1].h === null) continue;
                const upMove = ohlc[i].h - ohlc[i-1].h;
                const downMove = ohlc[i-1].l - ohlc[i].l;
                plusDM[i] = (upMove > downMove && upMove > 0) ? upMove : 0;
                minusDM[i] = (downMove > upMove && downMove > 0) ? downMove : 0;
            }

            const smooth = (arr) => {
                const out = new Array(len).fill(null);
                let prev = null;
                for (let i = 0; i < len; i++) {
                    if (arr[i] === null) continue;
                    if (prev === null) {
                        const slice = arr.slice(Math.max(0, i - period + 1), i + 1).filter(x => x !== null);
                        if (slice.length < period) continue;
                        prev = slice.reduce((a,b)=>a+b, 0);
                        out[i] = prev;
                    } else {
                        prev = prev - (prev / period) + arr[i];
                        out[i] = prev;
                    }
                }
                return out;
            };

            const smoothedTR = smooth(tr);
            const smoothedPlusDM = smooth(plusDM);
            const smoothedMinusDM = smooth(minusDM);

            const plusDI = new Array(len).fill(null);
            const minusDI = new Array(len).fill(null);
            const dx = new Array(len).fill(null);

            for (let i = 0; i < len; i++) {
                if (smoothedTR[i] === null || smoothedTR[i] === 0) continue;
                plusDI[i] = 100 * smoothedPlusDM[i] / smoothedTR[i];
                minusDI[i] = 100 * smoothedMinusDM[i] / smoothedTR[i];
                const sum = plusDI[i] + minusDI[i];
                dx[i] = sum === 0 ? 0 : 100 * Math.abs(plusDI[i] - minusDI[i]) / sum;
            }

            // ADX = Wilder smoothed average of DX
            const adx = new Array(len).fill(null);
            let prevAdx = null;
            let dxStartIdx = dx.findIndex(x => x !== null);
            for (let i = 0; i < len; i++) {
                if (dx[i] === null) continue;
                if (prevAdx === null) {
                    const slice = dx.slice(dxStartIdx, dxStartIdx + period).filter(x => x !== null);
                    if (i < dxStartIdx + period - 1) continue;
                    prevAdx = slice.reduce((a,b)=>a+b, 0) / slice.length;
                    adx[i] = prevAdx;
                } else {
                    prevAdx = (prevAdx * (period - 1) + dx[i]) / period;
                    adx[i] = prevAdx;
                }
            }

            return { adx, plusDI, minusDI };
        }

        // Recent swing high/low over a lookback window — simple support/resistance proxy
        function getSwingLevels(ohlc, lookback = 20) {
            const slice = ohlc.slice(-lookback).filter(c => c.h !== null && c.l !== null);
            if (!slice.length) return { swingHigh: null, swingLow: null };
            return {
                swingHigh: Math.max(...slice.map(c => c.h)),
                swingLow: Math.min(...slice.map(c => c.l)),
            };
        }

        // Composite confluence score combining trend, momentum, volatility, and structure.
        // Returns a signal object: { signal, score, confidence, reasons[], stopLoss, takeTarget }
        function getCompositeSignal(prices, computed, ohlc, extras) {
            extras = extras || {};
            const i = prices.length - 1;
            const currentPrice = prices[i];
            const reasons = [];
            let score = 0; // positive = bullish, negative = bearish
            let maxScore = 4;

            const rsi = computed.rsi[i];
            const sma = computed.sma[i];
            const macd = computed.macd.macd[i];
            const macdSignal = computed.macd.signal[i];
            const adx = computed.adx ? computed.adx.adx[i] : null;
            const plusDI = computed.adx ? computed.adx.plusDI[i] : null;
            const minusDI = computed.adx ? computed.adx.minusDI[i] : null;
            const atr = computed.atr ? computed.atr[i] : null;

            // Momentum: RSI
            if (rsi !== null) {
                if (rsi < 30) { score += 1; reasons.push(`RSI oversold (${rsi.toFixed(1)})`); }
                else if (rsi > 70) { score -= 1; reasons.push(`RSI overbought (${rsi.toFixed(1)})`); }
            }

            // Trend direction: price vs SMA
            if (sma !== null) {
                if (currentPrice > sma) { score += 1; reasons.push(`Price above SMA${CONFIG.SMA_PERIOD}`); }
                else { score -= 1; reasons.push(`Price below SMA${CONFIG.SMA_PERIOD}`); }
            }

            // Momentum: MACD vs signal line
            if (macd !== null && macdSignal !== null) {
                if (macd > macdSignal) { score += 1; reasons.push('MACD above signal line'); }
                else { score -= 1; reasons.push('MACD below signal line'); }
            }

            // Trend strength: ADX + DI direction
            let trendStrength = 'weak';
            if (adx !== null) {
                if (adx > 25) {
                    trendStrength = 'strong';
                    if (plusDI > minusDI) { score += 1; reasons.push(`Strong uptrend (ADX ${adx.toFixed(1)}, +DI>-DI)`); }
                    else { score -= 1; reasons.push(`Strong downtrend (ADX ${adx.toFixed(1)}, -DI>+DI)`); }
                } else {
                    reasons.push(`Weak/no trend (ADX ${adx.toFixed(1)}) — signals less reliable`);
                }
            }

            // News sentiment (Finnhub): bullishPercent vs bearishPercent
            if (extras.sentiment && extras.sentiment.bullishPercent !== null && extras.sentiment.bearishPercent !== null) {
                const { bullishPercent, bearishPercent } = extras.sentiment;
                maxScore += 1;
                const diff = bullishPercent - bearishPercent;
                if (diff > 10) { score += 1; reasons.push(`News sentiment bullish (${bullishPercent}% vs ${bearishPercent}%)`); }
                else if (diff < -10) { score -= 1; reasons.push(`News sentiment bearish (${bullishPercent}% vs ${bearishPercent}%)`); }
                else { reasons.push(`News sentiment mixed (${bullishPercent}% vs ${bearishPercent}%)`); }
            }

            let signal = 'HOLD';
            if (score >= 2) signal = 'BUY';
            else if (score <= -2) signal = 'SELL';

            // Confidence scales with |score| and trend strength
            let confidence = Math.min(100, Math.round((Math.abs(score) / maxScore) * 100));
            if (trendStrength === 'weak') confidence = Math.round(confidence * 0.6);

            // Earnings proximity warning — reduce confidence near earnings (volatility/gap risk)
            if (extras.earnings && extras.earnings.daysUntil !== null && extras.earnings.daysUntil <= 3 && extras.earnings.daysUntil >= 0) {
                const when = extras.earnings.daysUntil === 0 ? 'today' : `in ${extras.earnings.daysUntil}d`;
                reasons.push(`⚠ Earnings ${when} — expect volatility, signal less reliable`);
                confidence = Math.round(confidence * 0.5);
            }

            // Risk levels via ATR (if available), else swing levels
            let stopLoss = null, takeTarget = null;
            if (atr !== null) {
                if (signal === 'BUY') {
                    stopLoss = currentPrice - 1.5 * atr;
                    takeTarget = currentPrice + 3 * atr;
                } else if (signal === 'SELL') {
                    stopLoss = currentPrice + 1.5 * atr;
                    takeTarget = currentPrice - 3 * atr;
                }
            }

            return { signal, score, confidence, reasons, stopLoss, takeTarget, trendStrength, atr };
        }

        // Compute and cache all indicator arrays for a ticker's full price history.
        // Avoids recomputing on every render / chart redraw.
        function computeIndicatorSet(prices, ohlc, extras) {
            const set = {
                sma: getSMAArray(prices),
                sma20: getSMAArray(prices, 20),
                ema20: getEMAArray(prices, 20),
                bb: getBBArray(prices),
                rsi: getRSIArray(prices),
                macd: getMACDArray(prices),
            };
            if (ohlc && ohlc.length === prices.length && ohlc.some(c => c.h !== null)) {
                set.atr = getATRArray(ohlc);
                set.adx = getADXArray(ohlc);
                set.swing = getSwingLevels(ohlc);
            }
            set.composite = getCompositeSignal(prices, set, ohlc || [], extras);
            return set;
        }

        // --- API Data Fetching (via Cloudflare Worker proxy) ---
        async function fetchStockData(ticker) {
            const cacheKey = `chart_${ticker}`;
            const cached = sessionStorage.getItem(cacheKey);

            // If we have a cached version, hydrate the state immediately for instant render,
            // then fetch fresh data in the background and update if it differs.
            let cachedData = null;
            if (cached) {
                try {
                    cachedData = JSON.parse(cached);
                    // Return cached data immediately — background refresh happens via the 60s interval
                    if (appState.dataCache[ticker]) return cachedData; // already have live data this session
                } catch(e) { sessionStorage.removeItem(cacheKey); }
            }

            const res = await fetch(`${CONFIG.WORKER_BASE}/api/chart?ticker=${encodeURIComponent(ticker)}&range=1y&interval=1d`);
            if (!res.ok) {
                let msg = `HTTP ${res.status}`;
                try { const j = await res.json(); if(j.error) msg = j.error; } catch(e) {}
                // Fall back to cached data if fetch fails
                if (cachedData) return cachedData;
                throw new Error(msg);
            }
            const data = await res.json();
            if (!data.prices || !data.prices.length) {
                if (cachedData) return cachedData;
                throw new Error('No price data returned');
            }
            const result = { prices: data.prices, dates: data.dates, ohlc: data.ohlc || [] };
            // Cache for this session — lightweight (just prices/dates/ohlc, not computed indicators)
            try { sessionStorage.setItem(cacheKey, JSON.stringify(result)); } catch(e) {}
            return result;
        }

        async function fetchNews(ticker) {
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/news?ticker=${encodeURIComponent(ticker)}`);
                if (!res.ok) return [];
                const data = await res.json();
                return data.news || [];
            } catch(e) { return []; }
        }

        // Sentiment/earnings change slowly — fetch once per session per ticker, cached in appState
        async function fetchSentiment(ticker) {
            const cacheKey = `sentiment_${ticker}`;
            const cached = sessionStorage.getItem(cacheKey);
            if (cached) { try { return JSON.parse(cached); } catch(e) {} }
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/sentiment?ticker=${encodeURIComponent(ticker)}`);
                if (!res.ok) return null;
                const data = await res.json();
                try { sessionStorage.setItem(cacheKey, JSON.stringify(data)); } catch(e) {}
                return data;
            } catch(e) { return null; }
        }

        async function fetchEarnings(ticker) {
            const cacheKey = `earnings_${ticker}`;
            const cached = sessionStorage.getItem(cacheKey);
            if (cached) { try { return JSON.parse(cached); } catch(e) {} }
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/earnings?ticker=${encodeURIComponent(ticker)}`);
                if (!res.ok) return null;
                const data = await res.json();
                try { sessionStorage.setItem(cacheKey, JSON.stringify(data)); } catch(e) {}
                return data;
            } catch(e) { return null; }
        }

        // --- Watchlist Sync (PIN-based, Cloudflare KV) ---
        function setSyncStatus(msg, type) {
            const el = document.getElementById('syncStatus');
            el.textContent = msg;
            el.className = 'sync-status' + (type ? ' ' + type : '');
        }

        function getPin() {
            const val = document.getElementById('pinInput').value.trim();
            return val;
        }

        async function loadFromPin() {
            const pin = getPin();
            if (!/^[0-9]{4,12}$/.test(pin)) { setSyncStatus('PIN must be 4-12 digits', 'error'); return; }

            setSyncStatus('Loading...', '');
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/watchlist?pin=${encodeURIComponent(pin)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data.watchlist) { setSyncStatus('No saved watchlist found for this PIN', 'error'); return; }

                appState.watchlist = data.watchlist;
                appState.pin = pin;
                localStorage.setItem('stocks', JSON.stringify(appState.watchlist));
                localStorage.setItem('syncPin', pin);

                setSyncStatus('Loaded watchlist from cloud', 'ok');
                document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
                await updateData();
            } catch(e) {
                setSyncStatus('Failed to load: ' + e.message, 'error');
            }
        }

        async function saveToPin() {
            const pin = getPin();
            if (!/^[0-9]{4,12}$/.test(pin)) { setSyncStatus('PIN must be 4-12 digits', 'error'); return; }

            setSyncStatus('Saving...', '');
            try {
                const res = await fetch(`${CONFIG.WORKER_BASE}/api/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin, watchlist: appState.watchlist })
                });
                if (!res.ok) {
                    let msg = `HTTP ${res.status}`;
                    try { const j = await res.json(); if(j.error) msg = j.error; } catch(e) {}
                    throw new Error(msg);
                }
                appState.pin = pin;
                localStorage.setItem('syncPin', pin);
                setSyncStatus('Saved to cloud', 'ok');
            } catch(e) {
                setSyncStatus('Failed to save: ' + e.message, 'error');
            }
        }

        // Saves watchlist locally, and to cloud if a PIN is set
        function persistWatchlist() {
            localStorage.setItem('stocks', JSON.stringify(appState.watchlist));
            if (appState.pin) {
                fetch(`${CONFIG.WORKER_BASE}/api/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: appState.pin, watchlist: appState.watchlist })
                }).then(res => {
                    if (res.ok) setSyncStatus('Synced', 'ok');
                    else setSyncStatus('Cloud sync failed', 'error');
                }).catch(() => setSyncStatus('Cloud sync failed (offline?)', 'error'));
            }
        }

        // --- Core Application Loop ---
        async function updateData() {
            await Promise.all(appState.watchlist.map(async ticker => {
                if(!appState.indicators[ticker]) appState.indicators[ticker] = {sma:false, sma20:false, ema20:false, bb:false, rsi:false, macd:false};
                if(!appState.alerts[ticker]) appState.alerts[ticker] = [];

                try {
                    const data = await fetchStockData(ticker);
                    // Only use already-cached Finnhub extras — never fetch on load
                    const extras = {
                        sentiment: appState.sentimentCache[ticker] || null,
                        earnings: appState.earningsCache[ticker] || null,
                    };
                    data.computed = computeIndicatorSet(data.prices, data.ohlc, extras);
                    appState.dataCache[ticker] = data;
                    delete appState.errors[ticker];
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                }

                evaluateAlerts(ticker);
                renderUI(); // Render each card as soon as its data arrives
            }));
            localStorage.setItem('indicators', JSON.stringify(appState.indicators));
        }

        // On-demand Finnhub fetch — called by "Check Sentiment" button on each card
        async function checkSentiment(ticker) {
            const btn = document.getElementById(`sentiment-btn-${ticker}`);
            const panel = document.getElementById(`sentiment-panel-${ticker}`);
            if (btn) { btn.textContent = 'Loading...'; btn.disabled = true; }

            const [sentiment, earnings] = await Promise.all([
                fetchSentiment(ticker),
                fetchEarnings(ticker)
            ]);

            appState.sentimentCache[ticker] = sentiment;
            appState.earningsCache[ticker] = earnings;

            const cached = appState.dataCache[ticker];
            if (cached) {
                cached.computed = computeIndicatorSet(cached.prices, cached.ohlc, { sentiment, earnings });
            }

            // Update sentiment panel inline without full re-render
            if (panel) {
                panel.innerHTML = buildSentimentHTML(ticker, sentiment, earnings);
            }

            // Recompute and update signal panel inline
            const sigPanel = document.getElementById(`signal-panel-${ticker}`);
            if (sigPanel && cached) {
                sigPanel.innerHTML = buildSignalInnerHTML(cached.computed.composite);
            }

            if (btn) { btn.textContent = '↻ Refresh Sentiment'; btn.disabled = false; }
        }

        function buildSentimentHTML(ticker, sentiment, earnings) {
            let html = '';
            if (!sentiment && !earnings) {
                return `<span style="color:var(--text-sub);font-size:0.8rem;">No Finnhub data available for ${ticker}</span>`;
            }
            if (sentiment && sentiment.bullishPercent !== null) {
                const diff = sentiment.bullishPercent - sentiment.bearishPercent;
                const color = diff > 10 ? 'var(--buy-color)' : diff < -10 ? 'var(--sell-color)' : 'var(--text-sub)';
                html += `<span style="color:${color};font-size:0.82rem;">📰 News: ${sentiment.bullishPercent}% bullish / ${sentiment.bearishPercent}% bearish</span>`;
                if (sentiment.buzzScore !== null) html += ` &nbsp;•&nbsp; <span style="font-size:0.82rem;color:var(--text-sub);">Buzz: ${sentiment.buzzScore}</span>`;
            }
            if (earnings && earnings.nextEarningsDate) {
                const warn = earnings.daysUntil <= 3 ? '⚠ ' : '';
                html += `<br><span style="font-size:0.82rem;color:var(--text-sub);">${warn}Earnings: ${earnings.nextEarningsDate} (${earnings.daysUntil}d away${earnings.hour ? ', ' + earnings.hour : ''})</span>`;
            }
            return html;
        }

        function buildSignalInnerHTML(comp) {
            const sigClass = comp.signal === 'BUY' ? 'buy' : comp.signal === 'SELL' ? 'sell' : 'hold';
            return `
                <div class="signal-header">
                    <span class="badge ${sigClass}">${comp.signal}</span>
                    <span class="confidence-bar-wrap">
                        <span class="confidence-bar" style="width:${comp.confidence}%; background:${sigClass==='buy'?'var(--buy-color)':sigClass==='sell'?'var(--sell-color)':'var(--hold-color)'}"></span>
                    </span>
                    <span class="confidence-label">${comp.confidence}% confidence</span>
                </div>
                <ul class="signal-reasons">
                    ${comp.reasons.map(r => `<li>${r}</li>`).join('')}
                </ul>
                ${comp.stopLoss !== null ? `
                <div class="signal-levels">
                    <span>Stop-loss: <strong>$${comp.stopLoss.toFixed(2)}</strong></span>
                    <span>Target: <strong>$${comp.takeTarget.toFixed(2)}</strong></span>
                    <span>ATR: ${comp.atr.toFixed(2)}</span>
                </div>` : (comp.atr !== null ? `<div class="signal-levels"><span>ATR: ${comp.atr.toFixed(2)}</span></div>` : '')}`;
        }

        // --- Alert System Logic ---
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission !== "granted") Notification.requestPermission();
        }

        function evaluateAlerts(ticker) {
            const data = appState.dataCache[ticker];
            if(!data || !appState.alerts[ticker].length) return;

            const prices = data.prices;
            const currentPrice = prices[prices.length-1];
            const rsi = data.computed.rsi[data.computed.rsi.length-1];
            const sma = data.computed.sma[data.computed.sma.length-1];

            let stateChanged = false;

            appState.alerts[ticker].forEach(al => {
                if(al.triggered) return;
                let valToCheck = al.ind === 'Price' ? currentPrice : (al.ind === 'RSI' ? rsi : sma);
                let hit = (al.cond === '>' && valToCheck > al.val) || (al.cond === '<' && valToCheck < al.val);
                
                if (hit) {
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification(`📈 Alert Triggered: ${ticker}`, { body: `${al.ind} is ${al.cond} ${al.val} (Currently: ${valToCheck.toFixed(2)})` });
                    }
                    al.triggered = true; 
                    stateChanged = true;
                }
            });

            if(stateChanged) localStorage.setItem('alerts', JSON.stringify(appState.alerts));
        }

        function addCustomAlert(ticker) {
            requestNotificationPermission();
            const ind = document.getElementById(`alt-ind-${ticker}`).value;
            const cond = document.getElementById(`alt-cond-${ticker}`).value;
            const val = parseFloat(document.getElementById(`alt-val-${ticker}`).value);
            
            if(isNaN(val)) return alert("Please enter a valid number");

            appState.alerts[ticker].push({ id: Date.now(), ind, cond, val, triggered: false });
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        function deleteAlert(ticker, id) {
            appState.alerts[ticker] = appState.alerts[ticker].filter(a => a.id !== id);
            localStorage.setItem('alerts', JSON.stringify(appState.alerts));
            renderUI();
        }

        // --- UI Rendering ---
        function renderUI() {
            const container = document.getElementById('watchlist');
            if(appState.watchlist.length === 0) { container.innerHTML = '<div class="info-card">No stocks tracked. Add one above.</div>'; return; }
            
            let html = '';
            for (let ticker of appState.watchlist) {
                const data = appState.dataCache[ticker];

                if(!data) {
                    if(appState.errors[ticker]) {
                        html += `
                            <div class="info-card error-card">
                                <div><strong>${ticker}</strong>: ${appState.errors[ticker]}</div>
                                <button class="retry-btn" onclick="retryStock('${ticker}')">Retry</button>
                            </div>`;
                    } else {
                        html += `<div class="info-card">${ticker}: Loading...</div>`;
                    }
                    continue;
                }

                const prices = data.prices;
                const currentPrice = prices[prices.length-1];
                const isBullish = currentPrice >= prices[prices.length-2];
                const rsi = data.computed.rsi[data.computed.rsi.length-1].toFixed(1);
                const sma = data.computed.sma[data.computed.sma.length-1].toFixed(2);

                const comp = data.computed.composite;
                const sigClass = comp.signal === 'BUY' ? 'buy' : comp.signal === 'SELL' ? 'sell' : 'hold';

                const ui = appState.ui;
                const inds = appState.indicators[ticker];

                let alertsHtml = appState.alerts[ticker].map(a => `
                    <div class="active-alert">
                        <span>${a.triggered ? '⚠️' : '🔔'} ${a.ind} ${a.cond} ${a.val}</span>
                        <button class="del-alert" onclick="deleteAlert('${ticker}', ${a.id})">✕</button>
                    </div>
                `).join('');

                let newsHtml = '<div style="text-align:center;color:var(--text-sub);font-size:0.85rem;">Loading news...</div>';
                if (appState.newsCache[ticker]) {
                    newsHtml = appState.newsCache[ticker].length === 0 ? '<div style="color:var(--text-sub);font-size:0.8rem;">No recent news found.</div>' :
                        appState.newsCache[ticker].map(n => `
                        <div class="news-item">
                            <a href="${n.link}" target="_blank">${n.title}</a>
                            <div class="news-date">${n.publisher} • ${new Date(n.providerPublishTime*1000).toLocaleDateString()}</div>
                        </div>`).join('');
                }

                const hasSentiment = !!appState.sentimentCache[ticker];
                let signalHtml = `
                    <div class="signal-panel" id="signal-panel-${ticker}">
                        ${buildSignalInnerHTML(comp)}
                    </div>
                    <div class="sentiment-row">
                        <div class="sentiment-panel" id="sentiment-panel-${ticker}">
                            ${hasSentiment ? buildSentimentHTML(ticker, appState.sentimentCache[ticker], appState.earningsCache[ticker]) : ''}
                        </div>
                        <button class="sentiment-btn" id="sentiment-btn-${ticker}" onclick="checkSentiment('${ticker}')">
                            ${hasSentiment ? '↻ Refresh Sentiment' : '📰 Check Sentiment & Earnings'}
                        </button>
                    </div>`;

                html += `
                    <div class="stock-card">
                        <div class="card-top">
                            <div><h2 class="ticker">${ticker}</h2><div class="stats-row"><span>RSI: ${rsi} &nbsp;•&nbsp; SMA: $${sma}</span></div></div>
                            <div style="text-align: right;"><h2 class="price" style="color: ${isBullish ? 'var(--buy-color)' : 'var(--sell-color)'}">$${currentPrice.toFixed(2)}</h2><span class="badge ${sigClass}">${comp.signal}</span></div>
                        </div>

                        <!-- Signal Detail -->
                        ${signalHtml}

                        <!-- Panel: CHART -->
                        <div class="panel chart-container ${ui.charts[ticker] ? 'active' : ''}">
                            <div class="indicator-toggles">
                                <button class="ind-btn ${inds.sma?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma')">SMA (50)</button>
                                <button class="ind-btn ${inds.sma20?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'sma20')">SMA (20)</button>
                                <button class="ind-btn ${inds.ema20?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'ema20')">EMA (20)</button>
                                <button class="ind-btn ${inds.bb?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'bb')">Bollinger Bands</button>
                                <button class="ind-btn ${inds.rsi?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'rsi')">RSI</button>
                                <button class="ind-btn ${inds.macd?'active':''}" onclick="toggleUI('${ticker}', 'ind', 'macd')">MACD</button>
                            </div>
                            <div class="canvas-wrapper"><canvas id="canvas-${ticker}"></canvas></div>
                        </div>

                        <!-- Panel: NEWS -->
                        <div class="panel ${ui.news[ticker] ? 'active' : ''}">${newsHtml}</div>

                        <!-- Panel: ALERTS -->
                        <div class="panel ${ui.alerts[ticker] ? 'active' : ''}">
                            <div style="margin-bottom:10px;">${alertsHtml}</div>
                            <div style="font-size:0.85rem; color:var(--text-sub);">Create new alert:</div>
                            <div class="alert-form">
                                <select id="alt-ind-${ticker}"><option value="Price">Price</option><option value="RSI">RSI</option><option value="SMA">SMA 50</option></select>
                                <select id="alt-cond-${ticker}"><option value=">">Above (>)</option><option value="<">Below (<)</option></select>
                                <input type="number" id="alt-val-${ticker}" placeholder="Value">
                                <button onclick="addCustomAlert('${ticker}')">Save</button>
                            </div>
                        </div>

                        <div class="actions">
                            <button class="icon-btn ${ui.charts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'charts')">📈 <span>Chart</span></button>
                            <button class="icon-btn ${ui.news[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'news')">📰 <span>News</span></button>
                            <button class="icon-btn ${ui.alerts[ticker]?'active':''}" onclick="toggleUI('${ticker}', 'panel', 'alerts')">🔔 <span>Alerts</span></button>
                            <button class="icon-btn" onclick="deleteStock('${ticker}')">✕ <span>Del</span></button>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            appState.watchlist.forEach(ticker => { if(appState.ui.charts[ticker] && appState.dataCache[ticker]) drawChart(ticker); });
        }

        // --- Chart Drawing Logic ---
        function drawChart(ticker) {
            const data = appState.dataCache[ticker];
            const inds = appState.indicators[ticker];
            const ctx = document.getElementById(`canvas-${ticker}`).getContext('2d');
            
            const sl = Math.min(CONFIG.CHART_WINDOW_DAYS, data.prices.length); 
            const prices = data.prices.slice(-sl), dates = data.dates.slice(-sl);
            
            // EXPLICIT COLORS: Fixes the "black lines in dark mode" bug in Chart.js
            const isLight = document.body.classList.contains('light-mode');
            const cBuy = '#32d74b';
            const cSell = '#ff453a';
            const cSma = '#f5a623';
            const cSma20 = '#5ac8fa';
            const cEma20 = '#bf5af2';
            const cBb = isLight ? 'rgba(0, 0, 0, 0.2)' : 'rgba(255, 255, 255, 0.3)';
            const cRsi = '#b58900';
            const cMacd = '#d33682';

            // UI Colors
            const gridColor = isLight ? '#e5e5ea' : '#222222';
            const tickColor = isLight ? '#8e8e93' : '#888888';
            const tooltipBg = isLight ? 'rgba(255, 255, 255, 0.95)' : 'rgba(28, 28, 30, 0.95)';
            const tooltipText = isLight ? '#000000' : '#ffffff';

            let datasets = [{
                label: `Price`, 
                data: prices, 
                borderColor: (prices[prices.length-1] >= prices[prices.length-2]) ? cBuy : cSell,
                borderWidth: 2, pointRadius: 0, fill: false, tension: 0.1, yAxisID: 'y'
            }];

            if(inds.sma) datasets.push({ label: 'SMA (50)', data: data.computed.sma.slice(-sl), borderColor: cSma, borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, yAxisID: 'y' });
            if(inds.sma20) datasets.push({ label: 'SMA (20)', data: data.computed.sma20.slice(-sl), borderColor: cSma20, borderWidth: 1.5, borderDash: [5, 5], pointRadius: 0, yAxisID: 'y' });
            if(inds.ema20) datasets.push({ label: 'EMA (20)', data: data.computed.ema20.slice(-sl), borderColor: cEma20, borderWidth: 1.5, pointRadius: 0, yAxisID: 'y' });
            if(inds.bb) { let bb = data.computed.bb; datasets.push({ label: 'BB Upper', data: bb.upper.slice(-sl), borderColor: cBb, borderWidth: 1, pointRadius: 0, yAxisID: 'y' }, { label: 'BB Lower', data: bb.lower.slice(-sl), borderColor: cBb, borderWidth: 1, pointRadius: 0, yAxisID: 'y' }); }
            
            let hasOscillator = inds.rsi || inds.macd;
            if(inds.rsi) datasets.push({ label: 'RSI', data: data.computed.rsi.slice(-sl), borderColor: cRsi, borderWidth: 1.5, pointRadius: 0, yAxisID: 'y2', spanGaps: true });
            if(inds.macd) { let m = data.computed.macd; datasets.push({ label: 'MACD', data: m.macd.slice(-sl), borderColor: cMacd, borderWidth: 1.5, pointRadius: 0, yAxisID: 'y2', spanGaps: true }, { label: 'Signal', data: m.signal.slice(-sl), borderColor: '#859900', borderWidth: 1, pointRadius: 0, yAxisID: 'y2', spanGaps: true }); }

            let scales = {
                x: {
                    display: true,
                    ticks: { color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 10 },
                    grid: { display: false },
                    offset: false
                },
                y: { type: 'linear', position: 'right', ticks: { color: tickColor }, grid: { color: gridColor } }
            };
            if(hasOscillator) scales.y2 = { type: 'linear', position: 'left', ticks: { color: tickColor }, grid: { display: false }, min: (inds.rsi && !inds.macd) ? 0 : undefined, max: (inds.rsi && !inds.macd) ? 100 : undefined };

            if(window.myCharts[ticker]) window.myCharts[ticker].destroy();
            window.myCharts[ticker] = new Chart(ctx, {
                type: 'line', data: { labels: dates, datasets },
                options: { 
                    responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, 
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { padding: 10, backgroundColor: tooltipBg, titleColor: tooltipText, bodyColor: tooltipText } 
                    }, scales 
                }
            });
        }

        // --- App Interactions ---
        async function toggleUI(ticker, type, key) {
            if(type === 'panel') {
                let state = appState.ui[key][ticker];
                appState.ui.charts[ticker] = appState.ui.news[ticker] = appState.ui.alerts[ticker] = false;
                appState.ui[key][ticker] = !state; 
                
                if(key === 'news' && !appState.newsCache[ticker]) {
                    renderUI(); 
                    appState.newsCache[ticker] = await fetchNews(ticker);
                }
            }
            if(type === 'ind') appState.indicators[ticker][key] = !appState.indicators[ticker][key];
            
            localStorage.setItem('indicators', JSON.stringify(appState.indicators));
            renderUI();
        }

        function addStock() {
            const val = document.getElementById('tickerInput').value.toUpperCase().trim();
            if(val && !appState.watchlist.includes(val)) {
                appState.watchlist.unshift(val);
                persistWatchlist();
                document.getElementById('tickerInput').value = '';
                document.getElementById('watchlist').innerHTML = '<div class="info-card">Fetching...</div>';
                updateData();
            }
        }

        function deleteStock(ticker) {
            appState.watchlist = appState.watchlist.filter(t => t !== ticker);
            delete appState.dataCache[ticker];
            delete appState.errors[ticker];
            persistWatchlist();
            renderUI();
        }

        function retryStock(ticker) {
            delete appState.errors[ticker];
            renderUI();
            (async () => {
                try {
                    const data = await fetchStockData(ticker);
                    const extras = {
                        sentiment: appState.sentimentCache[ticker] || null,
                        earnings: appState.earningsCache[ticker] || null,
                    };
                    data.computed = computeIndicatorSet(data.prices, data.ohlc, extras);
                    appState.dataCache[ticker] = data;
                } catch(e) {
                    appState.errors[ticker] = e.message || 'Failed to load';
                }
                renderUI();
            })();
        }

        // Initialize App — pre-hydrate from sessionStorage for instant first paint
        document.getElementById('pinInput').value = appState.pin;
        appState.watchlist.forEach(ticker => {
            const raw = sessionStorage.getItem(`chart_${ticker}`);
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    const sentiment = JSON.parse(sessionStorage.getItem(`sentiment_${ticker}`) || 'null');
                    const earnings = JSON.parse(sessionStorage.getItem(`earnings_${ticker}`) || 'null');
                    if (sentiment) appState.sentimentCache[ticker] = sentiment;
                    if (earnings) appState.earningsCache[ticker] = earnings;
                    if(!appState.indicators[ticker]) appState.indicators[ticker] = {sma:false, sma20:false, ema20:false, bb:false, rsi:false, macd:false};
                    data.computed = computeIndicatorSet(data.prices, data.ohlc, { sentiment, earnings });
                    appState.dataCache[ticker] = data;
                } catch(e) {}
            }
        });
        // If we had cached data, render it immediately (before network)
        if (Object.keys(appState.dataCache).length) renderUI();

        updateData();
        setInterval(updateData, CONFIG.REFRESH_MS);
    </script>
</body>
</html>
